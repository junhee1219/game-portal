<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>미니게임 — 설치 없이 바로 하는 무료 웹게임</title>
  <meta name="description" content="설치·가입 없이 브라우저에서 바로 즐기는 무료 미니게임 모음 — 퍼즐, 카드 짝맞추기, 방치형 키우기, 아케이드. 기록 세우고 친구랑 겨뤄요.">
  <meta name="keywords" content="미니게임, 무료게임, 웹게임, 브라우저 게임, 온라인 게임, 퍼즐 게임, 심심할때 할만한 게임">
  <meta property="og:title" content="미니게임 — 무료 웹게임">
  <meta property="og:description" content="여러 미니게임을 한 곳에서. 기록 세우고 친구랑 겨뤄보세요.">
  <meta property="og:image" content="{{BASE}}/og.png">
  <meta property="og:site_name" content="미니게임">
  <meta property="og:type" content="website">
  {{HEAD_EXTRA}}
  <link rel="stylesheet" href="/portal.css">
  <link rel="icon" href="/icons/portal-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#FFF6E5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="미니게임">
  <link rel="apple-touch-icon" href="/icons/portal-180.png">
</head>
<body>
  <main class="wrap">
    <div class="topbar" id="topbar"></div>
    <header class="hero">
      <p class="kicker">mini-game.kr</p>
      <h1>미니게임</h1>
      <p class="sub">기록 세우고 친구랑 겨뤄요.</p>
    </header>

    <div class="lib-wrap" aria-label="게임 목록">
      {{CARDS}}
    </div>

    <footer class="foot">
      <p><a href="/rank" class="foot-link">기록실 보기</a> · <a href="/lab" class="foot-link">실험실 (개발 중 새 게임)</a></p>
      <p><a href="#" class="foot-link" id="feedback-link">의견 남기기</a> · <a href="#" class="foot-link" id="support-link">개발자 간식 사주기</a></p>
      <p>새 게임이 계속 추가됩니다.</p>
    </footer>
  </main>
  <script src="/portal.js" data-game="portal"></script>
  <script>
    document.getElementById('feedback-link').addEventListener('click', function (e) {
      e.preventDefault(); if (window.GamePortal) GamePortal.openFeedback();
    });
    document.getElementById('support-link').addEventListener('click', function (e) {
      e.preventDefault(); if (window.GamePortal) GamePortal.openSupport();
    });

    // 앱 보관함(App Library) 폴더 — 타일/이름을 탭하면 폴더 시트가 열린다.
    (function () {
      var openSheet = null;
      function open(id) {
        var sheet = document.getElementById('fs-' + id);
        if (!sheet) return;
        if (openSheet) openSheet.hidden = true, openSheet.classList.remove('is-open');
        sheet.hidden = false;
        requestAnimationFrame(function () { sheet.classList.add('is-open'); });
        document.body.classList.add('sheet-open');
        openSheet = sheet;
      }
      function close() {
        if (!openSheet) return;
        var sheet = openSheet; openSheet = null;
        sheet.classList.remove('is-open');
        document.body.classList.remove('sheet-open');
        var done = function () { sheet.hidden = true; sheet.removeEventListener('transitionend', done); };
        sheet.addEventListener('transitionend', done);
        setTimeout(function () { if (sheet.hidden === false && !sheet.classList.contains('is-open')) sheet.hidden = true; }, 300);
      }
      document.addEventListener('click', function (e) {
        if (e.target.closest('.ft-app') || e.target.closest('.fs-app')) return; // 게임 실행 링크
        var opener = e.target.closest('[data-folder]');
        if (opener) { e.preventDefault(); open(opener.getAttribute('data-folder')); return; }
        var sheet = e.target.closest('.folder-sheet');
        if (sheet && !e.target.closest('.fs-panel')) close(); // 배경 탭 = 닫기
      });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });
    })();
  </script>
  <script src="/account-widget.js"></script>
</body>
</html>
