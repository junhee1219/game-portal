<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>미니게임 — 기록 대결</title>
  <meta name="description" content="여러 미니게임을 한 곳에서 — 물병 정렬, 라면집 사장님, Cube Snake, 과일 팡팡. 기록 세우고 친구랑 겨뤄요.">
  <meta property="og:title" content="미니게임">
  <meta property="og:description" content="여러 미니게임을 한 곳에서. 기록 세우고 친구랑 겨뤄보세요.">
  <meta property="og:image" content="{{BASE}}/og.png">
  <meta property="og:site_name" content="미니게임">
  <meta property="og:type" content="website">
  {{HEAD_EXTRA}}
  <link rel="stylesheet" href="/portal.css">
  <link rel="icon" href="/icons/portal-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#FFF6E5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="미니게임">
  <link rel="apple-touch-icon" href="/icons/portal-180.png">
</head>
<body>
  <main class="wrap">
    <div class="topbar" id="topbar"></div>
    <header class="hero">
      <p class="kicker">mini-game.kr</p>
      <h1>미니게임</h1>
      <p class="sub">기록 세우고 친구랑 겨뤄요.</p>
    </header>

    <section class="list" aria-label="게임 목록">
      {{CARDS}}
    </section>

    <footer class="foot">
      <p><a href="/rank" class="foot-link">기록실 보기</a></p>
      <p><a href="#" class="foot-link" id="feedback-link">의견 남기기</a> · <a href="#" class="foot-link" id="support-link">개발자 간식 사주기</a></p>
      <p>새 게임이 계속 추가됩니다.</p>
    </footer>
  </main>
  <script src="/portal.js" data-game="portal"></script>
  <script>
    document.getElementById('feedback-link').addEventListener('click', function (e) {
      e.preventDefault(); if (window.GamePortal) GamePortal.openFeedback();
    });
    document.getElementById('support-link').addEventListener('click', function (e) {
      e.preventDefault(); if (window.GamePortal) GamePortal.openSupport();
    });
  </script>
  <script src="/account-widget.js"></script>
</body>
</html>
