<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>친구 추가 — 미니게임</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/portal.css">
  <link rel="icon" href="/icons/portal-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#FFF6E5">
</head>
<body>
  <main class="wrap">
    <header class="hero" style="margin-bottom:24px">
      <p class="kicker">FRIEND</p>
      <h1 style="font-size: var(--fs-1)" id="title">친구 추가</h1>
      <p class="sub" id="msg">확인 중…</p>
    </header>
    <div id="action"></div>
  </main>
  <script>
    var followeeId = location.pathname.split('/')[2] || '';
    var msg = document.getElementById('msg');
    var action = document.getElementById('action');

    if (!followeeId) {
      msg.textContent = '잘못된 링크입니다.';
    } else {
      fetch('/auth/me').then(function (r) { return r.json(); }).then(function (d) {
        if (d.user) {
          if (d.user.user_id === followeeId) {
            msg.textContent = '본인은 친구로 추가할 수 없어요.';
            action.innerHTML = '<a class="foot-link" href="/rank">기록실로</a>';
            return;
          }
          // 로그인 상태 → 친구 요청 전송 (상대가 이미 나를 요청했으면 즉시 친구 성립)
          fetch('/api/friend-request', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ other_id: followeeId })
          })
            .then(function (r) { return r.json(); })
            .then(function (res) {
              if (res.ok) {
                var who = res.nickname ? res.nickname + '님' : '상대';
                if (res.status === 'accepted') {
                  msg.textContent = who + '과 친구가 되었어요!';
                } else if (res.already) {
                  msg.textContent = '이미 ' + who + '에게 친구 요청을 보냈어요.';
                } else {
                  msg.textContent = who + '에게 친구 요청을 보냈어요. 상대가 수락하면 친구!';
                }
                setTimeout(function () { location.href = '/rank'; }, 1300);
              } else {
                msg.textContent = '요청하지 못했어요.';
              }
            })
            .catch(function () { msg.textContent = '네트워크 오류입니다.'; });
        } else {
          // 비로그인 → 가입/로그인 후 자동 follow (next로 이 페이지 복귀)
          msg.textContent = '친구 기록을 보려면 로그인이 필요해요.';
          action.innerHTML = '<a class="auth-submit" style="display:inline-block;text-decoration:none;text-align:center" href="/account?next=' +
            encodeURIComponent('/follow/' + followeeId) + '">로그인 / 가입하고 친구 추가</a>';
        }
      }).catch(function () { msg.textContent = '오류가 발생했습니다.'; });
    }
  </script>
  <script src="/portal.js" data-game="portal"></script>
</body>
</html>
