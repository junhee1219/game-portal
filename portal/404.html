<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>없는 페이지 — 미니게임</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/portal.css">
  <link rel="icon" href="/icons/portal-192.png">
  <meta name="theme-color" content="#FFF6E5">
  <style>
    .nf-wrap{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:32px 22px;gap:6px;}
    .nf-code{font-size:var(--fs-1);font-weight:900;letter-spacing:-.02em;color:var(--accent);line-height:1;}
    .nf-title{font-size:var(--fs-2);font-weight:800;color:var(--text);margin-top:10px;}
    .nf-sub{font-size:var(--fs-3);color:var(--dim);line-height:1.6;margin-top:6px;max-width:300px;}
    .nf-home{display:inline-flex;align-items:center;gap:6px;margin-top:22px;padding:13px 24px;border-radius:14px;
      background:var(--accent);color:#1a1205;font-size:var(--fs-2);font-weight:800;text-decoration:none;}
    .nf-home:active{transform:translateY(1px);}
  </style>
</head>
<body>
  <main class="nf-wrap">
    <div class="nf-code">404</div>
    <div class="nf-title">없는 페이지예요</div>
    <p class="nf-sub">주소가 바뀌었거나 사라진 페이지일 수 있어요. 게임 목록으로 돌아가 다시 골라보세요.</p>
    <a class="nf-home" href="/">홈으로 가기</a>
  </main>
</body>
</html>
