<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>기록실 — 미니게임</title>
  <meta property="og:title" content="기록실">
  <meta property="og:description" content="게임별 최고 기록. 한 줄이라도 올려보자.">
  <link rel="stylesheet" href="/portal.css">
  <link rel="icon" href="/icons/portal-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#101014">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="한판만">
  <link rel="apple-touch-icon" href="/icons/portal-180.png">
  <style>
    .board { margin-bottom: 28px; }
    .board h2 {
      font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .board h2 img { width: 28px; height: 28px; border-radius: 7px; background: #000; }
    .board ol {
      list-style: none; background: var(--panel); border: 1px solid var(--line);
      border-radius: 14px; overflow: hidden;
    }
    .board li {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      border-bottom: 1px solid var(--line); font-size: 14px;
    }
    .board li:last-child { border-bottom: none; }
    .board .rank-no { color: var(--dim); width: 22px; font-weight: 700; }
    .board li:first-child .rank-no { color: var(--accent); }
    .board .who { color: var(--text); }
    .board .pts { margin-left: auto; font-weight: 700; }
    .board .empty { color: var(--dim); padding: 16px; font-size: 14px; }
    .back { display: inline-block; margin-bottom: 28px; color: var(--dim); text-decoration: none; font-size: 14px; }
    .back:hover { color: var(--text); }
    .mine {
      display: flex; align-items: center; gap: 10px; margin-top: 10px;
      padding: 12px 16px; background: var(--panel); border: 1px dashed var(--line);
      border-radius: 14px; font-size: 14px;
    }
    .mine .label { color: var(--dim); }
    .mine .val { font-weight: 700; }
    .mine button {
      margin-left: auto; background: var(--accent); color: #14110a; border: none;
      padding: 8px 14px; border-radius: 10px; font-weight: 700; font-size: 13px;
      font-family: inherit; cursor: pointer;
    }
    .mine button:active { transform: scale(0.97); }
    .scope-toggle { margin-left: auto; display: flex; gap: 4px; }
    .scope-toggle button {
      background: transparent; border: 1px solid var(--line); color: var(--dim);
      font: inherit; font-size: 12px; font-weight: 700; padding: 4px 10px;
      border-radius: 8px; cursor: pointer;
    }
    .scope-toggle button.active { background: var(--accent); color: #14110a; border-color: var(--accent); }
    .board li.me-row { background: rgba(255,177,61,0.08); }
    .board li.me-row .who { color: var(--accent); font-weight: 700; }
    .login-banner {
      display: block; text-align: center; padding: 14px; margin-bottom: 24px;
      background: var(--panel); border: 1px dashed var(--line); border-radius: 14px;
      color: var(--accent); text-decoration: none; font-size: 14px; font-weight: 600;
    }
    .login-banner:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar" id="topbar"></div>
    <a class="back" href="/">&larr; 게임 목록</a>
    <header class="hero" style="margin-bottom:32px">
      <p class="kicker">RANKING</p>
      <h1 style="font-size:clamp(32px,9vw,44px)">기록실</h1>
    </header>

    <div id="boards"><p class="empty" style="color:var(--dim)">불러오는 중…</p></div>
  </main>
  <script>
    // 로그인 시 '내 기록'은 서버(/api/me/scores)에서 — 크로스 디바이스. 비로그인은 localStorage 폴백.
    var MY = { loggedIn: false, scores: {} };

    // 게임 목록 + 내 기록을 함께 받은 뒤 보드 렌더 (하드코딩 SCORE_KEYS 제거)
    Promise.all([
      fetch('/api/games').then(function (r) { return r.json(); }),
      fetch('/api/me/scores').then(function (r) { return r.json(); }).catch(function () { return { ok: false }; })
    ]).then(function (res) {
      var data = res[0], me = res[1];
      if (me && me.ok) { MY.loggedIn = true; MY.scores = me.scores || {}; }
      var container = document.getElementById('boards');
      container.innerHTML = '';
      if (!MY.loggedIn) {
        var banner = document.createElement('a');
        banner.className = 'login-banner';
        banner.href = '/account';
        banner.textContent = '로그인하면 친구 기록을 모아볼 수 있어요 →';
        container.appendChild(banner);
      }
      (data.games || []).forEach(function (g) {
        var board = document.createElement('section');
        board.className = 'board';
        board.dataset.game = g.id;
        board.dataset.unit = g.unit || '점';
        board.dataset.scoreKey = g.score_key || '';
        board.innerHTML =
          '<h2><img src="' + g.icon + '" alt="">' + g.title + '</h2>' +
          '<ol><li class="empty">아직 기록이 없습니다.</li></ol>';
        container.appendChild(board);
        renderBoard(board);
      });
    }).catch(function () {
      document.getElementById('boards').innerHTML =
        '<p class="empty" style="color:var(--dim)">기록을 불러오지 못했습니다.</p>';
    });

    function loadScores(board, scope, unit) {
      var game = board.dataset.game;
      var ol = board.querySelector('ol');
      var url = scope === 'friends'
        ? '/api/friends/leaderboard/' + game
        : '/api/leaderboard/' + game + '?limit=10';
      fetch(url).then(function (r) { return r.json(); }).then(function (data) {
        var entries = data.entries || [];
        if (!entries.length) {
          ol.innerHTML = '<li class="empty">' +
            (scope === 'friends' ? '친구를 추가하면 여기 나란히 보여요.' : '아직 기록이 없습니다.') +
            '</li>';
          return;
        }
        ol.innerHTML = entries.map(function (e) {
          return '<li' + (e.is_me ? ' class="me-row"' : '') + '>' +
            '<span class="rank-no">' + e.rank + '</span>' +
            '<span class="who">' + (e.nickname || '익명') + (e.is_me ? ' (나)' : '') + '</span>' +
            '<span class="pts">' + e.score.toLocaleString() + unit + '</span></li>';
        }).join('');
      }).catch(function () {});
    }

    function renderBoard(board) {
      var game = board.dataset.game;
      var unit = board.dataset.unit;
      var scoreKey = board.dataset.scoreKey;

      // 로그인 시 전체|친구 토글
      if (MY.loggedIn) {
        var toggle = document.createElement('div');
        toggle.className = 'scope-toggle';
        toggle.innerHTML = '<button type="button" class="active" data-scope="all">전체</button>' +
          '<button type="button" data-scope="friends">친구</button>';
        board.querySelector('h2').appendChild(toggle);
        toggle.querySelectorAll('button').forEach(function (b) {
          b.addEventListener('click', function () {
            toggle.querySelectorAll('button').forEach(function (x) { x.classList.remove('active'); });
            b.classList.add('active');
            loadScores(board, b.dataset.scope, unit);
          });
        });
      }
      loadScores(board, 'all', unit);

      // 내 최고 기록 — 로그인 시 서버값(크로스 디바이스), 아니면 localStorage 폴백
      var mine = 0;
      if (MY.loggedIn) {
        mine = parseInt(MY.scores[game] || 0, 10) || 0;
      } else {
        try { if (scoreKey) mine = parseInt(localStorage.getItem(scoreKey) || '0', 10) || 0; } catch (e) {}
      }
      if (mine > 0) {
        var div = document.createElement('div');
        div.className = 'mine';
        div.innerHTML = '<span class="label">내 기록</span>' +
          '<span class="val">' + mine.toLocaleString() + unit + '</span>' +
          '<button type="button">공유</button>';
        div.querySelector('button').addEventListener('click', function () {
          var vid = 'anon';
          try { vid = localStorage.getItem('gp_vid') || 'anon'; } catch (e) {}
          fetch('/api/score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ visitor_id: vid, game: game, score: mine, meta: { from: 'rank-share' } })
          })
            .then(function (r) { return r.json(); })
            .then(function (data) {
              if (!data.share_url) return;
              var url = location.origin + data.share_url;
              // http(비보안) origin에선 share/clipboard 둘 다 없을 수 있다 —
              // 마지막 폴백은 공유 페이지로 직접 이동 (브라우저 메뉴로 공유 가능)
              if (navigator.share) {
                navigator.share({ url: url }).catch(function () {});
                return;
              }
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(function () {
                  alert('공유 링크를 복사했습니다.\n' + url);
                }).catch(function () { location.href = url; });
                return;
              }
              location.href = url;
            })
            .catch(function () {});
        });
        board.appendChild(div);
      }
    }
  </script>
  <script src="/portal.js" data-game="portal"></script>
  <script src="/account-widget.js"></script>
</body>
</html>
