<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>기록실 — 미니게임</title>
  <meta name="description" content="미니게임 게임별 최고 기록 순위. 친구 기록 깨고 1등에 도전하세요.">
  <link rel="canonical" href="https://mini-game.kr/rank">
  <meta property="og:title" content="기록실">
  <meta property="og:description" content="게임별 최고 기록. 한 줄이라도 올려보자.">
  <meta property="og:image" content="/og.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="미니게임">
  <link rel="stylesheet" href="/portal.css">
  <link rel="icon" href="/icons/portal-192.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#FFF6E5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="미니게임">
  <link rel="apple-touch-icon" href="/icons/portal-180.png">
  <style>
    .board { margin-bottom: 28px; }
    .board h2 {
      font-size: var(--fs-2); font-weight: 700; display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .board h2 img { width: 28px; height: 28px; border-radius: 7px; background: #000; }
    .board ol {
      list-style: none; background: var(--panel); border: 1px solid var(--line);
      border-radius: 14px; overflow: hidden;
    }
    .board li {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      border-bottom: 1px solid var(--line); font-size: var(--fs-3);
    }
    .board li:last-child { border-bottom: none; }
    .board .rank-no { color: var(--dim); width: 22px; font-weight: 700; }
    .board li:first-child .rank-no { color: var(--accent); }
    .board .who { color: var(--text); }
    .board .pts { margin-left: auto; font-weight: 700; }
    .board .empty { color: var(--dim); padding: 16px; font-size: var(--fs-3); }
    .back { display: inline-block; margin-bottom: 28px; color: var(--dim); text-decoration: none; font-size: var(--fs-3); }
    .back:hover { color: var(--text); }
    .mine {
      display: flex; align-items: center; gap: 10px; margin-top: 10px;
      padding: 12px 16px; background: var(--panel); border: 1px dashed var(--line);
      border-radius: 14px; font-size: var(--fs-3);
    }
    .mine .label { color: var(--dim); }
    .mine .val { font-weight: 700; }
    .mine button {
      margin-left: auto; background: var(--accent); color: #fff; border: none;
      padding: 8px 14px; border-radius: 10px; font-weight: 700; font-size: var(--fs-3);
      font-family: inherit; cursor: pointer;
    }
    .mine button:active { transform: scale(0.97); }
    .scope-toggle { margin-left: auto; display: flex; gap: 4px; }
    .scope-toggle button {
      background: transparent; border: 1px solid var(--line); color: var(--dim);
      font: inherit; font-size: var(--fs-3); font-weight: 700; padding: 4px 10px;
      border-radius: 8px; cursor: pointer;
    }
    .scope-toggle button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .board li.me-row { background: rgba(255,177,61,0.08); }
    .board li.me-row .who { color: var(--accent); font-weight: 700; }
    .login-banner {
      display: block; text-align: center; padding: 14px; margin-bottom: 24px;
      background: var(--panel); border: 1px dashed var(--line); border-radius: 14px;
      color: var(--accent); text-decoration: none; font-size: var(--fs-3); font-weight: 600;
    }
    .login-banner:hover { border-color: var(--accent); }
    .reqs { margin-bottom: 24px; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
    .reqs .reqs-h { padding: 12px 16px; font-size: var(--fs-3); font-weight: 700; color: var(--accent); border-bottom: 1px solid var(--line); }
    .reqs .req { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--line); font-size: var(--fs-3); }
    .reqs .req:last-child { border-bottom: none; }
    .reqs .req .who { color: var(--text); font-weight: 600; }
    .reqs .req .btns { margin-left: auto; display: flex; gap: 6px; }
    .reqs .req button { font: inherit; font-size: var(--fs-3); font-weight: 700; padding: 6px 12px; border-radius: 9px; cursor: pointer; border: 1px solid var(--line); }
    .reqs .req .accept { background: var(--accent); color: #fff; border-color: var(--accent); }
    .reqs .req .decline { background: transparent; color: var(--dim); }
    .reqs .req button:active { transform: scale(0.96); }
    .finder { margin-bottom: 16px; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; }
    .finder-h { font-size: var(--fs-3); font-weight: 700; color: var(--accent); margin-bottom: 10px; }
    .finder-row { display: flex; gap: 8px; }
    .finder-in { flex: 1; min-width: 0; background: rgba(255,255,255,.04); border: 1px solid var(--line); color: var(--text); font: inherit; font-size: var(--fs-3); padding: 9px 12px; border-radius: 10px; outline: none; }
    .finder-in:focus { border-color: var(--accent); }
    .finder-btn { background: var(--accent); color: #fff; border: none; font: inherit; font-size: var(--fs-3); font-weight: 700; padding: 9px 16px; border-radius: 10px; cursor: pointer; flex: 0 0 auto; }
    .finder-btn:disabled { opacity: .5; }
    .finder-btn:active { transform: scale(0.97); }
    .finder-msg { font-size: var(--fs-3); margin-top: 8px; min-height: 16px; }
    .finder-msg.ok { color: #7fdca0; }
    .finder-msg.bad { color: #ff9a9a; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar" id="topbar"></div>
    <a class="back" href="/">&larr; 게임 목록</a>
    <header class="hero" style="margin-bottom:32px">
      <p class="kicker">RANKING</p>
      <h1 style="font-size: var(--fs-1)">기록실</h1>
    </header>

    <div id="boards"><p class="empty" style="color:var(--dim)">불러오는 중…</p></div>
  </main>
  <script>
    // 로그인 시 '내 기록'은 서버(/api/me/scores)에서 — 크로스 디바이스. 비로그인은 localStorage 폴백.
    var MY = { loggedIn: false, scores: {} };

    // 게임 목록 + 내 기록을 함께 받은 뒤 보드 렌더 (하드코딩 SCORE_KEYS 제거)
    Promise.all([
      fetch('/api/games').then(function (r) { return r.json(); }),
      fetch('/api/me/scores').then(function (r) { return r.json(); }).catch(function () { return { ok: false }; })
    ]).then(function (res) {
      var data = res[0], me = res[1];
      if (me && me.ok) { MY.loggedIn = true; MY.scores = me.scores || {}; }
      // 로그인 방식 무관 '직전(비회원) 점수 귀속'. 카카오 로그인은 게임으로 안 돌아와서
      // portal.js의 claim이 안 도는데, 누구나 거치는 /rank에서 한 번에 귀속한다.
      // 세션당 1회, 로컬 최고점이 서버 기록보다 높을 때만 POST(불필요한 행 방지).
      if (MY.loggedIn) claimLocalBests(data.games || []);
      var container = document.getElementById('boards');
      container.innerHTML = '';
      if (!MY.loggedIn) {
        var banner = document.createElement('a');
        banner.className = 'login-banner';
        banner.href = '/account';
        banner.textContent = '로그인하면 친구 기록을 모아볼 수 있어요 →';
        container.appendChild(banner);
      } else {
        renderFriendFinder(container);
        renderFriendRequests(container);
      }
      (data.games || []).forEach(function (g) {
        var board = document.createElement('section');
        board.className = 'board';
        board.dataset.game = g.id;
        board.dataset.unit = g.unit || '점';
        board.dataset.scoreKey = g.score_key || '';
        board.innerHTML =
          '<h2><img src="' + g.icon + '" alt="">' + g.title + '</h2>' +
          '<ol><li class="empty">아직 기록이 없습니다.</li></ol>';
        container.appendChild(board);
        renderBoard(board);
      });
    }).catch(function () {
      document.getElementById('boards').innerHTML =
        '<p class="empty" style="color:var(--dim)">기록을 불러오지 못했습니다.</p>';
    });

    // 로그인 시 이 기기 localStorage의 게임별 최고점을 회원 기록으로 귀속(1회/세션).
    // 비회원 플레이는 /api/score 저장을 안 하므로, 가입/로그인 후 여기서 올려야 기록실에 뜬다.
    function claimLocalBests(gamesList) {
      var done = false;
      try { done = !!sessionStorage.getItem('gp_rank_claimed'); } catch (e) {}
      if (done) return;
      try { sessionStorage.setItem('gp_rank_claimed', '1'); } catch (e) {}
      var vid = 'anon';
      try { vid = localStorage.getItem('gp_vid') || 'anon'; } catch (e) {}
      var posts = [];
      gamesList.forEach(function (g) {
        if (!g.score_key) return;
        var local = 0;
        try { local = parseInt(localStorage.getItem(g.score_key) || '0', 10) || 0; } catch (e) {}
        var server = parseInt(MY.scores[g.id] || 0, 10) || 0;
        if (local > server) {
          posts.push(fetch('/api/score', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ visitor_id: vid, game: g.id, score: local, meta: { from: 'rank-claim' } })
          }).then(function (r) { return r.json(); }).catch(function () { return null; }));
        }
      });
      if (!posts.length) return;
      // 귀속된 게 있으면 서버 기록을 다시 반영하려 1회 새로고침 (세션 플래그가 재진입 가드).
      Promise.all(posts).then(function () { location.reload(); });
    }

    // 닉네임으로 친구 찾기/신청
    function renderFriendFinder(container) {
      var box = document.createElement('section');
      box.className = 'finder';
      box.innerHTML =
        '<div class="finder-h">친구 찾기</div>' +
        '<div class="finder-row">' +
        '<input class="finder-in" type="text" maxlength="16" placeholder="친구 닉네임 입력" autocomplete="off">' +
        '<button class="finder-btn" type="button">신청</button></div>' +
        '<div class="finder-msg" aria-live="polite"></div>';
      container.insertBefore(box, container.firstChild);
      var inp = box.querySelector('.finder-in');
      var btn = box.querySelector('.finder-btn');
      var msg = box.querySelector('.finder-msg');
      function submit() {
        var nick = (inp.value || '').trim();
        msg.textContent = '';
        msg.className = 'finder-msg';
        if (!nick) { inp.focus(); return; }
        btn.disabled = true;
        fetch('/api/friend-request/by-nickname', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname: nick })
        }).then(function (r) { return r.json().then(function (d) { return { s: r.status, d: d }; }); })
          .then(function (res) {
            btn.disabled = false;
            var d = res.d || {};
            if (d.ok && d.status === 'accepted') {
              msg.textContent = (d.nickname || nick) + '님과 친구가 됐어요!';
              msg.className = 'finder-msg ok';
              inp.value = '';
              setTimeout(function () { location.reload(); }, 900);
            } else if (d.ok) {
              msg.textContent = (d.already ? '이미 ' : '') + (d.nickname || nick) + '님에게 친구 요청을 보냈어요.';
              msg.className = 'finder-msg ok';
              inp.value = '';
            } else if (d.reason === 'not-found') {
              msg.textContent = '그런 닉네임이 없어요.';
              msg.className = 'finder-msg bad';
            } else if (d.reason === 'self') {
              msg.textContent = '본인은 추가할 수 없어요.';
              msg.className = 'finder-msg bad';
            } else {
              msg.textContent = '잠시 후 다시 시도해주세요.';
              msg.className = 'finder-msg bad';
            }
          }).catch(function () { btn.disabled = false; msg.textContent = '네트워크 오류입니다.'; msg.className = 'finder-msg bad'; });
      }
      btn.addEventListener('click', submit);
      inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
    }

    // 받은 친구 요청함 — 수락하면 양방향 친구 성립, 친구 리더보드에 서로 보인다
    function renderFriendRequests(container) {
      fetch('/api/friend-requests').then(function (r) { return r.json(); }).then(function (d) {
        if (!d || !d.ok || !d.requests || !d.requests.length) return;
        var box = document.createElement('section');
        box.className = 'reqs';
        var h = '<div class="reqs-h">친구 요청 ' + d.requests.length + '</div>';
        box.innerHTML = h + d.requests.map(function (req) {
          return '<div class="req" data-uid="' + req.user_id + '">' +
            '<span class="who"></span>' +
            '<span class="btns"><button type="button" class="accept">수락</button>' +
            '<button type="button" class="decline">거절</button></span></div>';
        }).join('');
        // 닉네임은 textContent로 (XSS 방지)
        var rows = box.querySelectorAll('.req');
        d.requests.forEach(function (req, i) { rows[i].querySelector('.who').textContent = req.nickname || '익명'; });
        container.insertBefore(box, container.firstChild);
        box.querySelectorAll('.req').forEach(function (row) {
          var uid = row.dataset.uid;
          function act(url, method) {
            row.querySelectorAll('button').forEach(function (b) { b.disabled = true; });
            fetch(url, {
              method: method, headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ other_id: uid })
            }).then(function (r) { return r.json(); }).then(function (res) {
              if (res && res.ok) {
                row.remove();
                if (!box.querySelector('.req')) box.remove();
              } else {
                row.querySelectorAll('button').forEach(function (b) { b.disabled = false; });
              }
            }).catch(function () { row.querySelectorAll('button').forEach(function (b) { b.disabled = false; }); });
          }
          row.querySelector('.accept').addEventListener('click', function () { act('/api/friend-request/accept', 'POST'); });
          row.querySelector('.decline').addEventListener('click', function () { act('/api/friend', 'DELETE'); });
        });
      }).catch(function () {});
    }

    // 닉네임 등 사용자 입력을 innerHTML에 넣을 때 escape (저장형 XSS 방지)
    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    function loadScores(board, scope, unit) {
      var game = board.dataset.game;
      var ol = board.querySelector('ol');
      var url = scope === 'friends'
        ? '/api/friends/leaderboard/' + game
        : '/api/leaderboard/' + game + '?limit=10';
      fetch(url).then(function (r) { return r.json(); }).then(function (data) {
        var entries = data.entries || [];
        if (!entries.length) {
          ol.innerHTML = '<li class="empty">' +
            (scope === 'friends' ? '친구를 추가하면 여기 나란히 보여요.' : '아직 기록이 없습니다.') +
            '</li>';
          return;
        }
        ol.innerHTML = entries.map(function (e) {
          return '<li' + (e.is_me ? ' class="me-row"' : '') + '>' +
            '<span class="rank-no">' + e.rank + '</span>' +
            '<span class="who">' + esc(e.nickname || '익명') + (e.is_me ? ' (나)' : '') + '</span>' +
            '<span class="pts">' + e.score.toLocaleString() + unit + '</span></li>';
        }).join('');
      }).catch(function () {});
    }

    function renderBoard(board) {
      var game = board.dataset.game;
      var unit = board.dataset.unit;
      var scoreKey = board.dataset.scoreKey;

      // 로그인 시 전체|친구 토글
      if (MY.loggedIn) {
        var toggle = document.createElement('div');
        toggle.className = 'scope-toggle';
        toggle.innerHTML = '<button type="button" class="active" data-scope="all">전체</button>' +
          '<button type="button" data-scope="friends">친구</button>';
        board.querySelector('h2').appendChild(toggle);
        toggle.querySelectorAll('button').forEach(function (b) {
          b.addEventListener('click', function () {
            toggle.querySelectorAll('button').forEach(function (x) { x.classList.remove('active'); });
            b.classList.add('active');
            loadScores(board, b.dataset.scope, unit);
          });
        });
      }
      loadScores(board, 'all', unit);

      // 내 최고 기록 — 로그인 시 서버값(크로스 디바이스), 아니면 localStorage 폴백
      var mine = 0;
      if (MY.loggedIn) {
        mine = parseInt(MY.scores[game] || 0, 10) || 0;
      } else {
        try { if (scoreKey) mine = parseInt(localStorage.getItem(scoreKey) || '0', 10) || 0; } catch (e) {}
      }
      if (mine > 0) {
        var div = document.createElement('div');
        div.className = 'mine';
        div.innerHTML = '<span class="label">내 기록</span>' +
          '<span class="val">' + mine.toLocaleString() + unit + '</span>' +
          '<button type="button">공유</button>';
        div.querySelector('button').addEventListener('click', function () {
          var vid = 'anon';
          try { vid = localStorage.getItem('gp_vid') || 'anon'; } catch (e) {}
          fetch('/api/score', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ visitor_id: vid, game: game, score: mine, meta: { from: 'rank-share' } })
          })
            .then(function (r) { return r.json(); })
            .then(function (data) {
              if (!data.share_url) return;
              var url = location.origin + data.share_url;
              // http(비보안) origin에선 share/clipboard 둘 다 없을 수 있다 —
              // 마지막 폴백은 공유 페이지로 직접 이동 (브라우저 메뉴로 공유 가능)
              if (navigator.share) {
                navigator.share({ url: url }).catch(function () {});
                return;
              }
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(function () {
                  alert('공유 링크를 복사했습니다.\n' + url);
                }).catch(function () { location.href = url; });
                return;
              }
              location.href = url;
            })
            .catch(function () {});
        });
        board.appendChild(div);
      }
    }
  </script>
  <script src="/portal.js" data-game="portal"></script>
  <script src="/account-widget.js"></script>
</body>
</html>
