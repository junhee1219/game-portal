<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>지표 — 미니게임</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/portal.css">
  <style>
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 28px; }
    .stat {
      background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
      padding: 16px;
    }
    .stat .label { font-size: var(--fs-3); color: var(--dim); margin-bottom: 6px; }
    .stat .num { font-size: var(--fs-1); font-weight: 800; letter-spacing: -0.01em; }
    .stat .num small { font-size: var(--fs-3); color: var(--dim); font-weight: 500; }
    table {
      width: 100%; border-collapse: collapse; background: var(--panel);
      border: 1px solid var(--line); border-radius: 14px; overflow: hidden;
      font-size: var(--fs-3);
    }
    th, td { padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--line); }
    th:first-child, td:first-child { text-align: left; }
    th { color: var(--dim); font-weight: 600; font-size: var(--fs-3); }
    tr:last-child td { border-bottom: none; }
    .back { display: inline-block; margin-bottom: 28px; color: var(--dim); text-decoration: none; font-size: var(--fs-3); }
    .section-title { font-size: var(--fs-2); font-weight: 700; margin-bottom: 10px; color: var(--dim); }
  </style>
</head>
<body>
  <main class="wrap">
    <a class="back" href="/">&larr; 게임 목록</a>
    <header class="hero" style="margin-bottom:32px">
      <p class="kicker">DASHBOARD</p>
      <h1 style="font-size: var(--fs-1)">지표</h1>
    </header>

    <div class="grid" id="cards">
      <div class="stat"><div class="label">전체 방문자</div><div class="num" id="total-visitors">-</div></div>
      <div class="stat"><div class="label">기록 보유자</div><div class="num" id="total-scores">-</div></div>
    </div>

    <p class="section-title">게임별 평균 세션</p>
    <table id="session-table">
      <thead><tr><th>게임</th><th>방문</th><th>평균 세션</th></tr></thead>
      <tbody><tr><td colspan="3" style="text-align:center;color:var(--dim)">불러오는 중</td></tr></tbody>
    </table>

    <p class="section-title" style="margin-top:28px">일별 방문자 (게임별)</p>
    <table id="daily-table">
      <thead><tr><th>날짜</th></tr></thead>
      <tbody><tr><td style="text-align:center;color:var(--dim)">불러오는 중</td></tr></tbody>
    </table>
  </main>
  <script>
    function fmtMs(ms) {
      if (!ms) return '-';
      var s = Math.round(ms / 1000);
      if (s < 60) return s + '초';
      return Math.floor(s / 60) + '분 ' + (s % 60) + '초';
    }

    // 게임 목록은 /api/games 단일 소스. 'portal'은 합성 소스라 dash에서만 덧붙인다.
    fetch('/api/games')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var playable = (data.games || []).map(function (g) { return { id: g.id, name: g.title }; });
        initDash(playable);
      })
      .catch(function () { initDash([]); });

    function initDash(playable) {
      var all = playable.concat([{ id: 'portal', name: '포털' }]);  // 방문 추적 합성 소스
      var allIds = all.map(function (g) { return g.id; });
      var playableIds = playable.map(function (g) { return g.id; });
      var names = {};
      all.forEach(function (g) { names[g.id] = g.name; });

      // 일별 테이블 헤더 동적 생성
      document.querySelector('#daily-table thead tr').innerHTML =
        '<th>날짜</th>' + all.map(function (g) { return '<th>' + g.name + '</th>'; }).join('');

      fetch('/api/stats').then(function (r) { return r.json(); }).then(function (d) {
        if (!d.ok) return;
        document.getElementById('total-visitors').textContent = (d.visitors || 0).toLocaleString();
        var tbody = document.querySelector('#session-table tbody');
        tbody.innerHTML = all.map(function (g) {
          return '<tr><td>' + names[g.id] + '</td><td>' + ((d.visits || {})[g.id] || 0) +
            '</td><td>' + fmtMs((d.avg_session_ms || {})[g.id]) + '</td></tr>';
        }).join('');
      }).catch(function () {});

      Promise.all(playableIds.map(function (g) {
        return fetch('/api/leaderboard/' + g + '?limit=50').then(function (r) { return r.json(); });
      })).then(function (boards) {
        var n = boards.reduce(function (a, b) { return a + (b.entries || []).length; }, 0);
        document.getElementById('total-scores').innerHTML = n.toLocaleString() + ' <small>명 기록</small>';
      }).catch(function () {});

      fetch('/api/stats/daily?days=14').then(function (r) { return r.json(); }).then(function (d) {
        if (!d.ok) return;
        var days = Object.keys(d.days || {}).sort().reverse();
        var tbody = document.querySelector('#daily-table tbody');
        if (!days.length) {
          tbody.innerHTML = '<tr><td colspan="' + (allIds.length + 1) +
            '" style="text-align:center;color:var(--dim)">아직 데이터 없음</td></tr>';
          return;
        }
        tbody.innerHTML = days.map(function (day) {
          var row = d.days[day] || {};
          return '<tr><td>' + day.slice(5) + '</td>' +
            allIds.map(function (g) { return '<td>' + (row[g] || 0) + '</td>'; }).join('') + '</tr>';
        }).join('');
      }).catch(function () {});
    }
  </script>
</body>
</html>
