<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#ece3d0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="한 획">
  <meta property="og:type" content="website">
  <meta property="og:title" content="한 획 — 오늘의 경로 한 번에 긋기">
  <meta property="og:description" content="숫자 들판 위로 손가락을 쭉 긋는다. 배수칸을 물고 돌아 최고 경로를 찾자. 오늘은 모두 같은 판.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <title>한 획</title>
  <style>
    @font-face{font-family:"Pretendard Variable";font-weight:45 920;font-style:normal;font-display:swap;src:url("/fonts/PretendardVariable.woff2") format("woff2-variations");}
    :root{
      --bg-a:#f0e8d7; --bg-b:#e6dcc6; --ink:#3a3327; --ink-soft:#8c8069;
      --face:#fbf6ea; --face-edge:#d8cbab;
      --gold:#d9822b; --gold-face:#f6e2bf; --teal:#2f9e8f; --teal-face:#cdeae4;
      --terra:#c1613f; --terra-face:#f0d6cb;
      --fs-2:16px; --fs-3:13px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--bg-b);}
    body{
      font-family:"Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
      background-color:var(--bg-b);
      background-image:radial-gradient(120% 90% at 50% 0%,var(--bg-a) 0%,var(--bg-b) 68%,#ddd2bb 100%);
      color:var(--ink);
      user-select:none;-webkit-user-select:none;touch-action:manipulation;
      overflow:hidden;
      --gp-shell-fg:#3a3327;
    }
    button{font:inherit;color:inherit;border:none;background:none;cursor:pointer;}
    .ki{width:22px;height:22px;display:block;fill:currentColor;}
    .wrap{
      height:100%;display:flex;flex-direction:column;align-items:center;
      gap:12px;padding:12px 14px calc(14px + env(safe-area-inset-bottom));max-width:480px;margin:0 auto;
    }
    /* top bar */
    .top{display:flex;align-items:center;gap:8px;width:100%;flex:0 0 auto;}
    .pill{
      display:flex;flex-direction:column;align-items:flex-start;gap:1px;
      border:1px solid var(--face-edge);background:var(--face);
      border-radius:13px;padding:6px 11px;box-shadow:0 2px 0 rgba(120,100,60,.16);
    }
    .pill .lab{color:var(--ink-soft);font-size:11px;font-weight:760;letter-spacing:.02em;}
    .pill .val{color:var(--ink);font-size:18px;font-weight:880;line-height:1;}
    .pill.hot .val{color:var(--gold);}
    .sp{margin-left:auto;}
    .icon-btn{
      width:40px;height:40px;border:1px solid var(--face-edge);border-radius:12px;
      background:var(--face);color:var(--ink-soft);
      display:flex;align-items:center;justify-content:center;box-shadow:0 2px 0 rgba(120,100,60,.16);
      transition:transform .1s,box-shadow .1s;flex:0 0 auto;
    }
    .icon-btn:active{transform:translateY(2px);box-shadow:0 0 0 rgba(0,0,0,0);}
    /* live score */
    .live{
      width:100%;flex:0 0 auto;display:flex;align-items:baseline;justify-content:center;gap:10px;
      min-height:44px;
    }
    .live .num{font-size:40px;font-weight:900;line-height:1;letter-spacing:-.01em;transition:transform .08s;}
    .live .num.pop{transform:scale(1.14);}
    .live .mult{
      font-size:19px;font-weight:880;color:var(--gold);opacity:0;transform:translateY(4px);
      transition:opacity .15s,transform .15s;
    }
    .live .mult.on{opacity:1;transform:none;}
    .live .budget{font-size:13px;font-weight:800;color:var(--ink-soft);}
    /* board */
    .board-wrap{width:100%;flex:1 1 auto;display:flex;align-items:center;justify-content:center;min-height:0;}
    .board{position:relative;touch-action:none;}
    .grid{
      display:grid;grid-template-columns:repeat(5,1fr);gap:8px;position:relative;z-index:2;
    }
    .trail{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:visible;}
    .cell{
      aspect-ratio:1/1;border-radius:15px;position:relative;
      display:flex;align-items:center;justify-content:center;
      background:var(--face);border:1px solid var(--face-edge);
      box-shadow:0 3px 0 var(--face-edge);
      font-size:24px;font-weight:860;color:#4a4030;
      transition:transform .09s,box-shadow .09s,filter .12s;
    }
    .cell .tag{position:absolute;top:5px;left:7px;font-size:10px;font-weight:800;color:var(--ink-soft);opacity:.75;}
    .cell.mult{background:var(--gold-face);border-color:#e6c688;box-shadow:0 3px 0 #e6c688;color:var(--gold);}
    .cell.gem{background:var(--teal-face);border-color:#9ed3ca;box-shadow:0 3px 0 #9ed3ca;color:var(--teal);}
    .cell.pen{background:var(--terra-face);border-color:#e0b2a2;box-shadow:0 3px 0 #e0b2a2;color:var(--terra);}
    .cell.on{transform:translateY(3px);box-shadow:0 0 0 rgba(0,0,0,0);filter:brightness(1.03);}
    .cell.on::after{
      content:"";position:absolute;inset:-2px;border-radius:16px;
      border:2.5px solid var(--gold);pointer-events:none;
    }
    .cell.pop{animation:cpop .22s ease;}
    @keyframes cpop{0%{transform:translateY(3px) scale(1);}45%{transform:translateY(3px) scale(1.1);}100%{transform:translateY(3px) scale(1);}}
    /* result / share */
    .foot{width:100%;flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:8px;min-height:64px;}
    .result{font-size:15px;font-weight:800;color:var(--ink);text-align:center;min-height:20px;}
    .result .best{color:var(--gold);}
    .hintline{font-size:12.5px;font-weight:720;color:var(--ink-soft);text-align:center;line-height:1.4;}
    .share{
      display:none;align-items:center;gap:7px;
      background:var(--ink);color:#f6efe0;border-radius:12px;padding:10px 18px;
      font-size:14px;font-weight:820;box-shadow:0 3px 0 rgba(60,50,30,.35);transition:transform .1s,box-shadow .1s;
    }
    .share:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(60,50,30,.35);}
    .share.show{display:flex;}
    .share .ki{width:17px;height:17px;}
    .toast{
      position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(10px);
      background:var(--ink);color:#f6efe0;padding:9px 16px;border-radius:999px;
      font-size:13px;font-weight:800;opacity:0;transition:opacity .2s,transform .2s;z-index:50;pointer-events:none;
    }
    .toast.show{opacity:1;transform:translateX(-50%);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="pill hot"><span class="lab">오늘 최고</span><span class="val" id="pToday">0</span></div>
      <div class="pill"><span class="lab">연속</span><span class="val" id="pStreak">0<span style="font-size:12px;font-weight:760">일</span></span></div>
      <div class="pill"><span class="lab">최적까지</span><span class="val" id="pPct">–</span></div>
      <button class="icon-btn sp" id="muteBtn" aria-label="소리"><svg class="ki"><use href="#i-sound"/></svg></button>
    </div>

    <div class="live">
      <span class="num" id="liveNum">0</span>
      <span class="mult" id="liveMult">×2</span>
      <span class="budget" id="liveBudget"></span>
    </div>

    <div class="board-wrap">
      <div class="board" id="board">
        <div class="grid" id="grid"></div>
        <svg class="trail" id="trail" preserveAspectRatio="none">
          <polyline id="trailLine" fill="none" stroke="var(--gold)" stroke-width="7"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
        </svg>
      </div>
    </div>

    <div class="foot">
      <div class="result" id="result"></div>
      <div class="hintline" id="hint">숫자 위로 손가락을 쭉 그으세요 — 지나간 만큼 점수가 차올라요</div>
      <button class="share" id="shareBtn"><svg class="ki"><use href="#i-share"/></svg>결과 공유</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <symbol id="i-sound" viewBox="0 0 256 256"><path d="M155.5 24.8a8 8 0 0 0-8.4.9L77.2 80H32a16 16 0 0 0-16 16v64a16 16 0 0 0 16 16h45.2l69.9 54.3a8 8 0 0 0 12.9-6.3V32a8 8 0 0 0-4.5-7.2ZM200 96a8 8 0 0 0 0 16 16 16 0 0 1 0 32 8 8 0 0 0 0 16 32 32 0 0 0 0-64Z"/></symbol>
    <symbol id="i-mute" viewBox="0 0 256 256"><path d="M155.5 24.8a8 8 0 0 0-8.4.9L77.2 80H32a16 16 0 0 0-16 16v64a16 16 0 0 0 16 16h45.2l69.9 54.3a8 8 0 0 0 12.9-6.3V32a8 8 0 0 0-4.5-7.2ZM243.3 116.7 227.3 132.7l16 16a8 8 0 0 1-11.3 11.3l-16-16-16 16a8 8 0 0 1-11.3-11.3l16-16-16-16a8 8 0 0 1 11.3-11.3l16 16 16-16a8 8 0 0 1 11.3 11.3Z"/></symbol>
    <symbol id="i-share" viewBox="0 0 256 256"><path d="M176 160a39.7 39.7 0 0 0-28.6 12.1l-46.1-29.6a40 40 0 0 0 0-29l46.1-29.6a40 40 0 1 0-8.7-13.4l-46.1 29.6a40 40 0 1 0 0 55.8l46.1 29.6A40 40 0 1 0 176 160Z"/></symbol>
  </svg>

  <script>
  (function(){
    "use strict";
    var GID='trace';
    var K={best:'traceBest', daily:'traceDaily', save:'traceSave', muted:'traceMuted'};
    var N=5, BUDGET=9;

    // ── 저장 헬퍼 ──────────────────────────────────────────
    function getNum(k){ var v=+localStorage.getItem(k); return isFinite(v)?v:0; }
    function getObj(k){ try{ return JSON.parse(localStorage.getItem(k))||null; }catch(e){ return null; } }

    // ── 결정론 PRNG (mulberry32) ───────────────────────────
    function hashStr(s){ var h=2166136261>>>0; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
    function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

    // ── 날짜 (KST 달력일) ──────────────────────────────────
    function dayStr(d){ return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Seoul'}).format(d); }
    function todayStr(){ return dayStr(new Date()); }
    function prevStr(ds){ var p=ds.split('-'); var dt=new Date(Date.UTC(+p[0],+p[1]-1,+p[2],12,0,0)); dt.setUTCDate(dt.getUTCDate()-1); return dayStr(dt); }

    // ── 격자 생성 ──────────────────────────────────────────
    // cell: {type:'num'|'mult'|'gem'|'pen', val:number}  (mult은 val 무의미)
    function genGrid(ds){
      var rng=mulberry32(hashStr('trace|'+ds));
      var cells=[]; var i;
      for(i=0;i<N*N;i++) cells.push({type:'num', val:1+Math.floor(rng()*9)}); // 1..9
      var idx=[]; for(i=0;i<N*N;i++) idx.push(i);
      // Fisher-Yates
      for(i=idx.length-1;i>0;i--){ var j=Math.floor(rng()*(i+1)); var t=idx[i]; idx[i]=idx[j]; idx[j]=t; }
      var p=0;
      // 2 배수칸
      cells[idx[p++]]={type:'mult', val:2};
      cells[idx[p++]]={type:'mult', val:2};
      // 2 보석칸 (18..32)
      cells[idx[p++]]={type:'gem', val:18+Math.floor(rng()*15)};
      cells[idx[p++]]={type:'gem', val:18+Math.floor(rng()*15)};
      // 3 감점칸 (-6..-14)
      cells[idx[p++]]={type:'pen', val:-(6+Math.floor(rng()*9))};
      cells[idx[p++]]={type:'pen', val:-(6+Math.floor(rng()*9))};
      cells[idx[p++]]={type:'pen', val:-(6+Math.floor(rng()*9))};
      return cells;
    }

    // ── 점수 ───────────────────────────────────────────────
    // 경로를 순서대로 진입: 배수칸이면 M*=2(획득 0), 그 외는 score += val*M.
    function scorePath(path, grid){
      var M=1, s=0;
      for(var i=0;i<path.length;i++){
        var c=grid[path[i]];
        if(c.type==='mult'){ M*=2; } else { s+=c.val*M; }
      }
      return s;
    }
    function adj(a,b){ var ar=(a/N)|0, ac=a%N, br=(b/N)|0, bc=b%N; return Math.abs(ar-br)+Math.abs(ac-bc)===1; }
    function neighbors(i){ var r=(i/N)|0, c=i%N, out=[]; if(r>0)out.push(i-N); if(r<N-1)out.push(i+N); if(c>0)out.push(i-1); if(c<N-1)out.push(i+1); return out; }

    // ── 최적 근사 (빔 서치) ────────────────────────────────
    // 어떤 접두 경로도 유효한 획이므로 탐색 중 마주친 최대 점수를 par로 삼는다.
    function estimatePar(grid){
      var BEAM=2500;
      var beam=[]; var best=0; var i;
      for(i=0;i<N*N;i++){
        var c=grid[i];
        var st={cell:i, vis:(1<<i)>>>0, M:c.type==='mult'?2:1, s:c.type==='mult'?0:c.val};
        best=Math.max(best,st.s); beam.push(st);
      }
      for(var depth=1; depth<BUDGET; depth++){
        var next=[];
        for(var b=0;b<beam.length;b++){
          var st0=beam[b], nb=neighbors(st0.cell);
          for(var n=0;n<nb.length;n++){
            var v=nb[n]; if(st0.vis&(1<<v)) continue;
            var cc=grid[v], M=st0.M, s=st0.s;
            if(cc.type==='mult'){ M*=2; } else { s+=cc.val*M; }
            var ns={cell:v, vis:(st0.vis|(1<<v))>>>0, M:M, s:s};
            if(s>best) best=s;
            next.push(ns);
          }
        }
        if(!next.length) break;
        // 현재 점수 + 남은 칸을 배수 이득으로 낙관 추정한 키로 정렬 (배수 물은 상태 보존)
        var rem=BUDGET-1-depth;
        next.sort(function(a,b2){ return (b2.s+b2.M*6*rem)-(a.s+a.M*6*rem); });
        beam=next.slice(0,BEAM);
      }
      return Math.max(1,best);
    }

    // ── 상태 ───────────────────────────────────────────────
    var TODAY=todayStr();
    var grid=genGrid(TODAY);
    var par=estimatePar(grid);
    var daily=loadDaily();
    var allBest=getNum(K.best);

    function loadDaily(){
      var d=getObj(K.daily);
      if(!d || d.date!==TODAY){
        // 새 날: streak 연속성 판정 (연속은 '판 완료' 시 확정)
        var carry = (d && d.date===prevStr(TODAY)) ? (d.streak||0) : 0;
        d={ date:TODAY, todayBest:0, streak:carry, played:false };
        localStorage.setItem(K.daily, JSON.stringify(d)); // date 롤오버는 저장(진행 없음, race 무관)
      }
      return d;
    }

    // ── DOM ────────────────────────────────────────────────
    var gridEl=document.getElementById('grid');
    var boardEl=document.getElementById('board');
    var trailLine=document.getElementById('trailLine');
    var trailSvg=document.getElementById('trail');
    var liveNum=document.getElementById('liveNum');
    var liveMult=document.getElementById('liveMult');
    var liveBudget=document.getElementById('liveBudget');
    var resultEl=document.getElementById('result');
    var hintEl=document.getElementById('hint');
    var shareBtn=document.getElementById('shareBtn');
    var pToday=document.getElementById('pToday');
    var pStreak=document.getElementById('pStreak');
    var pPct=document.getElementById('pPct');
    var muteBtn=document.getElementById('muteBtn');
    var toastEl=document.getElementById('toast');
    var cellEls=[];

    function buildBoard(){
      gridEl.innerHTML='';
      cellEls=[];
      for(var i=0;i<N*N;i++){
        var c=grid[i];
        var el=document.createElement('div');
        el.className='cell'+(c.type==='mult'?' mult':c.type==='gem'?' gem':c.type==='pen'?' pen':'');
        el.dataset.i=i;
        var txt = c.type==='mult' ? '×2' : (c.val>0? c.val : c.val);
        el.innerHTML='<span class="face">'+txt+'</span>';
        gridEl.appendChild(el);
        cellEls.push(el);
      }
    }

    // ── 드래그(한 획) ──────────────────────────────────────
    var path=[], dragging=false, centers=[];
    function measure(){
      // 각 칸 중심을 board 기준 픽셀로
      centers=[];
      var br=boardEl.getBoundingClientRect();
      trailSvg.setAttribute('viewBox','0 0 '+br.width+' '+br.height);
      for(var i=0;i<cellEls.length;i++){
        var r=cellEls[i].getBoundingClientRect();
        centers.push([r.left-br.left+r.width/2, r.top-br.top+r.height/2]);
      }
    }
    function cellAt(x,y){
      var el=document.elementFromPoint(x,y);
      while(el && el!==document.body){
        if(el.classList && el.classList.contains('cell')) return +el.dataset.i;
        el=el.parentElement;
      }
      return -1;
    }
    function clearPathVisual(){
      for(var i=0;i<cellEls.length;i++) cellEls[i].classList.remove('on');
      trailLine.setAttribute('points','');
    }
    function startAt(i){
      clearPathVisual();
      resultEl.textContent=''; shareBtn.classList.remove('show');
      path=[i]; dragging=true; refresh(true); tick(grid[i]);
    }
    function extendTo(i){
      if(!dragging) return;
      // 백트랙: 직전 칸으로 돌아오면 마지막 pop
      if(path.length>=2 && i===path[path.length-2]){ path.pop(); refresh(false); tick(null); return; }
      if(path.length>=BUDGET) return;
      if(path.indexOf(i)>=0) return;
      if(!adj(path[path.length-1], i)) return;
      path.push(i); refresh(true); tick(grid[i]);
    }
    function endStroke(){
      if(!dragging) return; dragging=false; finalize();
    }
    function refresh(pop){
      // 칸 하이라이트
      var inPath={}; for(var k=0;k<path.length;k++) inPath[path[k]]=true;
      for(var i=0;i<cellEls.length;i++){
        var on=!!inPath[i];
        var was=cellEls[i].classList.contains('on');
        if(on && !was){ cellEls[i].classList.add('on'); if(pop){ cellEls[i].classList.remove('pop'); void cellEls[i].offsetWidth; cellEls[i].classList.add('pop'); } }
        else if(!on && was){ cellEls[i].classList.remove('on'); }
      }
      // 트레일
      var pts=''; for(var j=0;j<path.length;j++){ var c=centers[path[j]]; if(c) pts+=c[0]+','+c[1]+' '; }
      trailLine.setAttribute('points', pts.trim());
      // 라이브 점수 / 배수 / 예산
      var M=1,s=0,mult=false;
      for(var q=0;q<path.length;q++){ var cc=grid[path[q]]; if(cc.type==='mult'){ M*=2; mult=true; } else { s+=cc.val*M; } }
      liveNum.textContent=fmt(s);
      liveNum.style.color = s<0?'var(--terra)':(mult?'var(--gold)':'var(--ink)');
      if(M>1){ liveMult.textContent='×'+M; liveMult.classList.add('on'); } else liveMult.classList.remove('on');
      var remain=BUDGET-path.length;
      liveBudget.textContent = path.length? ('· 남은 '+remain+'칸') : '';
      if(pop){ liveNum.classList.remove('pop'); void liveNum.offsetWidth; liveNum.classList.add('pop'); }
    }
    function finalize(){
      if(path.length<1){ return; }
      var s=scorePath(path, grid);
      var pct=Math.round(s/par*100);
      var newToday = s>daily.todayBest;
      var newAll = s>allBest;
      if(s>daily.todayBest) daily.todayBest=s;
      // 연속 확정: 오늘 첫 완료
      if(!daily.played){ daily.streak=(daily.streak||0)+1; daily.played=true; }
      localStorage.setItem(K.daily, JSON.stringify(daily));
      if(newAll){ allBest=s; localStorage.setItem(K.best, String(s)); } // portal이 traceBest 캡처
      // 오늘 최고 경로 저장(로컬 복원용; 부팅 시 쓰지 않음)
      if(newToday){ localStorage.setItem(K.save, JSON.stringify({date:TODAY, path:path.slice(), score:s})); }

      // 결과 문구
      var msg;
      if(newAll) msg='<span class="best">역대 신기록 '+fmt(s)+'점!</span>';
      else if(newToday) msg='<span class="best">오늘 최고 갱신 '+fmt(s)+'점!</span>';
      else msg=fmt(s)+'점';
      var pctTxt = pct>=100 ? '· 최적 돌파!' : ('· 최적의 '+pct+'%');
      resultEl.innerHTML=msg+' '+pctTxt;
      hintEl.textContent = pct>=100 ? '오늘 판을 완전히 털었어요' : (pct>=90?'거의 완벽 — 더 나은 길이 남았을까?':'배수칸을 먼저 물고 돌면 점수가 커져요');
      shareBtn.classList.add('show');
      syncHud();
      if(newAll){ chime(); big(); } else if(newToday){ chime(); }
    }

    function syncHud(){
      pToday.textContent=fmt(daily.todayBest);
      pStreak.innerHTML=(daily.streak||0)+'<span style="font-size:12px;font-weight:760">일</span>';
      var best = daily.todayBest;
      var pct = best>0 ? Math.min(100, Math.round(best/par*100)) : 0;
      pPct.textContent = best>0 ? (pct+'%') : '–';
    }
    function fmt(n){ n=Math.round(n); var neg=n<0; n=Math.abs(n); return (neg?'-':'')+n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,','); }

    // ── 사운드 ─────────────────────────────────────────────
    var muted = localStorage.getItem(K.muted)==='1';
    var ac=null;
    function actx(){ if(!ac){ try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return ac; }
    function beep(freq, dur, vol){
      if(muted) return; var a=actx(); if(!a) return;
      if(a.state==='suspended') a.resume();
      var o=a.createOscillator(), g=a.createGain();
      o.type='sine'; o.frequency.value=freq;
      g.gain.value=vol||0.05; o.connect(g); g.connect(a.destination);
      var t=a.currentTime; o.start(t);
      g.gain.setValueAtTime(g.gain.value,t); g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.08));
      o.stop(t+(dur||0.08)+0.02);
    }
    var tickStep=0;
    function tick(cell){
      if(!cell){ beep(320,0.05,0.03); return; }
      if(cell.type==='mult'){ beep(660,0.12,0.06); beep(990,0.12,0.05); }
      else if(cell.type==='gem'){ beep(880,0.14,0.06); }
      else if(cell.type==='pen'){ beep(180,0.1,0.05); }
      else { tickStep=(tickStep+1)%8; beep(440+tickStep*28,0.05,0.035); }
    }
    function chime(){ beep(784,0.14,0.06); setTimeout(function(){beep(1046,0.18,0.06);},90); }
    function updMute(){ muteBtn.querySelector('use').setAttribute('href', muted?'#i-mute':'#i-sound'); }
    muteBtn.addEventListener('click', function(){ muted=!muted; localStorage.setItem(K.muted, muted?'1':'0'); updMute(); if(!muted) beep(660,0.08,0.05); });

    function big(){ /* 최소 연출: 라이브 숫자 큰 팝 */ liveNum.classList.remove('pop'); void liveNum.offsetWidth; liveNum.classList.add('pop'); }
    function toast(t){ toastEl.textContent=t; toastEl.classList.add('show'); setTimeout(function(){toastEl.classList.remove('show');},1600); }

    // ── 공유 ───────────────────────────────────────────────
    shareBtn.addEventListener('click', function(){
      var best=daily.todayBest;
      var pct=Math.min(100, Math.round(best/par*100));
      var txt='한 획 · 오늘 '+fmt(best)+'점 · 최적 '+pct+'% · '+(daily.streak||0)+'일 연속\nhttps://mini-game.kr';
      if(navigator.share){ navigator.share({text:txt}).catch(function(){}); }
      else if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(function(){toast('결과를 복사했어요');},function(){toast(txt);}); }
      else toast(txt);
    });

    // ── 입력 바인딩 ────────────────────────────────────────
    boardEl.addEventListener('pointerdown', function(e){
      e.preventDefault();
      try{ boardEl.setPointerCapture(e.pointerId); }catch(_){}
      var i=cellAt(e.clientX,e.clientY); if(i>=0) startAt(i);
    });
    boardEl.addEventListener('pointermove', function(e){
      if(!dragging) return; e.preventDefault();
      var i=cellAt(e.clientX,e.clientY); if(i>=0) extendTo(i);
    });
    boardEl.addEventListener('pointerup', function(e){ endStroke(); });
    boardEl.addEventListener('pointercancel', function(e){ endStroke(); });

    window.addEventListener('resize', function(){ measure(); });

    // ── 시작 ───────────────────────────────────────────────
    buildBoard();
    updMute();
    syncHud();
    requestAnimationFrame(function(){ measure(); });
    liveBudget.textContent='';
    // 예산 안내
    hintEl.textContent='숫자 위로 손가락을 쭉 그으세요 — 한 획 최대 '+BUDGET+'칸';

    // 오늘 최고 경로 복원(로컬): 저장된 게 있으면 살짝 보여줄 수도 있으나 프로토는 생략(즉시 새 획 유도)
  })();
  </script>
  <script>
    if('serviceWorker' in navigator && location.protocol === 'https:') navigator.serviceWorker.register('./sw.js');
  </script>
</body>
