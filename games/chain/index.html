<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1a2430">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="연쇄 장치">
  <meta property="og:type" content="website">
  <meta property="og:title" content="연쇄 장치 — 부품을 놓고 한 번에 굴리는 물리 퍼즐">
  <meta property="og:description" content="한정된 부품을 조용히 배치하고, 실행 한 번으로 구슬의 연쇄 반응이 모든 표적을 켜게 하세요.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>연쇄 장치</title>
  <style>
    @font-face{font-family:"Pretendard Variable";font-weight:45 920;font-style:normal;font-display:swap;src:url("/fonts/PretendardVariable.woff2") format("woff2-variations");}
    :root{
      --bg:#1a2430; --bg2:#141c26;
      --ink:#eef3f7; --ink-soft:#9fb0bf;
      --brass:#d8a24a; --brass-deep:#9c6f28;
      --steel:#cfd8e0;
      --line:rgba(160,180,200,.14);
      --panel:rgba(20,28,38,.72);
      --good:#ffcf7a;
      --fs-1:clamp(24px,7vw,34px); --fs-2:16px; --fs-3:13px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--bg);}
    body{font-family:"Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
      color:var(--ink);overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:none;
      display:flex;flex-direction:column;height:100dvh;}
    button{font:inherit;color:inherit;border:none;background:none;cursor:pointer;}
    .ki{width:22px;height:22px;fill:currentColor;display:block;}

    /* ── 상단 HUD ── */
    #hud{flex:0 0 auto;display:flex;align-items:center;gap:8px;
      padding:calc(8px + env(safe-area-inset-top)) 12px 8px;}
    .icon-btn{width:38px;height:38px;flex:0 0 auto;border:1px solid var(--line);border-radius:11px;
      background:var(--panel);color:#cdd8e2;display:flex;align-items:center;justify-content:center;transition:transform .1s ease;}
    .icon-btn:active{transform:scale(.92);}
    #title{flex:1 1 auto;text-align:center;min-width:0;}
    #title .lv{font-size:var(--fs-3);color:var(--ink-soft);font-weight:700;letter-spacing:.02em;}
    #title .nm{font-size:var(--fs-2);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .pill{display:flex;align-items:center;gap:5px;white-space:nowrap;border:1px solid var(--line);
      background:var(--panel);border-radius:999px;padding:6px 11px;color:var(--ink-soft);font-size:var(--fs-3);font-weight:700;}
    .pill b{color:var(--good);font-size:var(--fs-2);font-variant-numeric:tabular-nums;}

    /* ── 레벨 리본 ── */
    #ribbon{flex:0 0 auto;display:flex;gap:6px;padding:0 12px 6px;overflow-x:auto;scrollbar-width:none;}
    #ribbon::-webkit-scrollbar{display:none;}
    .lvchip{flex:0 0 auto;width:34px;height:34px;border-radius:10px;border:1px solid var(--line);
      background:var(--panel);color:var(--ink-soft);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;position:relative;}
    .lvchip.on{background:linear-gradient(180deg,#2a3a4c,#20303f);color:var(--ink);border-color:rgba(216,162,74,.5);}
    .lvchip.locked{opacity:.4;}
    .lvchip .st{position:absolute;bottom:-3px;right:-3px;font-size:9px;color:var(--good);font-weight:900;}

    /* ── 캔버스 무대 ── */
    #stage{flex:1 1 auto;position:relative;min-height:0;width:100%;}
    #cv{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
    #popover{position:absolute;z-index:8;display:none;gap:6px;transform:translate(-50%,-118%);}
    #popover button{width:44px;height:40px;border-radius:11px;border:1px solid var(--line);
      background:rgba(28,38,50,.95);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);}
    #popover button:active{transform:scale(.92);}
    #popover .rm{color:#ff9a8a;}

    #toast{position:absolute;left:50%;top:14px;transform:translateX(-50%);z-index:7;
      background:rgba(20,28,38,.9);border:1px solid var(--line);border-radius:999px;padding:7px 15px;
      font-size:var(--fs-3);font-weight:700;color:var(--ink);opacity:0;transition:opacity .25s ease;pointer-events:none;white-space:nowrap;}
    #toast.show{opacity:1;}

    /* 실시간 등불 카운터 */
    #counter{position:absolute;left:50%;top:12px;transform:translateX(-50%);z-index:6;pointer-events:none;
      display:flex;align-items:center;gap:7px;background:rgba(20,28,38,.82);border:1px solid var(--line);
      border-radius:999px;padding:6px 14px;box-shadow:0 3px 10px rgba(0,0,0,.35);transition:transform .12s ease;}
    #counter .dot{width:10px;height:10px;border-radius:50%;background:#3a4a5a;border:1px solid rgba(255,255,255,.08);transition:background .2s ease,box-shadow .2s ease,transform .2s ease;}
    #counter .dot.on{background:#ffcf7a;box-shadow:0 0 8px rgba(255,207,122,.7);transform:scale(1.12);}
    #counter .lbl{font-size:var(--fs-3);font-weight:800;color:var(--ink-soft);white-space:nowrap;}
    #counter .lbl b{color:var(--good);}
    #counter.bump{transform:translateX(-50%) scale(1.1);}
    #counter.full .lbl b{color:#fff2d6;}

    /* 전부 켜짐 성공 플래시(최소) */
    #flash{position:absolute;inset:0;z-index:9;pointer-events:none;opacity:0;
      background:radial-gradient(circle at 50% 55%,rgba(255,207,122,.42),rgba(255,207,122,0) 62%);}
    #flash.go{animation:flashGo .62s ease-out;}
    @keyframes flashGo{0%{opacity:0;}18%{opacity:1;}100%{opacity:0;}}

    /* ── 하단 부품 트레이 + 실행 ── */
    #dock{flex:0 0 auto;padding:8px 12px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(180deg,transparent,rgba(15,21,29,.6) 30%);}
    #tray{display:flex;gap:8px;margin-bottom:9px;}
    .part{flex:1 1 0;min-width:0;border:1px solid var(--line);border-radius:14px;background:var(--panel);
      padding:9px 6px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;transition:transform .08s ease,border-color .12s ease;}
    .part:active{transform:scale(.96);}
    .part.sel{border-color:var(--good);background:linear-gradient(180deg,#2b3a4c,#1e2d3c);}
    .part.empty{opacity:.34;}
    .part .pv{width:44px;height:30px;}
    .part .nm{font-size:11px;font-weight:700;color:var(--ink-soft);}
    .part .ct{font-size:12px;font-weight:900;color:var(--good);font-variant-numeric:tabular-nums;}
    .part.sel .nm{color:var(--ink);}

    #run{width:100%;height:56px;border-radius:16px;font-size:18px;font-weight:900;letter-spacing:.04em;
      background:linear-gradient(180deg,#e6b25c,#c88a2f);color:#20160a;
      box-shadow:0 4px 0 #8f611f, 0 8px 18px rgba(0,0,0,.35);transition:transform .09s ease,box-shadow .09s ease,filter .15s ease;}
    #run:active{transform:translateY(3px);box-shadow:0 1px 0 #8f611f,0 4px 10px rgba(0,0,0,.35);}
    #run.running{background:linear-gradient(180deg,#5a6b7c,#3f4e5d);color:#e6eef5;box-shadow:0 4px 0 #2a3540,0 8px 18px rgba(0,0,0,.35);}
    #run:disabled{filter:grayscale(.5) brightness(.8);}
    #run.pulse{animation:runPulse 1.3s ease-in-out infinite;}
    @keyframes runPulse{0%,100%{box-shadow:0 4px 0 #8f611f,0 8px 18px rgba(0,0,0,.35);}50%{box-shadow:0 4px 0 #8f611f,0 8px 18px rgba(0,0,0,.35),0 0 0 4px rgba(255,207,122,.4);}}

    /* ── 결과 시트 ── */
    #sheet,#intro{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
      background:rgba(10,15,20,.66);backdrop-filter:blur(3px);padding:22px;}
    #sheet.show,#intro.show{display:flex;}
    .card{width:100%;max-width:340px;background:linear-gradient(180deg,#22303f,#18232f);border:1px solid var(--line);
      border-radius:22px;padding:26px 22px 20px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.5);}
    .card h2{font-size:26px;font-weight:900;margin-bottom:4px;}
    .card p{font-size:var(--fs-3);color:var(--ink-soft);margin-bottom:16px;}
    .stars{display:flex;justify-content:center;gap:10px;margin:6px 0 18px;}
    .stars svg{width:44px;height:44px;fill:#3a4a5a;transition:fill .3s ease,transform .3s ease;}
    .stars svg.on{fill:var(--good);filter:drop-shadow(0 0 8px rgba(255,207,122,.5));}
    .card .row{display:flex;gap:10px;}
    .card .row button{flex:1 1 0;height:50px;border-radius:14px;font-size:16px;font-weight:800;}
    .btn-primary{background:linear-gradient(180deg,#e6b25c,#c88a2f);color:#20160a;box-shadow:0 3px 0 #8f611f;}
    .btn-primary:active{transform:translateY(2px);box-shadow:0 1px 0 #8f611f;}
    .btn-ghost{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--ink);}
    #supportLine{margin-top:14px;font-size:12px;color:var(--ink-soft);text-decoration:underline;background:none;display:inline-block;}
    .hint{font-size:11px;color:var(--ink-soft);text-align:center;padding:4px 0 0;opacity:.75;}
  </style>
</head>
<body>
  <!-- 아이콘 심볼 (Phosphor-style, 임시) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <symbol id="p-speaker-on" viewBox="0 0 256 256"><path d="M155 24a8 8 0 0 0-8.4.9L77.3 80H40a16 16 0 0 0-16 16v64a16 16 0 0 0 16 16h37.3l69.3 55.1A8 8 0 0 0 160 224V32a8 8 0 0 0-5-8Zm45 44a8 8 0 0 0-1 11.3 40 40 0 0 1 0 49.4A8 8 0 0 0 210 190a56 56 0 0 0 0-124Z"/></symbol>
    <symbol id="p-speaker-off" viewBox="0 0 256 256"><path d="M155 24a8 8 0 0 0-8.4.9L77.3 80H40a16 16 0 0 0-16 16v64a16 16 0 0 0 16 16h37.3l69.3 55.1A8 8 0 0 0 160 224V32a8 8 0 0 0-5-8Zm82 92 18-18a8 8 0 0 0-11.3-11.3l-18 18-18-18A8 8 0 0 0 196 116l18 18-18 18A8 8 0 0 0 207 163l18-18 18 18A8 8 0 0 0 254 152Z"/></symbol>
    <symbol id="p-reset" viewBox="0 0 256 256"><path d="M224 128a96 96 0 1 1-28-68 8 8 0 0 1-11 11 80 80 0 1 0 23 57V120a8 8 0 0 1 16 0Zm-8-88a8 8 0 0 0-8 8v20l-4-4a8 8 0 0 0-11 11l16 16a8 8 0 0 0 11 0l16-16a8 8 0 0 0-11-11l-4 4V48a8 8 0 0 0-8-8Z"/></symbol>
    <symbol id="p-rotate" viewBox="0 0 256 256"><path d="M232 64v48a8 8 0 0 1-8 8h-48a8 8 0 0 1 0-16h27L184 84a80 80 0 1 0 5 104 8 8 0 1 1 12 10A96 96 0 1 1 195 73l21 21V64a8 8 0 0 1 16 0Z"/></symbol>

    <symbol id="p-star" viewBox="0 0 256 256"><path d="M239 97.3a16 16 0 0 0-13.8-11l-58-4.7-22.3-53.4a16 16 0 0 0-29.6 0L92.9 81.6 35 86.3a16 16 0 0 0-9.1 28l44.2 37.9-13.5 56.6a16 16 0 0 0 23.9 17.4L128 195l47.5 31.2a16 16 0 0 0 23.9-17.4l-13.5-56.6 44.2-37.9a16 16 0 0 0 4.9-16Z"/></symbol>
  </svg>

  <header id="hud">
    <button class="icon-btn" id="btnReset" aria-label="배치 초기화"><svg class="ki"><use href="#p-reset"/></svg></button>
    <div id="title"><div class="lv" id="lvLabel">레벨 1</div><div class="nm" id="lvName">첫 경사</div></div>
    <div class="pill">최고 <b id="bestVal">–</b></div>
    <button class="icon-btn" id="btnMute" aria-label="소리"><svg class="ki"><use href="#p-speaker-on"/></svg></button>
  </header>

  <nav id="ribbon"></nav>

  <main id="stage">
    <canvas id="cv"></canvas>
    <div id="counter"><span id="cDots"></span><span class="lbl">등불 <b id="cNum">0</b>/<span id="cTot">0</span></span></div>
    <div id="flash"></div>
    <div id="popover">
      <button id="popRotate" aria-label="회전"><svg class="ki"><use href="#p-rotate"/></svg></button>
      <button id="popRemove" class="rm" aria-label="제거"><svg class="ki"><use href="#p-trash"/></svg></button>
    </div>
    <div id="toast"></div>
  </main>

  <footer id="dock">
    <div id="tray"></div>
    <button id="run">실 행</button>
    <div class="hint" id="hint">부품을 골라 무대를 탭해 놓으세요</div>
  </footer>

  <div id="intro"><div class="card">
    <h2>연쇄 장치</h2>
    <p style="margin-bottom:14px;line-height:1.55;">부품을 놓고 <b style="color:var(--good)">실행</b>을 누르면 구슬이 굴러<br>모든 <b style="color:var(--good)">등불</b>을 켜요. 궤적을 미리 설계하는 퍼즐!<br>부품을 <b style="color:var(--good)">적게</b> 쓰고 다 켤수록 별이 많아요.</p>
    <div class="row"><button class="btn-primary" id="introGo">해볼게요</button></div>
  </div></div>

  <div id="sheet"><div class="card">
    <h2 id="rsTitle">완성!</h2>
    <p id="rsSub"></p>
    <div class="stars" id="rsStars">
      <svg><use href="#p-star"/></svg><svg><use href="#p-star"/></svg><svg><use href="#p-star"/></svg>
    </div>
    <div class="row">
      <button class="btn-ghost" id="rsRetry">다시 짜기</button>
      <button class="btn-primary" id="rsNext">다음 레벨</button>
    </div>
    <button id="supportLine">이 실험을 응원하기</button>
  </div></div>

<script>
"use strict";
/* ═══════════════ chain — 연쇄 장치 (프로토타입) ═══════════════ */

/* ---- 결정론적 물리 코어 (node로 검증한 것과 동일) ---- */
const W = 390, H = 680;
const BALL_R = 9;
const G = 0.11, VMAX = 6.2;
const WALL_E = 0.45;
const RAMP_E = 0.5, RAMP_FRICTION = 0.86, RAMP_HALF = 5, RAMP_LEN = 74;
const BUMP_E = 1.02, BUMP_R = 15;
const PEG_E = 0.4;
const SPRING_LAUNCH = 8.6, SPRING_R = 20;
const DRAIN_Y = H + 40;
const SUBSTEPS_PER_FRAME = 2;

function hyp(x, y){ return Math.hypot(x, y); }
function closestOnSeg(ax, ay, bx, by, px, py){
  const dx = bx-ax, dy = by-ay, l2 = dx*dx+dy*dy;
  if (l2 === 0) return [ax, ay];
  let t = ((px-ax)*dx + (py-ay)*dy)/l2; t = Math.max(0, Math.min(1, t));
  return [ax + t*dx, ay + t*dy];
}
function rampEnds(p){
  const hx = Math.cos(p.ang)*RAMP_LEN/2, hy = Math.sin(p.ang)*RAMP_LEN/2;
  return [p.x-hx, p.y-hy, p.x+hx, p.y+hy];
}
function resolveCircle(b, cx, cy, cr, e){
  const dx = b.x-cx, dy = b.y-cy; let d = hyp(dx, dy); const min = BALL_R+cr;
  if (d < min){ if (d===0) d=0.001; const nx=dx/d, ny=dy/d, pen=min-d;
    b.x += nx*pen; b.y += ny*pen; const vn = b.vx*nx + b.vy*ny;
    if (vn < 0){ b.vx -= (1+e)*vn*nx; b.vy -= (1+e)*vn*ny; } }
}
function resolveSeg(b, ax, ay, bx, by, half, e, fric){
  const [px, py] = closestOnSeg(ax, ay, bx, by, b.x, b.y);
  let dx = b.x-px, dy = b.y-py; let d = hyp(dx, dy); const min = BALL_R+half;
  if (d < min){
    if (d===0){ const sx=bx-ax, sy=by-ay, sl=hyp(sx,sy)||1; dx=-sy/sl; dy=sx/sl; d=0.001; }
    const nx=dx/d, ny=dy/d, pen=min-d;
    b.x += nx*pen; b.y += ny*pen; const vn = b.vx*nx + b.vy*ny;
    if (vn < 0){ const tvx=b.vx-vn*nx, tvy=b.vy-vn*ny, rvn=-vn*e;
      b.vx = tvx*fric + rvn*nx; b.vy = tvy*fric + rvn*ny; }
  }
}
function substep(b, parts, pegs, targets, fx){
  if (b.dead) return;
  b.vy += G;
  const sp = hyp(b.vx, b.vy); if (sp > VMAX){ b.vx = b.vx/sp*VMAX; b.vy = b.vy/sp*VMAX; }
  b.x += b.vx; b.y += b.vy;
  if (b.x < BALL_R){ b.x = BALL_R; if (b.vx<0) b.vx = -b.vx*WALL_E; }
  if (b.x > W-BALL_R){ b.x = W-BALL_R; if (b.vx>0) b.vx = -b.vx*WALL_E; }
  if (b.y < BALL_R){ b.y = BALL_R; if (b.vy<0) b.vy = -b.vy*WALL_E; }
  for (const g of pegs) resolveCircle(b, g.x, g.y, g.r, PEG_E);
  for (const p of parts){
    if (p.type === 'ramp'){ const [ax,ay,bx,by]=rampEnds(p); resolveSeg(b, ax,ay,bx,by, RAMP_HALF, RAMP_E, RAMP_FRICTION); }
    else if (p.type === 'bumper'){ const pre=b.vx*b.vx+b.vy*b.vy; resolveCircle(b, p.x,p.y, BUMP_R, BUMP_E);
      if (fx && (b.vx*b.vx+b.vy*b.vy)>pre) fx.hit(p.x,p.y,'bump'); }
    else if (p.type === 'spring'){ const d=hyp(b.x-p.x,b.y-p.y);
      if (d < BALL_R+SPRING_R && b.vy > -1){ b.vy=-SPRING_LAUNCH; b.vx*=0.55; b.y=p.y-(SPRING_R+BALL_R); if(fx) fx.hit(p.x,p.y,'spring'); } }
  }
  for (const t of targets){ if (!t.lit && hyp(b.x-t.x, b.y-t.y) < BALL_R+t.r){ t.lit=true; if(fx) fx.light(t); } }
  if (b.y > DRAIN_Y) b.dead = true;
}

/* ---- 레벨 정의 (node 브루트포스로 전부 solvable 검증) ---- */
const LEVELS = [
  { name:'첫 경사', ballX:80,  targets:[{x:300,y:470}], pegs:[], budget:{ramp:3,bumper:0,spring:0}, par:1 },
  { name:'양 갈래', ballX:195, targets:[{x:70,y:430},{x:320,y:560}], pegs:[], budget:{ramp:3,bumper:2,spring:0}, par:2 },
  { name:'튀어올라', ballX:90, targets:[{x:320,y:210},{x:300,y:600}], pegs:[{x:200,y:340,r:18}], budget:{ramp:3,bumper:1,spring:2}, par:2 },
  { name:'세 등불', ballX:110, targets:[{x:70,y:300},{x:320,y:330},{x:200,y:580}], pegs:[{x:180,y:220,r:15}], budget:{ramp:4,bumper:2,spring:1}, par:3 },
  { name:'태엽 미로', ballX:70, targets:[{x:330,y:250},{x:90,y:470},{x:320,y:610}], pegs:[{x:200,y:260,r:16},{x:150,y:420,r:14}], budget:{ramp:4,bumper:2,spring:2}, par:3 },
];
const TARGET_R = 13;

/* ---- localStorage (모두 chain 접두사, 부팅 시 쓰기 없음) ---- */
const LS = {
  best(){ return +(localStorage.getItem('chainBest')||0); },
  setBest(v){ if (v > this.best()) localStorage.setItem('chainBest', v); },
  level(){ return +(localStorage.getItem('chainLevel')||1); },
  setLevel(v){ const cur=+(localStorage.getItem('chainLevel')||0); if (v>cur) localStorage.setItem('chainLevel', v); },
  stars(){ try{ return JSON.parse(localStorage.getItem('chainStars')||'{}'); }catch(e){ return {}; } },
  setStars(lv, s){ const m=this.stars(); if (!(m[lv]>=s)){ m[lv]=s; localStorage.setItem('chainStars', JSON.stringify(m)); } },
  bestParts(){ try{ return JSON.parse(localStorage.getItem('chainBestParts')||'{}'); }catch(e){ return {}; } },
  setBestParts(lv, n){ const m=this.bestParts(); if (!(m[lv]<=n)){ m[lv]=n; localStorage.setItem('chainBestParts', JSON.stringify(m)); } },
  muted(){ return localStorage.getItem('chainMuted')==='1'; },
  setMuted(v){ localStorage.setItem('chainMuted', v?'1':'0'); },
};

/* ---- 상태 ---- */
let cur = 0;              // 현재 레벨 index
let placed = [];          // 배치된 부품
let remain = {};          // 남은 부품 수
let held = null;          // 트레이에서 집은 타입
let selected = null;      // 선택된 배치 부품
let phase = 'edit';       // 'edit' | 'run' | 'done'
let ball = null;
let targets = [];
let trail = [];
let effects = [];
let runSteps = 0;
let muted = LS.muted();

/* ---- 캔버스 & 좌표변환 ---- */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let scale = 1, offx = 0, offy = 0, dpr = 1;
function fit(){
  const r = cv.getBoundingClientRect();
  dpr = Math.min(window.devicePixelRatio||1, 2.5);
  cv.width = Math.round(r.width*dpr); cv.height = Math.round(r.height*dpr);
  scale = Math.min(r.width/W, r.height/H);
  offx = (r.width - W*scale)/2; offy = (r.height - H*scale)/2;
}
function toWorld(clientX, clientY){
  const r = cv.getBoundingClientRect();
  return { x:(clientX - r.left - offx)/scale, y:(clientY - r.top - offy)/scale };
}
function toScreen(wx, wy){ return { x: offx + wx*scale, y: offy + wy*scale }; }

/* ---- 오디오 (WebAudio, 음소거 저장) ---- */
let actx = null;
function beep(freq, dur, type, vol){
  if (muted) return;
  try{ actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type||'sine'; o.frequency.value = freq;
    g.gain.value = vol||0.05; o.connect(g); g.connect(actx.destination);
    const t = actx.currentTime; o.start(t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+(dur||0.12)); o.stop(t+(dur||0.12)+0.02);
  }catch(e){}
}
const snd = {
  place(){ beep(420,0.06,'triangle',0.05); },
  pick(){ beep(300,0.05,'sine',0.04); },
  bump(){ beep(660,0.07,'square',0.035); },
  spring(){ beep(240,0.14,'sawtooth',0.05); },
  light(){ beep(880,0.1,'triangle',0.06); },
  win(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.16,'triangle',0.06), i*90)); },
  fail(){ beep(180,0.2,'sine',0.05); },
};

/* ---- 파티클/이펙트 ---- */
const fx = {
  hit(x,y,kind){ effects.push({x,y,t:0,kind}); if(kind==='bump') snd.bump(); else if(kind==='spring') snd.spring(); },
  light(t){ effects.push({x:t.x,y:t.y,t:0,kind:'light'}); snd.light(); },
};

/* ═══════════════ 렌더 ═══════════════ */
function draw(){
  const r = cv.getBoundingClientRect();
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,r.width,r.height);
  // 무대 배경 (공방 톤, 단일 색조)
  ctx.save();
  ctx.translate(offx, offy); ctx.scale(scale, scale);
  ctx.fillStyle = '#141d27'; roundRect(0,0,W,H,14); ctx.fill();
  // 미세 격자 (태엽판 느낌)
  ctx.strokeStyle = 'rgba(150,175,200,.05)'; ctx.lineWidth = 1;
  for (let gx=26; gx<W; gx+=26){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
  for (let gy=26; gy<H; gy+=26){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
  // 테두리
  ctx.strokeStyle = 'rgba(216,162,74,.28)'; ctx.lineWidth = 2; roundRect(1,1,W-2,H-2,13); ctx.stroke();

  // 드롭 지점
  const bx = LEVELS[cur].ballX;
  ctx.fillStyle = 'rgba(216,162,74,.5)';
  ctx.beginPath(); ctx.moveTo(bx-9,2); ctx.lineTo(bx+9,2); ctx.lineTo(bx,16); ctx.closePath(); ctx.fill();

  // pegs
  for (const g of LEVELS[cur].pegs){ drawPeg(g.x,g.y,g.r); }
  // targets
  for (const t of targets){ drawTarget(t); }
  // placed parts
  for (const p of placed){ drawPart(p, p===selected); }
  // 궤적
  if (trail.length>1){
    ctx.lineWidth = 3; ctx.lineCap='round';
    for (let i=1;i<trail.length;i++){
      const a = i/trail.length;
      ctx.strokeStyle = `rgba(216,162,74,${0.05+a*0.32})`;
      ctx.beginPath(); ctx.moveTo(trail[i-1].x,trail[i-1].y); ctx.lineTo(trail[i].x,trail[i].y); ctx.stroke();
    }
  }
  // 이펙트
  for (const e of effects){ drawEffect(e); }
  // ball
  if (ball && !ball.dead) drawBall(ball.x, ball.y);

  ctx.restore();
}
function roundRect(x,y,w,h,rd){ ctx.beginPath(); ctx.moveTo(x+rd,y);
  ctx.arcTo(x+w,y,x+w,y+h,rd); ctx.arcTo(x+w,y+h,x,y+h,rd);
  ctx.arcTo(x,y+h,x,y,rd); ctx.arcTo(x,y,x+w,y,rd); ctx.closePath(); }
function drawBall(x,y){
  const g = ctx.createRadialGradient(x-3,y-3,1,x,y,BALL_R);
  g.addColorStop(0,'#f3f7fb'); g.addColorStop(.5,'#c7d2dc'); g.addColorStop(1,'#8f9ba6');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x,y,BALL_R,0,7); ctx.fill();
  ctx.strokeStyle='rgba(20,28,38,.5)'; ctx.lineWidth=1; ctx.stroke();
}
function drawPeg(x,y,r){
  ctx.fillStyle='#2c3a48'; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='rgba(160,180,200,.18)'; ctx.beginPath(); ctx.arc(x-r*.3,y-r*.3,r*.35,0,7); ctx.fill();
}
function drawTarget(t){
  if (t.lit){
    const g = ctx.createRadialGradient(t.x,t.y,2,t.x,t.y,t.r+8);
    g.addColorStop(0,'rgba(255,207,122,.9)'); g.addColorStop(1,'rgba(255,207,122,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(t.x,t.y,t.r+8,0,7); ctx.fill();
    ctx.fillStyle='#ffcf7a'; ctx.beginPath(); ctx.arc(t.x,t.y,t.r-2,0,7); ctx.fill();
    ctx.strokeStyle='#fff2d6'; ctx.lineWidth=2; ctx.stroke();
  } else {
    ctx.strokeStyle='rgba(216,162,74,.55)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(t.x,t.y,t.r,0,7); ctx.stroke();
    ctx.strokeStyle='rgba(216,162,74,.22)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(t.x,t.y,t.r-5,0,7); ctx.stroke();
  }
}
function drawPart(p, sel){
  ctx.save();
  if (sel){ ctx.shadowColor='rgba(255,207,122,.7)'; ctx.shadowBlur=12; }
  if (p.type==='ramp'){
    const [ax,ay,bx,by]=rampEnds(p);
    ctx.strokeStyle='#d8a24a'; ctx.lineWidth=RAMP_HALF*2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
    ctx.strokeStyle='rgba(255,240,214,.5)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
  } else if (p.type==='bumper'){
    const g=ctx.createRadialGradient(p.x-4,p.y-4,2,p.x,p.y,BUMP_R);
    g.addColorStop(0,'#f0c877'); g.addColorStop(1,'#b7842f');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,BUMP_R,0,7); ctx.fill();
    ctx.strokeStyle='#7a5518'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='rgba(122,85,24,.5)'; ctx.beginPath(); ctx.arc(p.x,p.y,BUMP_R*.42,0,7); ctx.fill();
  } else if (p.type==='spring'){
    ctx.strokeStyle='#c8d2dc'; ctx.lineWidth=3; ctx.lineCap='round';
    for (let i=0;i<3;i++){ const yy=p.y+6-i*7;
      ctx.beginPath(); ctx.moveTo(p.x-13,yy); ctx.lineTo(p.x+13,yy-4); ctx.stroke(); }
    ctx.fillStyle='#d8a24a'; roundRect(p.x-16,p.y-14,32,7,3); ctx.fill();
  }
  ctx.restore();
}
function drawEffect(e){
  const a = 1 - e.t/18;
  if (a <= 0) return;
  if (e.kind==='light'){
    const rr = 6 + (1-a)*36;
    ctx.fillStyle=`rgba(255,207,122,${a*0.45})`; ctx.beginPath(); ctx.arc(e.x,e.y, rr*0.55, 0, 7); ctx.fill();
    ctx.strokeStyle=`rgba(255,244,220,${a})`; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(e.x,e.y, rr, 0, 7); ctx.stroke();
  } else {
    ctx.fillStyle = e.kind==='spring' ? `rgba(200,210,220,${a})` : `rgba(255,207,122,${a})`;
    const rad = 4 + (1-a)*14;
    ctx.beginPath(); ctx.arc(e.x,e.y,rad,0,7); ctx.fill();
  }
}

/* ═══════════════ 게임 흐름 ═══════════════ */
function loadLevel(i){
  cur = Math.max(0, Math.min(LEVELS.length-1, i));
  const lv = LEVELS[cur];
  placed = []; held = null; selected = null; phase='edit';
  remain = Object.assign({}, lv.budget);
  ball = null; trail = []; effects = [];
  targets = lv.targets.map(t=>({x:t.x, y:t.y, r:t.r||TARGET_R, lit:false}));
  _lastLit = 0; updateCounter();
  syncUI();
  hidePopover();
  document.getElementById('sheet').classList.remove('show');
}
function unlockedMax(){ return Math.min(LEVELS.length, LS.best()+1); }

function syncUI(){
  const lv = LEVELS[cur];
  document.getElementById('lvLabel').textContent = '레벨 '+(cur+1);
  document.getElementById('lvName').textContent = lv.name;
  document.getElementById('bestVal').textContent = LS.best()? LS.best() : '–';
  // 트레이
  const tray = document.getElementById('tray'); tray.innerHTML='';
  const DEFS = [
    {k:'ramp', nm:'경사판'}, {k:'bumper', nm:'범퍼'}, {k:'spring', nm:'용수철'},
  ];
  for (const d of DEFS){
    const total = lv.budget[d.k]||0; if (!total) continue;
    const left = remain[d.k]||0;
    const el = document.createElement('button');
    el.className = 'part' + (held===d.k?' sel':'') + (left<=0?' empty':'');
    el.innerHTML = `<canvas class="pv" width="88" height="60"></canvas>
      <span class="nm">${d.nm}</span><span class="ct">${left}/${total}</span>`;
    el.onclick = ()=> selectHeld(d.k);
    tray.appendChild(el);
    drawTrayIcon(el.querySelector('.pv'), d.k);
  }
  // 리본
  const rb = document.getElementById('ribbon'); rb.innerHTML='';
  const stars = LS.stars(), umax = unlockedMax();
  for (let i=0;i<LEVELS.length;i++){
    const c = document.createElement('button');
    const locked = (i+1) > umax;
    c.className = 'lvchip' + (i===cur?' on':'') + (locked?' locked':'');
    c.textContent = i+1;
    if (stars[i+1]) c.innerHTML += `<span class="st">${'★'.repeat(stars[i+1])}</span>`;
    if (!locked) c.onclick = ()=>{ LS.setLevel(i+1); loadLevel(i); };
    rb.appendChild(c);
  }
  updateHint();
  updateRunBtn();
}
function drawTrayIcon(c, kind){
  const g = c.getContext('2d'); g.clearRect(0,0,88,60); g.save(); g.translate(44,30);
  if (kind==='ramp'){ g.strokeStyle='#d8a24a'; g.lineWidth=9; g.lineCap='round';
    g.beginPath(); g.moveTo(-26,-8); g.lineTo(26,10); g.stroke(); }
  else if (kind==='bumper'){ const gr=g.createRadialGradient(-4,-4,2,0,0,16);
    gr.addColorStop(0,'#f0c877'); gr.addColorStop(1,'#b7842f'); g.fillStyle=gr;
    g.beginPath(); g.arc(0,0,15,0,7); g.fill(); }
  else if (kind==='spring'){ g.strokeStyle='#c8d2dc'; g.lineWidth=3; g.lineCap='round';
    for (let i=0;i<3;i++){ const yy=8-i*8; g.beginPath(); g.moveTo(-13,yy); g.lineTo(13,yy-4); g.stroke(); }
    g.fillStyle='#d8a24a'; g.fillRect(-16,-14,32,6); }
  g.restore();
}
function updateHint(){
  const h = document.getElementById('hint');
  if (phase==='run'){ h.textContent='굴러가는 중…'; return; }
  const par = LEVELS[cur].par;
  const anyLeft = Object.values(remain).some(v=>v>0);
  if (held) h.textContent = '무대를 탭해 놓기 · 놓인 부품을 탭하면 회전/제거';
  else if (placed.length) h.textContent = `실행을 눌러 굴려보세요 · 별셋 목표 부품 ${par}개 (지금 ${placed.length}개)`;
  else if (anyLeft) h.textContent = `부품을 골라 무대를 탭해 놓으세요 · 별셋 목표 ${par}개`;
  else h.textContent = '실행을 눌러 굴려보세요';
}
function updateRunBtn(){
  const btn = document.getElementById('run');
  btn.disabled = false;
  if (phase==='run'){ btn.textContent='멈추고 다시 짜기'; btn.classList.add('running'); btn.classList.remove('pulse'); }
  else { btn.textContent='실 행'; btn.classList.remove('running');
    btn.classList.toggle('pulse', phase==='edit' && placed.length>0); }
}
let _lastLit = 0;
function updateCounter(){
  const tot = targets.length, lit = targets.filter(t=>t.lit).length;
  document.getElementById('cTot').textContent = tot;
  document.getElementById('cNum').textContent = lit;
  const cd = document.getElementById('cDots');
  if (cd.childElementCount !== tot){ cd.innerHTML=''; for(let i=0;i<tot;i++){ const d=document.createElement('span'); d.className='dot'; cd.appendChild(d);} }
  Array.prototype.forEach.call(cd.children, (d,i)=> d.classList.toggle('on', i<lit));
  const c = document.getElementById('counter');
  c.classList.toggle('full', lit>0 && lit===tot);
  if (lit > _lastLit){ c.classList.remove('bump'); void c.offsetWidth; c.classList.add('bump'); }
  _lastLit = lit;
}

function selectHeld(k){
  if (phase!=='edit') return;
  if ((remain[k]||0) <= 0){ toast('남은 '+({ramp:'경사판',bumper:'범퍼',spring:'용수철'}[k])+'이 없어요'); return; }
  held = (held===k) ? null : k;
  selected = null; hidePopover();
  snd.pick();
  syncUI();
}

/* ---- 캔버스 입력 ---- */
function hitPart(wx, wy){
  // 뒤에서부터(위에 그린 것 우선)
  for (let i=placed.length-1;i>=0;i--){
    const p = placed[i];
    if (p.type==='ramp'){ const [ax,ay,bx,by]=rampEnds(p);
      const [px,py]=closestOnSeg(ax,ay,bx,by,wx,wy); if (hyp(wx-px,wy-py) < 16) return p; }
    else { const r = p.type==='bumper'?BUMP_R:SPRING_R; if (hyp(wx-p.x,wy-p.y) < r+6) return p; }
  }
  return null;
}
function validSpot(wx, wy){
  if (wx<26 || wx>W-26 || wy<70 || wy>H-30) return false;
  const bx = LEVELS[cur].ballX;
  if (wy<40 && Math.abs(wx-bx)<30) return false;
  for (const g of LEVELS[cur].pegs){ if (hyp(wx-g.x,wy-g.y) < g.r+16) return false; }
  for (const t of targets){ if (hyp(wx-t.x,wy-t.y) < t.r+14) return false; }
  for (const p of placed){ if (hyp(wx-p.x,wy-p.y) < 22) return false; }
  return true;
}
cv.addEventListener('pointerdown', (e)=>{
  if (phase!=='edit') return;
  const w = toWorld(e.clientX, e.clientY);
  if (held){
    if (validSpot(w.x, w.y)){
      const p = { type: held, x: w.x, y: w.y, ang: held==='ramp'?0.35:0 };
      placed.push(p); remain[held]--; snd.place();
      if ((remain[held]||0) <= 0) held = null;
      syncUI();
    } else { toast('여기엔 놓을 수 없어요'); }
    return;
  }
  const hit = hitPart(w.x, w.y);
  if (hit){ selected = hit; showPopover(hit); }
  else { selected = null; hidePopover(); }
  draw();
});

/* ---- 팝오버 (회전/제거) ---- */
const popEl = document.getElementById('popover');
function showPopover(p){
  const s = toScreen(p.x, p.y - (p.type==='bumper'?BUMP_R:14));
  popEl.style.left = s.x + 'px';
  popEl.style.top = s.y + 'px';
  popEl.style.display = 'flex';
  document.getElementById('popRotate').style.display = (p.type==='ramp')?'flex':'none';
}
function hidePopover(){ popEl.style.display='none'; }
document.getElementById('popRotate').onclick = ()=>{ if (selected&&selected.type==='ramp'){ selected.ang += Math.PI/6; snd.pick(); showPopover(selected); draw(); } };
document.getElementById('popRemove').onclick = ()=>{ if (selected){ const idx=placed.indexOf(selected); if(idx>=0){ placed.splice(idx,1); remain[selected.type]=(remain[selected.type]||0)+1; } selected=null; hidePopover(); snd.pick(); syncUI(); draw(); } };

/* ---- 실행 ---- */
document.getElementById('run').onclick = ()=>{
  if (phase==='edit'){ startRun(); }
  else if (phase==='run'){ abortRun(); }
};
function startRun(){
  if (actx && actx.state==='suspended') actx.resume();
  phase='run'; selected=null; hidePopover();
  const lv = LEVELS[cur];
  ball = { x: lv.ballX, y: 22, vx:0, vy:0, dead:false };
  targets.forEach(t=>t.lit=false);
  trail=[]; effects=[]; runSteps=0; _lastLit=0; updateCounter();
  updateRunBtn(); updateHint();
}
function abortRun(){
  phase='edit'; ball=null; trail=[]; effects=[];
  targets.forEach(t=>t.lit=false);
  _lastLit=0; updateCounter();
  updateRunBtn(); updateHint();
}
function finishWin(){
  phase='done';
  const lv = LEVELS[cur], used = placed.length;
  const st = used<=lv.par ? 3 : (used<=lv.par+1 ? 2 : 1);
  LS.setBest(cur+1);
  LS.setStars(cur+1, st);
  LS.setBestParts(cur+1, used);
  snd.win();
  updateCounter();
  const fl = document.getElementById('flash'); fl.classList.remove('go'); void fl.offsetWidth; fl.classList.add('go');
  setTimeout(()=> showResult(true, st, used), 560); // 성공 플래시 잠깐 보여주고 시트
}
function finishFail(){
  phase='edit'; ball=null;
  const lit = targets.filter(t=>t.lit).length, tot = targets.length;
  targets.forEach(t=>t.lit=false);
  _lastLit=0; updateCounter();
  snd.fail();
  updateRunBtn(); updateHint();
  toast(`등불 ${lit}/${tot} — 부품을 조금 틀어서 다시!`);
}

/* ---- 결과 시트 ---- */
function showResult(win, st, used){
  const sheet=document.getElementById('sheet');
  document.getElementById('rsTitle').textContent = (cur+1>=LEVELS.length && win)?'전부 통과!':'완성!';
  document.getElementById('rsSub').textContent = `부품 ${used}개 사용 · 목표 ${LEVELS[cur].par}개`;
  const svgs = document.querySelectorAll('#rsStars svg');
  svgs.forEach((s,i)=> s.classList.remove('on'));
  svgs.forEach((s,i)=> setTimeout(()=>{ if(i<st) s.classList.add('on'); }, 250+i*220));
  const nextBtn = document.getElementById('rsNext');
  nextBtn.textContent = (cur+1>=LEVELS.length)?'처음으로':'다음 레벨';
  sheet.classList.add('show');
  syncUI();
}
document.getElementById('rsRetry').onclick = ()=>{ document.getElementById('sheet').classList.remove('show'); loadLevel(cur); };
document.getElementById('rsNext').onclick = ()=>{
  document.getElementById('sheet').classList.remove('show');
  if (cur+1>=LEVELS.length){ loadLevel(0); } else { LS.setLevel(cur+2); loadLevel(cur+1); }
};
document.getElementById('supportLine').onclick = ()=>{ try{ if(window.GamePortal&&GamePortal.openSupport) GamePortal.openSupport(); }catch(e){} };
document.getElementById('introGo').onclick = ()=>{ document.getElementById('intro').classList.remove('show'); localStorage.setItem('chainSeenIntro','1'); if(actx&&actx.state==='suspended')actx.resume(); };

/* ---- 상단 버튼 ---- */
document.getElementById('btnReset').onclick = ()=>{
  if (phase==='run') abortRun();
  placed=[]; remain=Object.assign({}, LEVELS[cur].budget); held=null; selected=null;
  hidePopover(); snd.pick(); syncUI(); draw();
};
function applyMuteIcon(){ document.querySelector('#btnMute use').setAttribute('href', muted?'#p-speaker-off':'#p-speaker-on'); }
document.getElementById('btnMute').onclick = ()=>{ muted=!muted; LS.setMuted(muted); applyMuteIcon(); if(!muted) beep(500,0.08,'sine',0.05); };

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),1400); }

/* ═══════════════ 루프 ═══════════════ */
function frame(){
  if (phase==='run' && ball){
    for (let s=0; s<SUBSTEPS_PER_FRAME; s++){
      substep(ball, placed, LEVELS[cur].pegs, targets, fx);
      runSteps++;
      if (runSteps%3===0) trail.push({x:ball.x, y:ball.y});
      if (trail.length>90) trail.shift();
      if (targets.every(t=>t.lit)){ finishWin(); break; }
      if (ball.dead){ if (targets.every(t=>t.lit)) finishWin(); else finishFail(); break; }
      if (runSteps>7000){ finishFail(); break; }
    }
    if (phase==='run') updateCounter();
  }
  for (const e of effects) e.t++;
  effects = effects.filter(e=>e.t<18);
  draw();
  requestAnimationFrame(frame);
}

/* ---- 부팅 ---- */
function boot(){
  fit();
  applyMuteIcon();
  const start = Math.min(Math.max(1, LS.level()), unlockedMax());
  loadLevel(start-1);
  if (!localStorage.getItem('chainSeenIntro')) document.getElementById('intro').classList.add('show');
  draw();
  requestAnimationFrame(frame);
}
window.addEventListener('resize', ()=>{ fit(); if(selected) showPopover(selected); draw(); });
window.addEventListener('pagehide', ()=>{ /* 진행은 즉시 저장돼 있음 */ });
boot();
</script>
