<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>🐍 Cube Snake</title>
<style>
  :root {
    --cube: 312px;       /* 한 면 크기 (6칸 × 52px) */
    --bg: #fdf6e3;
    --grass-a: #c8e6b0;
    --grass-b: #b5dba0;
    --snake: #7ec8a9;
    --snake-head: #5fb593;
    --glow: #ffd54f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }

  /* ── 단계별 배경 (과일 누적에 따라 진화) ── */
  #bg { position: fixed; inset: 0; z-index: -1; transition: background 1.2s ease; background: var(--bg); }
  /* 10+ 하늘 */
  #bg.sky { background: linear-gradient(#aee3ff, #e8f7ff 70%, #fdf6e3); }
  /* 15+ 밤하늘 */
  #bg.night { background: linear-gradient(#0b1026, #1a2347 60%, #2a2150); }
  /* 20+ 사이키 디스코 */
  #bg.disco { animation: disco 1.4s linear infinite; }
  @keyframes disco {
    0%   { background: #ff4d6d; } 20% { background: #ffd23f; } 40% { background: #3ec1ff; }
    60%  { background: #6bff7a; } 80% { background: #c14dff; } 100% { background: #ff4d6d; }
  }

  /* 구름 (하늘 단계) */
  #bg .cloud {
    position: absolute; font-size: 56px; opacity: 0; transition: opacity 1s;
    animation: drift linear infinite;
  }
  #bg.sky .cloud, #bg.night .cloud { opacity: .9; }
  @keyframes drift {
    from { transform: translateX(-20vw); } to { transform: translateX(120vw); }
  }
  /* 별 (밤하늘 단계) */
  #bg .star {
    position: absolute; width: 3px; height: 3px; background: #fff; border-radius: 50%;
    opacity: 0; box-shadow: 0 0 6px #fff;
  }
  #bg.night .star { animation: twinkleStar 2s ease-in-out infinite; }
  @keyframes twinkleStar {
    0%, 100% { opacity: .2; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.3); }
  }
  /* 밤하늘에선 구름을 어둡게, 디스코에선 다 숨김 */
  #bg.night .cloud { filter: brightness(.5) grayscale(.4); opacity: .35; }
  #bg.disco .cloud, #bg.disco .star { opacity: 0; }

  /* 30+ 전설 모드 — 회전 무지개 + 이모지 비 + 네온 테두리 */
  #bg.legend { background: #1a0633; }
  #bg.legend::before {
    content: ""; position: absolute; inset: -60%;
    background: conic-gradient(from 0deg, #ff4d6d, #ffd23f, #3ec1ff, #6bff7a, #c14dff, #ff7ad9, #ff4d6d);
    opacity: .5; animation: spin 9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #bg.legend .cloud, #bg.legend .star { opacity: 0; }

  /* 이모지 비 */
  #bg .confetti { position: absolute; top: -10%; font-size: 26px; opacity: 0; will-change: transform; }
  #bg.legend .confetti { opacity: 1; animation: fall linear infinite; }
  @keyframes fall {
    0%   { transform: translateY(-12vh) rotate(0deg); }
    100% { transform: translateY(112vh) rotate(360deg); }
  }
  /* 네온 테두리 펄스 */
  #bg .neon { position: absolute; inset: 0; opacity: 0; }
  #bg.legend .neon { opacity: 1; animation: neon 1.1s linear infinite; }
  @keyframes neon {
    0%   { box-shadow: inset 0 0 50px 14px #ff4d6d; }
    33%  { box-shadow: inset 0 0 50px 14px #3ec1ff; }
    66%  { box-shadow: inset 0 0 50px 14px #6bff7a; }
    100% { box-shadow: inset 0 0 50px 14px #ff4d6d; }
  }

  /* ── 상단 점수 ── */
  #hud {
    margin-top: 18px; font-size: 22px; font-weight: 700; color: #8d6e63;
    background: #fff; padding: 8px 22px; border-radius: 999px;
    box-shadow: 0 4px 0 #ecdcc3; z-index: 10; white-space: nowrap;
  }

  /* ── 3D 씬 ── */
  #scene {
    flex: 1; display: flex; align-items: center; justify-content: center;
    perspective: 850px; width: 100%;
    touch-action: none; /* 스와이프가 브라우저 스크롤/제스처에 가로채이지 않게 */
  }
  #cube {
    width: var(--cube); height: var(--cube);
    position: relative; transform-style: preserve-3d;
  }
  .face {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 1fr);
    border-radius: 6px;
    backface-visibility: hidden;
  }
  .face.front  { transform: translateZ(calc(var(--cube) / 2)); }
  .face.back   { transform: rotateY(180deg) translateZ(calc(var(--cube) / 2)); }
  .face.right  { transform: rotateY(90deg) translateZ(calc(var(--cube) / 2)); }
  .face.left   { transform: rotateY(-90deg) translateZ(calc(var(--cube) / 2)); }
  .face.top    { transform: rotateX(90deg) translateZ(calc(var(--cube) / 2)); }
  .face.bottom { transform: rotateX(-90deg) translateZ(calc(var(--cube) / 2)); }

  /* 면마다 다른 파스텔 색 — 어느 면에 있는지 한눈에 보임 */
  .face.front  { --a: #c8e6b0; --b: #b5dba0; }  /* 풀밭 */
  .face.top    { --a: #bfe3f7; --b: #aad6ef; }  /* 하늘 */
  .face.right  { --a: #fcd7e3; --b: #f6c4d5; }  /* 핑크 */
  .face.left   { --a: #ddd6f7; --b: #cdc4ef; }  /* 라벤더 */
  .face.back   { --a: #ffe0c2; --b: #f7d1ab; }  /* 피치 */
  .face.bottom { --a: #fdf3b3; --b: #f5e89b; }  /* 레몬 */
  .cell { position: relative; background: var(--a); }
  .cell.alt { background: var(--b); }

  /* ── 뱀 ── */
  /* 흰 테두리: 면 색과 뱀 색이 비슷해져도 항상 또렷하게 보임 */
  .cell.body::after {
    content: ""; position: absolute; inset: 3px;
    background: var(--seg, var(--snake)); border-radius: 12px;
    border: 2px solid rgba(255,255,255,.95);
    box-shadow: inset 0 -4px 0 rgba(0,0,0,.08);
  }
  .cell.head::after {
    content: ""; position: absolute; inset: 1px;
    background: var(--seg, var(--snake-head)); border-radius: 14px;
    border: 2px solid rgba(255,255,255,.95);
    box-shadow: inset 0 -4px 0 rgba(0,0,0,.1);
  }
  /* 26+ 무지개 뱀 반짝임 (몸통 따라 시차) */
  .cell.sparkle::after {
    animation: seg-sparkle .5s ease-in-out infinite alternate;
    animation-delay: var(--dly, 0s);
  }
  @keyframes seg-sparkle {
    from { filter: brightness(1); }
    to   { filter: brightness(1.4) drop-shadow(0 0 6px #fff); }
  }
  .snake-face {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    pointer-events: none;
  }
  .snake-face .eyes { display: flex; gap: 10px; margin-top: 7px; }
  .snake-face .eye {
    width: 9px; height: 11px; background: #fff; border-radius: 50%;
    position: relative;
  }
  .snake-face .eye::after {
    content: ""; position: absolute; width: 5px; height: 6px;
    background: #33291f; border-radius: 50%; top: 1px; left: 2px;
  }
  .snake-face .blush { display: flex; gap: 16px; margin-top: 2px; }
  .snake-face .cheek {
    width: 7px; height: 4px; background: #f8a5a5; border-radius: 50%; opacity: .8;
  }
  .snake-face.yum .eye { height: 3px; margin-top: 5px; border-radius: 3px; background: #33291f; }
  .snake-face.yum .eye::after { display: none; }
  .snake-face.dead .eye { background: transparent; }
  .snake-face.dead .eye::after {
    content: "✕"; background: none; color: #33291f; font-size: 11px;
    top: -3px; left: -1px; width: auto; height: auto;
  }

  /* ── 먹이 ── */
  .cell .fruit {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    font-size: 28px; z-index: 1;
    animation: bounce 0.9s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* ── 모서리 글로우 ── */
  .edge {
    position: absolute; z-index: 3; border-radius: 8px;
    opacity: 0; transition: opacity .3s; pointer-events: none;
    background: var(--glow);
    box-shadow: 0 0 14px 5px var(--glow);
  }
  .edge.on { opacity: 1; animation: twinkle 0.8s ease-in-out infinite; }
  @keyframes twinkle {
    0%, 100% { opacity: .55; } 50% { opacity: 1; }
  }
  .edge.e-top    { top: -3px; left: 8%; width: 84%; height: 6px; }
  .edge.e-bottom { bottom: -3px; left: 8%; width: 84%; height: 6px; }
  .edge.e-left   { left: -3px; top: 8%; height: 84%; width: 6px; }
  .edge.e-right  { right: -3px; top: 8%; height: 84%; width: 6px; }

  /* ── 하단 버튼 ── */
  #controls {
    width: 100%; max-width: 560px;
    display: flex; justify-content: space-between;
    padding: 0 28px 30px; z-index: 10;
  }
  .turn-btn {
    width: 86px; height: 86px; border-radius: 50%;
    border: none; font-size: 38px; cursor: pointer;
    background: #ffe0ec; color: #d36c94;
    box-shadow: 0 6px 0 #f3c2d4;
    transition: transform .08s, box-shadow .08s;
  }
  .turn-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #f3c2d4; }
  .turn-btn.cw { background: #dcefff; color: #5d92c4; box-shadow: 0 6px 0 #bcd9f2; }
  .turn-btn.cw:active { box-shadow: 0 2px 0 #bcd9f2; }

  /* ── 먹기 이펙트 ── */
  #fx { position: fixed; inset: 0; pointer-events: none; z-index: 15; overflow: hidden; }
  #fx .p { position: absolute; will-change: transform, opacity; }
  #fx .ring {
    position: absolute; border: 3px solid #ffd54f; border-radius: 50%;
    will-change: transform, opacity;
  }
  #hud.hype { animation: hype .8s linear infinite; }
  #hud.pop  { animation: hype .8s linear infinite, hudpop .35s ease; }
  @keyframes hype {
    0%   { box-shadow: 0 4px 0 #ecdcc3, 0 0 14px 4px #ff8a80; color: #e57373; }
    25%  { box-shadow: 0 4px 0 #ecdcc3, 0 0 18px 6px #ffd180; color: #ffb74d; }
    50%  { box-shadow: 0 4px 0 #ecdcc3, 0 0 14px 4px #80d8ff; color: #4fc3f7; }
    75%  { box-shadow: 0 4px 0 #ecdcc3, 0 0 18px 6px #ea80fc; color: #ba68c8; }
    100% { box-shadow: 0 4px 0 #ecdcc3, 0 0 14px 4px #ff8a80; color: #e57373; }
  }
  @keyframes hudpop { 0% { transform: scale(1); } 40% { transform: scale(1.3) rotate(-3deg); } 100% { transform: scale(1); } }
  #hud .sep { margin: 0 8px; color: #d7c4a3; }
  @media (max-width: 480px) { #hud { font-size: 18px; padding: 7px 16px; } #hud .sep { margin: 0 6px; } }

  /* ── 콤보 배지 ── */
  #combo {
    position: fixed; top: 74px; left: 50%; transform: translateX(-50%);
    display: none; z-index: 10; background: #fff;
    color: #ef6c00; font-weight: 800; font-size: 18px;
    padding: 5px 18px; border-radius: 999px; box-shadow: 0 3px 0 #f5dcc0;
  }
  #combo.pop2 { animation: combopop .3s ease; }
  @keyframes combopop {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.4) rotate(3deg); }
    100% { transform: translateX(-50%) scale(1); }
  }

  /* ── 음소거 버튼 ── */
  #mute {
    position: fixed; top: 18px; right: 18px; z-index: 21;
    width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
    background: #fff; font-size: 20px; box-shadow: 0 4px 0 #ecdcc3;
  }
  #mute:active { transform: translateY(3px); box-shadow: 0 1px 0 #ecdcc3; }

  /* ── 황금 과일 ── */
  .cell .fruit.golden {
    animation: bounce .45s ease-in-out infinite;
    filter: drop-shadow(0 0 9px #ffd54f) drop-shadow(0 0 18px #ffe082);
  }

  /* ── 점수 플로팅 텍스트 / 신기록 ── */
  .fx-score { font-weight: 800; font-size: 20px; color: #ef6c00; text-shadow: 0 2px 0 #fff; }
  .fx-score.big { font-size: 28px; color: #f9a825; }
  .newrecord { font-weight: 800; font-size: 26px; animation: recordhue 1s linear infinite; }
  @keyframes recordhue {
    0% { color: #ef5350; } 25% { color: #ffb300; } 50% { color: #66bb6a; } 75% { color: #42a5f5; } 100% { color: #ef5350; }
  }
  #overlay p .sub { font-size: 16px; color: #bcaaa4; }

  /* ── 오버레이 ── */
  #overlay {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(253, 246, 227, .88); backdrop-filter: blur(3px);
    text-align: center; gap: 14px;
  }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: 40px; color: #8d6e63; }
  #overlay p { font-size: 20px; color: #a1887f; line-height: 1.5; }
  #overlay a { color: #e57373; font-weight: 700; }
  #overlay button {
    font-size: 22px; font-weight: 700; padding: 14px 44px;
    border: none; border-radius: 999px; cursor: pointer;
    background: #aed581; color: #fff; box-shadow: 0 6px 0 #94bf69;
    transition: transform .08s, box-shadow .08s;
  }
  #overlay button:active { transform: translateY(4px); box-shadow: 0 2px 0 #94bf69; }

  /* ── 자랑하기 (게임오버 화면에만) ── */
  #btn-share {
    display: none;
    font-size: 16px !important; padding: 10px 28px !important;
    background: #ffd180 !important; color: #8d5524 !important;
    box-shadow: 0 5px 0 #efb96a !important;
  }
  #btn-share:active { box-shadow: 0 2px 0 #efb96a !important; }
  #overlay.gameover #btn-share { display: inline-block; }

  /* ── 간식 사주기 (게임오버 화면에만, 은은하게) ── */
  #snack { display: none; margin-top: 22px; font-size: 13px; color: #bcaaa4; }
  #overlay.gameover #snack { display: block; }
  #snack .snack-btns { margin-left: 6px; }
  #snack a {
    display: inline-block; text-decoration: none; font-weight: 700; font-size: 12px;
    padding: 4px 12px; border-radius: 999px; margin-left: 4px;
    opacity: .85; transition: opacity .15s, transform .15s;
  }
  #snack a:hover { opacity: 1; transform: translateY(-1px); }
  #snack a.toss { background: #3182f6; color: #fff; }
  #snack a.kakao { background: #fee500; color: #3c1e1e; }

  /* ── 고마워요 모달 (PC 딥링크 fallback) ── */
  #thanks {
    position: fixed; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    background: rgba(141, 110, 99, .35); backdrop-filter: blur(4px);
    animation: fadein .2s ease;
  }
  #thanks.hidden { display: none; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .thanks-card {
    background: #fffdf7; border-radius: 28px; padding: 32px 30px;
    max-width: 340px; width: 86%; text-align: center;
    box-shadow: 0 10px 0 #ecdcc3, 0 18px 40px rgba(0,0,0,.15);
    animation: pop-in .3s cubic-bezier(.2,1.2,.4,1);
  }
  @keyframes pop-in { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .thanks-emoji { font-size: 56px; margin-bottom: 8px; }
  .thanks-card h2 { font-size: 24px; color: #8d6e63; margin-bottom: 14px; }
  .thanks-card p { font-size: 16px; color: #a1887f; line-height: 1.55; }
  .thanks-card .thanks-sub { font-size: 13px; color: #c5b3a6; margin-top: 12px; }
  #thanks-close {
    margin-top: 22px; font-size: 18px; font-weight: 700; padding: 12px 36px;
    border: none; border-radius: 999px; cursor: pointer;
    background: #aed581; color: #fff; box-shadow: 0 5px 0 #94bf69;
    transition: transform .08s, box-shadow .08s;
  }
  #thanks-close:active { transform: translateY(3px); box-shadow: 0 2px 0 #94bf69; }

  @media (max-width: 480px) {
    :root { --cube: 270px; }
    .cell .fruit { font-size: 22px; }
    .turn-btn { width: 74px; height: 74px; font-size: 32px; }
  }
</style>
</head>
<body>
  <div id="bg"></div>
  <div id="hud">🍎 <span id="fruits-n">0</span><span class="sep">·</span>⭐ <span id="score">0</span><span class="sep">·</span>👑 <span id="best">0</span></div>
  <div id="combo">🔥 x<span id="combo-n">2</span></div>
  <button id="mute" aria-label="소리 켜기/끄기">🔊</button>
  <div id="scene"><div id="cube"></div></div>
  <div id="controls">
    <button class="turn-btn ccw" id="btn-left" aria-label="좌회전">↺</button>
    <button class="turn-btn cw" id="btn-right" aria-label="우회전">↻</button>
  </div>
  <div id="fx"></div>
  <div id="overlay">
    <h1>🐍 Cube Snake</h1>
    <p>큐브 위를 기어다니며 과일을 냠냠!<br>↺ ↻ 버튼이나 ← → 키로 방향을 바꿔요</p>
    <button id="btn-start">시작!</button>
    <button id="btn-share">📤 친구에게 자랑하기</button>
    <div id="snack">
      <span class="snack-label">재밌었다면 개발자 간식 사주기</span> 🍩
      <span class="snack-btns">
        <a class="toss" href="supertoss://send?bank=토스뱅크&accountNo=100025266940&amount=3000">토스</a>
        <a class="kakao" href="https://qr.kakaopay.com/FP0dZW9ip" target="_blank" rel="noopener">카카오페이</a>
      </span>
    </div>
  </div>

  <!-- PC에서 앱 딥링크가 안 열릴 때 띄우는 "마음만으로도 고마워요" 모달 -->
  <div id="thanks" class="hidden">
    <div class="thanks-card">
      <div class="thanks-emoji">🥹☕</div>
      <h2>마음만으로도 감동이에요!</h2>
      <p>송금은 폰에서 열어야 동작하지만,<br>여기까지 눌러주신 것만으로도<br>개발자는 이미 커피 한 잔 마신 기분이에요 💛</p>
      <p class="thanks-sub">정 보내고 싶다면 폰으로 접속해서 눌러주세요!</p>
      <button id="thanks-close">고마워요 😊</button>
    </div>
  </div>

<script>
/* ===== engine.js (테스트: node test.js) — 수정 시 engine.js와 동기화할 것 ===== */
// Cube Snake — 표면 토폴로지 엔진
// 좌표계: CSS 3D와 동일 (x 오른쪽, y 아래, z 뷰어 방향), 큐브는 [0, S]^3 (S = 2N)

const N = 6;          // 한 면의 격자 크기
const S = 2 * N;      // 스케일된 큐브 한 변

// --- 벡터 유틸 ---
const add = (a, b) => [a[0] + b[0], a[1] + b[1], a[2] + b[2]];
const sub = (a, b) => [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
const scale = (a, k) => [a[0] * k, a[1] * k, a[2] * k];
const neg = (a) => scale(a, -1);
const cross = (a, b) => [
  a[1] * b[2] - a[2] * b[1],
  a[2] * b[0] - a[0] * b[2],
  a[0] * b[1] - a[1] * b[0],

// 같은 면이면 pos + 2d, 모서리를 넘으면 pos + d - n (n' = d, d' = -n)
function step(pos, d, n) {
  const cand = add(pos, scale(d, 2));
  const axis = d.findIndex((v) => v !== 0);
  if (cand[axis] > 0 && cand[axis] < S) {
    return { pos: cand, d, n };
  }
  return { pos: add(pos, sub(d, n)), d: neg(n), n: d };
}

// --- 회전 (뱀 기준) ---
// 화면상 n이 뷰어를 향할 때 좌회전/우회전이 시각적 좌/우와 일치
const turnLeft = (d, n) => cross(d, n);
const turnRight = (d, n) => cross(n, d);

// u: 면 로컬 +x(열 방향), v: 면 로컬 +y(행 방향), n: 바깥 법선
// cell(r, c) 중심 = origin + u*(2c+1) + v*(2r+1)
const FACES = {
  front:  { n: [0, 0, 1],  u: [1, 0, 0],  v: [0, 1, 0],  origin: [0, 0, S] },
  back:   { n: [0, 0, -1], u: [-1, 0, 0], v: [0, 1, 0],  origin: [S, 0, 0] },
  right:  { n: [1, 0, 0],  u: [0, 0, -1], v: [0, 1, 0],  origin: [S, 0, S] },
  left:   { n: [-1, 0, 0], u: [0, 0, 1],  v: [0, 1, 0],  origin: [0, 0, 0] },
  top:    { n: [0, -1, 0], u: [1, 0, 0],  v: [0, 0, 1],  origin: [0, 0, 0] },
  bottom: { n: [0, 1, 0],  u: [1, 0, 0],  v: [0, 0, -1], origin: [0, S, S] },
};

// 3D 셀 중심 → { face, r, c }
function cellOf(pos) {
  for (const [face, f] of Object.entries(FACES)) {

    if (rel[0] * f.n[0] + rel[1] * f.n[1] + rel[2] * f.n[2] !== 0) continue;
    const cu = rel[0] * f.u[0] + rel[1] * f.u[1] + rel[2] * f.u[2];

// 표면 전체 셀 나열 (6 * N * N개)

}

      if (prev.has(k)) continue;
      prev.set(k, { from: cur, state: nb });
      if (eq(nb.pos, foodPos)) { found = nb; break; }

  const path = [];
  let cur = found;
  while (cur) {
    path.unshift(cur);
    cur = prev.get(key(cur.pos)).from;
  }
  // path[0] = 머리. 면이 바뀌는 첫 지점에서, 넘어간 직후 n(= 직전 진행 방향)이 글로우 방향
  for (let i = 1; i < path.length; i++) {
    if (!eq(path[i].n, headN)) return path[i].n; // 모서리를 넘는 순간 n' = 이전 d
  }
  return null;
}

  };
}

  // setTimeout(tick, speed)로 직접 재귀하면 타이머를 가속하는 봇이 게임을 빠르게 돌릴 수 있음.
  // 대신 자주 깨어나되 performance.now() 기준 speed가 실제로 흘렀을 때만 한 칸 진행 →
  // 타이머만 가속한 봇은 무력화되고, 기기/프레임레이트와 무관하게 속도가 일정해짐.
  // (시계 자체를 후킹하는 정교한 봇까지 막진 못함 — 그건 서버 검증 영역)
  let lastStepTime = 0;
  function loop() {
    if (!alive) return;
    const now = performance.now();
    if (now >= lastStepTime + speed) {
      lastStepTime = now;
      tick();
    }
    if (alive) tickTimer = setTimeout(loop, Math.max(0, lastStepTime + speed - performance.now()));
  }
  function startLoop() {
    lastStepTime = performance.now();
    clearTimeout(tickTimer);
    tickTimer = setTimeout(loop, speed);
  }

  // 과일 개수 구간별 칭찬 멘트 (점수는 콤보 보너스 포함이라 실력 기준은 과일 개수)
  function deathMessage() {
    const head = `과일 <b>${fruits}개</b> · <b>${score}점</b>!`;
    if (score >= 150) return {
      t: '🏆 전설의 큐브 지배자!',
      m: `<b>${score}점</b>(과일 ${fruits}개)?! 이건 개발자도 못 깬 기록이에요.<br>너무 고수라서 개발자가 커피 한 잔 사겠습니다 ☕<br><a href="mailto:junhee@finda.co.kr">junhee@finda.co.kr</a> 로 연락 주세요!`,
    };
    if (fruits >= 26) return {
      t: '👑 큐브 마스터 직전!',
      m: `${head} 무지개 뱀까지 보셨군요.<br>150점을 찍으면 좋은 일이 생긴다는 소문이...`,
    };
    if (fruits >= 16) return {
      t: '🔥 고수의 향기!',
      m: `${head} 모서리를 넘나드는 솜씨가<br>예사롭지 않은데요?`,
    };
    if (fruits >= 6) return {
      t: '🍀 제법인데요?',
      m: `${head} 큐브가 슬슬<br>만만해 보이기 시작했죠?`,
    };
    if (fruits >= 1) return {
      t: '🌱 냠냠 입문 완료!',
      m: `${head} 몸풀기는 끝.<br>이제 진짜 실력을 보여줄 시간이에요`,
    };
    return {
      t: '🥚 음...',
      m: `과일은 장식이 아니에요! 🥲<br>딱 한 입만 먹어봐요`,
    };
  }

  function gameOver() {
    alive = false;
    clearTimeout(goldenTimer);
    if (legendTimer) { clearInterval(legendTimer); legendTimer = null; } // 전설 폭죽 정지
    render(); // 죽은 얼굴 표시
    SFX.over();
    // 최고 기록 갱신
    const best = +localStorage.getItem('cubeSnakeBest') || 0;
    const isRecord = score > 0 && score > best;
    if (isRecord) {
      localStorage.setItem('cubeSnakeBest', score);
      document.getElementById('best').textContent = score;
      setTimeout(() => SFX.record(), 800);
    }
    const ov = document.getElementById('overlay');
    const { t, m } = deathMessage();
    ov.querySelector('h1').textContent = t;
    ov.querySelector('p').innerHTML =
      (isRecord ? '<span class="newrecord">🎉 NEW RECORD! 🎉</span><br>' : '') +
      m +
      (maxCombo >= 2 ? `<br><span class="sub">최대 콤보 🔥x${maxCombo} · 과일 ${fruits}개</span>` : '');
    ov.querySelector('button').textContent = '다시 하기!';
    ov.classList.add('gameover'); // 간식 사주기 노출
    setTimeout(() => ov.classList.remove('hidden'), 700);
  }

  // ───────────────────────── 렌더링 ─────────────────────────
  // 차등 렌더링: 직전에 그린 셀만 지움 (216칸 전체 갱신 방지 → 버벅임 감소,
  // 과일 요소는 위치가 바뀔 때만 재생성 → 통통 애니메이션 리셋 방지)
  let dirtyCells = [], fruitEl = null, fruitSig = '', glowEl = null;
  function clearCell(c) {
    c.className = c.className.replace(/ (body|head|sparkle)/g, '');
    c.style.removeProperty('--seg');
    c.style.removeProperty('--dly');
    const sf = c.querySelector('.snake-face');
    if (sf) sf.remove();
  }
  function clearAllCells() {
    for (const { cells, edges } of Object.values(faceEls)) {
      for (const c of cells) clearCell(c);
      for (const e of Object.values(edges)) e.classList.remove('on');
    }
    dirtyCells = [];
    if (fruitEl) { fruitEl.remove(); fruitEl = null; }
    fruitSig = ''; glowEl = null;
  }

  function render() {
    for (const c of dirtyCells) clearCell(c);
    dirtyCells = [];
    // 뱀 스킨: ~5 기본 / 6~15 과일마다 색 변경 / 16~25 흐르는 색 / 26~ 무지개 반짝
    const tier = score >= 26 ? 3 : score >= 16 ? 2 : score >= 6 ? 1 : 0;
    const hueBase = (tickCount * 14) % 360;
    const applySkin = (el, i) => {
      // 면(파스텔)보다 진한 비비드 톤 — 배경과 색이 겹쳐도 구분됨
      if (tier === 3) {
        el.style.setProperty('--seg', `hsl(${(hueBase + i * 25) % 360}, 90%, 58%)`);
        el.style.setProperty('--dly', `${-(i % 6) * 0.08}s`);
        el.className += ' sparkle';
      } else if (tier === 2) {
        el.style.setProperty('--seg', `hsl(${(hueBase + i * 6) % 360}, 80%, 52%)`);
      } else if (tier === 1) {
        el.style.setProperty('--seg', `hsl(${(score * 47) % 360}, 75%, 52%)`);
      }
    };
    // 몸통
    for (let i = 1; i < snake.length; i++) {
      const el = cellEl(cellOf(snake[i]));
      el.className += ' body';
      applySkin(el, i);
      dirtyCells.push(el);
    }
    // 머리 + 표정
    const headCell = cellOf(snake[0]);
    const hEl = cellEl(headCell);
    hEl.className += ' head';
    applySkin(hEl, 0);
    dirtyCells.push(hEl);
    const f = FACES[headCell.face];
    const lu = dir[0]*f.u[0] + dir[1]*f.u[1] + dir[2]*f.u[2];
    const lv = dir[0]*f.v[0] + dir[1]*f.v[1] + dir[2]*f.v[2];
    const angle = Math.atan2(lu, -lv) * 180 / Math.PI;
    const faceDiv = document.createElement('div');
    faceDiv.className = 'snake-face' + (alive ? (yumTicks > 0 ? ' yum' : '') : ' dead');
    faceDiv.style.transform = `rotate(${angle}deg)`;
    faceDiv.innerHTML = '<div class="eyes"><div class="eye"></div><div class="eye"></div></div><div class="blush"><div class="cheek"></div><div class="cheek"></div></div>';
    hEl.appendChild(faceDiv);
    // 먹이: 위치·종류가 바뀔 때만 재생성
    const sig = key(foodPos) + fruit;
    if (sig !== fruitSig) {
      if (fruitEl) fruitEl.remove();
      const span = document.createElement('span');
      span.className = 'fruit' + (isGolden ? ' golden' : '');
      span.textContent = fruit;
      cellEl(cellOf(foodPos)).appendChild(span);
      fruitEl = span;
      fruitSig = sig;
    }
    // 모서리 글로우: 대상이 바뀔 때만 토글
    const g = glowDirection(snake[0], normal, foodPos);
    let nge = null;
    if (g) {
      const hf = FACES[headCell.face];
      const gu = g[0]*hf.u[0] + g[1]*hf.u[1] + g[2]*hf.u[2];
      const gv = g[0]*hf.v[0] + g[1]*hf.v[1] + g[2]*hf.v[2];
      const edge = gu === 1 ? 'right' : gu === -1 ? 'left' : gv === 1 ? 'bottom' : 'top';
      nge = faceEls[headCell.face].edges[edge];
    }
    if (nge !== glowEl) {
      if (glowEl) glowEl.classList.remove('on');
      if (nge) nge.classList.add('on');
      glowEl = nge;
    }
  }

  // ───────────────────────── 사운드 (Web Audio 합성음) ─────────────────────────
  let actx = null, masterGain = null;
  let muted = localStorage.getItem('cubeSnakeMuted') === '1';
  function ensureAudio() {
    if (!actx) {
      actx = new (window.AudioContext || window.webkitAudioContext)();
      // 모든 소리가 마스터 게인을 거침 → 음소거 시 예약된 소리까지 즉시 차단
      masterGain = actx.createGain();
      masterGain.gain.value = muted ? 0 : 1;
      masterGain.connect(actx.destination);
    }
    if (actx.state === 'suspended' && !muted) actx.resume();
  }
  function tone(freq, dur = 0.1, { type = 'sine', vol = 0.18, when = 0, slide = 0 } = {}) {
    if (muted || !actx) return;
    const t = actx.currentTime + when;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(masterGain);
    o.start(t); o.stop(t + dur + 0.02);
  }
  const SFX = {
    eat(combo = 1) {
      tone(420 + combo * 70, .09, { type: 'square', vol: .12 });
      tone(630 + combo * 70, .12, { type: 'square', vol: .1, when: .06 });
    },
    golden() { [660, 880, 1100, 1320].forEach((f, i) => tone(f, .12, { type: 'triangle', vol: .13, when: i * .07 })); },
    turn() { tone(300, .04, { type: 'sine', vol: .06 }); },
    pop() { tone(900 + Math.random() * 600, .2, { vol: .07, slide: -500 }); },
    over() { [392, 311, 247, 165].forEach((f, i) => tone(f, .22, { type: 'sawtooth', vol: .08, when: i * .16 })); },
    record() { [523, 659, 784, 1046, 1318].forEach((f, i) => tone(f, .16, { type: 'triangle', vol: .14, when: i * .09 })); },
  };
  const muteBtn = document.getElementById('mute');
  muteBtn.textContent = muted ? '🔇' : '🔊';
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    localStorage.setItem('cubeSnakeMuted', muted ? '1' : '0');
    muteBtn.textContent = muted ? '🔇' : '🔊';
    if (muted) {
      // 재생 중·예약된 소리까지 전부 즉시 끔
      if (masterGain) masterGain.gain.value = 0;
      if (actx) actx.suspend();
    } else {
      ensureAudio();
      if (masterGain) masterGain.gain.value = 1;
      SFX.eat(1);
    }
  });

  // ───────────────────────── 먹기 이펙트 ─────────────────────────
  const fxLayer = document.getElementById('fx');
  const FX_COLORS = ['#ff8a80', '#ffd180', '#ffff8d', '#ccff90', '#80d8ff', '#ea80fc'];
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

  function headScreenPos() {
    const el = document.querySelector('.cell.head');
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return { x: r.x + r.width / 2, y: r.y + r.height / 2 };
  }

  // 방사형 입자 터뜨리기
  function burst(x, y, { count, dist, sizeMin, sizeMax, duration, emojiRatio = 0 }) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'p';
      if (Math.random() < emojiRatio) {
        el.textContent = pick(['✨', '⭐', '💫']);
        el.style.fontSize = `${10 + Math.random() * 8}px`;
      } else {
        const s = sizeMin + Math.random() * (sizeMax - sizeMin);
        el.style.width = el.style.height = `${s}px`;
        el.style.borderRadius = '50%';
        el.style.background = pick(FX_COLORS);
      }
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      fxLayer.appendChild(el);
      const a = (i / count) * Math.PI * 2 + Math.random() * 0.6;
      const d = dist * (0.6 + Math.random() * 0.6);
      const dx = Math.cos(a) * d, dy = Math.sin(a) * d + dist * 0.3; // 살짝 아래로 (중력 느낌)
      el.animate([
        { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
        { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(.3)`, opacity: 0 },
      ], { duration, easing: 'cubic-bezier(.1,.6,.3,1)' }).onfinish = () => el.remove();
    }
  }

  // 확장되는 링
  function ring(x, y, size = 80, duration = 450) {
    const el = document.createElement('div');
    el.className = 'ring';
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    el.style.width = el.style.height = '10px';
    fxLayer.appendChild(el);
    el.animate([
      { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
      { transform: `translate(-50%,-50%) scale(${size / 10})`, opacity: 0 },
    ], { duration, easing: 'ease-out' }).onfinish = () => el.remove();
  }

  // 화면 곳곳 폭죽
  function firework() {
    const x = window.innerWidth * (0.15 + Math.random() * 0.7);
    const y = window.innerHeight * (0.1 + Math.random() * 0.5);
    burst(x, y, { count: 20, dist: 70 + Math.random() * 50, sizeMin: 4, sizeMax: 9, duration: 750, emojiRatio: 0.2 });
    ring(x, y, 100, 600);
    SFX.pop();
  }

  // 위로 떠오르는 획득 점수 텍스트
  function fxScore(x, y, text, big) {
    const el = document.createElement('div');
    el.className = 'p fx-score' + (big ? ' big' : '');
    el.textContent = text;
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    fxLayer.appendChild(el);
    el.animate([
      { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
      { transform: 'translate(-50%, calc(-50% - 48px)) scale(1.15)', opacity: 0 },
    ], { duration: 850, easing: 'ease-out' }).onfinish = () => el.remove();
  }

  // 점수 구간별 이펙트: ~5 없음 / 6~15 소형 / 16~25 팡팡 / 26~ 난리법석
  function eatEffect(gained = 1, wasGolden = false) {
    const hud = document.getElementById('hud');
    hud.classList.toggle('hype', score >= 26);
    if (score >= 26) { hud.classList.remove('pop'); void hud.offsetWidth; hud.classList.add('pop'); }
    const sp = headScreenPos();
    if (sp && (gained > 1 || wasGolden)) {
      fxScore(sp.x, sp.y - 24, (wasGolden ? '🌟' : '') + `+${gained}`, wasGolden || gained >= 6);
    }
    if (wasGolden && sp) burst(sp.x, sp.y, { count: 14, dist: 55, sizeMin: 4, sizeMax: 8, duration: 600, emojiRatio: 0.5 });
    if (score <= 5) return;
    const p = sp;
    if (!p) return;
    if (score <= 15) {
      burst(p.x, p.y, { count: 8, dist: 34, sizeMin: 4, sizeMax: 7, duration: 450 });
    } else if (score <= 25) {
      burst(p.x, p.y, { count: 18, dist: 70, sizeMin: 5, sizeMax: 10, duration: 650, emojiRatio: 0.2 });
      ring(p.x, p.y);
    } else {
      burst(p.x, p.y, { count: 24, dist: 85, sizeMin: 5, sizeMax: 11, duration: 700, emojiRatio: 0.25 });
      ring(p.x, p.y, 110, 550);
      for (let i = 0; i < 4; i++) setTimeout(firework, 120 + i * 160);
    }
  }

  // ───────────────────────── 자랑하기 ─────────────────────────
  const SITE = 'https://junhee1219.github.io/cube-game';
  const isMobile = () => /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

  // 간식 딥링크: PC에선 앱 스킴이 안 열리므로 "고마워요" 모달로 대체
  const thanksModal = document.getElementById('thanks');
  function openThanks() { thanksModal.classList.remove('hidden'); }
  function closeThanks() { thanksModal.classList.add('hidden'); }
  document.getElementById('thanks-close').addEventListener('click', closeThanks);
  thanksModal.addEventListener('click', (e) => { if (e.target === thanksModal) closeThanks(); });
  document.querySelectorAll('#snack a').forEach((a) => {
    a.addEventListener('click', (e) => {
      if (!isMobile()) { e.preventDefault(); openThanks(); } // PC: 링크 막고 모달
    });
  });
  // 공유 카드 티어 (deathMessage와 동일 기준)
  function shareTier() {
    if (score >= 150) return 'trophy';
    if (fruits >= 26) return 'crown';
    if (fruits >= 16) return 'fire';
    if (fruits >= 6) return 'clover';
    if (fruits >= 1) return 'sprout';
    return 'egg';
  }
  const shareBtn = document.getElementById('btn-share');
  shareBtn.addEventListener('click', async () => {
    const url = `${SITE}/share/${shareTier()}.html`;
    const text = `🐍 큐브스네이크 ${score}점 (과일 ${fruits}개)! 나를 이겨봐 ㅋㅋ`;
    try {
      if (navigator.share && isMobile()) {
        await navigator.share({ title: 'Cube Snake', text, url }); // 모바일: 네이티브 공유창 (카톡 바로 선택)
      } else {
        await navigator.clipboard.writeText(`${text}\n${url}`);
        shareBtn.textContent = '✅ 복사 완료! 카톡에 붙여넣기';
        setTimeout(() => { shareBtn.textContent = '📤 친구에게 자랑하기'; }, 2000);
      }
    } catch (e) { /* 공유 취소 시 무시 */ }
  });

  // ───────────────────────── 입력 ─────────────────────────
  function queueTurn(t) {
    if (!alive) return;
    // 누르는 즉시 방향 전환 (틱당 1회) — 연타는 큐에 쌓아 다음 틱에 적용
    if (!turnedThisTick && turnQueue.length === 0) {
      dir = t === 'L' ? turnLeft(dir, normal) : turnRight(dir, normal);
      turnedThisTick = true;
      SFX.turn();
      updateCamera(); // 카메라도 즉시 회전 시작
      render(); // 눈 방향 즉시 반영
    } else if (turnQueue.length < 3) {
      turnQueue.push(t);
    }
  }
  document.getElementById('btn-left').addEventListener('pointerdown', (e) => { e.preventDefault(); queueTurn('L'); });
  document.getElementById('btn-right').addEventListener('pointerdown', (e) => { e.preventDefault(); queueTurn('R'); });
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a') { e.preventDefault(); queueTurn('L'); }
    if (e.key === 'ArrowRight' || e.key === 'd') { e.preventDefault(); queueTurn('R'); }
  });

  // 가운데(큐브 영역) 좌우 스와이프 — 모바일 한 손 조작
  (function swipeControl() {
    const scene = document.getElementById('scene');
    const SWIPE_MIN = 30; // 회전으로 인정할 최소 가로 이동(px)
    let startX = null, startY = null, fired = false;
    scene.addEventListener('pointerdown', (e) => {
      startX = e.clientX; startY = e.clientY; fired = false;
    });
    scene.addEventListener('pointermove', (e) => {
      if (startX === null || fired) return;
      const dx = e.clientX - startX, dy = e.clientY - startY;
      // 가로 우세 + 임계값 넘으면 회전 (한 번의 스와이프에 한 번만)
      if (Math.abs(dx) > SWIPE_MIN && Math.abs(dx) > Math.abs(dy)) {
        queueTurn(dx < 0 ? 'L' : 'R');
        fired = true; // 손 뗄 때까지 추가 발동 막음
      }
    });
    const end = () => { startX = startY = null; };
    scene.addEventListener('pointerup', end);
    scene.addEventListener('pointercancel', end);
  })();

  document.getElementById('btn-start').addEventListener('click', () => {
    ensureAudio(); // 사용자 제스처에서 오디오 활성화 (iOS 필수)
    document.getElementById('overlay').classList.add('hidden');
    reset();
    startLoop();
  });

  // 최고 기록 표시 초기화
  document.getElementById('best').textContent = +localStorage.getItem('cubeSnakeBest') || 0;

  // 첫 화면: 큐브가 보이도록 초기 상태만 렌더
  reset();

  // PWA 서비스 워커 등록 (http/https에서만 — 파일로 직접 열면 건너뜀)
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // 테스트/디버그용 훅 — 로컬 개발 환경에서만 노출 (배포 페이지에선 정의 안 됨)
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    window.__debug = () => ({ snake, dir, normal, foodPos, score, speed, alive, fruits, combo, maxCombo, isGolden, tickCount,
      audio: { muted, state: actx && actx.state, masterVol: masterGain && masterGain.gain.value } });
    window.__testFx = (s) => { score = s; document.getElementById('score').textContent = s; render(); eatEffect(); };
    window.__testOver = (s, f = s) => { score = s; fruits = f; gameOver(); };
  }
})();
</script>
