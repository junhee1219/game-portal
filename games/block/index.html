<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#eef1fb">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="블록 팡">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta property="og:type" content="website">
<meta property="og:title" content="블록 팡 — 한 줄 꽉 채워 팡!">
<meta property="og:description" content="조각을 드래그해 줄을 꽉 채우면 팡! 콤보 배율과 폭탄 블록까지. 손맛 가득한 블록 퍼즐.">
<title>블록 팡</title>
<style>
  @font-face{font-family:"Pretendard Variable";font-weight:45 920;font-style:normal;font-display:swap;src:url("/fonts/PretendardVariable.woff2") format("woff2-variations");}
  :root{
    /* 밝은 파스텔 단일 색조 — 라일락/스카이 톤, 검보라/네온 금지 */
    --bg-a:#f3f1fc;       /* 위쪽 살짝 밝게 */
    --bg-b:#e7e9fa;       /* 아래쪽 */
    --bg-c:#dfe3f6;
    --ink:#3b3a52;        /* 본문 */
    --ink-soft:#7d7c97;   /* 보조 */
    --cell:#e3e2f2;       /* 빈 칸 */
    --cell-line:rgba(80,75,120,.10);
    --board-bg:rgba(255,255,255,.55);
    --card:#ffffff;
    --scrim:rgba(50,48,80,.34);
    --glass:rgba(255,255,255,.66);
    --glass-border:rgba(80,72,120,.16);
    --shadow:rgba(80,72,120,.22);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    height:100%;
    /* 설치형(standalone)에서 하단 흰 영역 방지: html·body 둘 다 파스텔 배경 */
    background:var(--bg-b);
  }
  body{
    font-family:"Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    min-height:100vh;min-height:100dvh;width:100vw;overflow:hidden;
    background-color:var(--bg-b);
    background-image:radial-gradient(130% 100% at 50% 0%, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%);
    color:var(--ink);display:flex;flex-direction:column;align-items:center;
    padding:calc(8px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));
    position:relative;
    user-select:none;-webkit-user-select:none;touch-action:none;
    overscroll-behavior:none;
  }

  /* ── 상단 바 ── */
  .topbar{display:flex;align-items:center;gap:8px;z-index:2;width:100%;max-width:480px;flex:0 0 auto;}
  h1{
    font-family:"Pretendard Variable",-apple-system,sans-serif;font-weight:600;font-size:20px;letter-spacing:-.3px;
    color:var(--ink);margin-right:auto;white-space:nowrap;display:flex;align-items:center;gap:8px;
  }
  h1 .logo{display:inline-flex;gap:2px;}
  h1 .logo i{width:9px;height:9px;border-radius:3px;display:block;box-shadow:0 1px 0 rgba(0,0,0,.12);}
  h1 .logo i:nth-child(1){background:#7eb6f0;}
  h1 .logo i:nth-child(2){background:#f5a8c0;margin-top:6px;}
  h1 .logo i:nth-child(3){background:#9fd9a8;}
  .pill{
    background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(10px);
    padding:6px 13px;border-radius:999px;font-size:12px;font-family:"Pretendard Variable",-apple-system,sans-serif;
    display:flex;align-items:center;gap:6px;white-space:nowrap;color:var(--ink);line-height:1;
  }
  .pill .lbl{color:var(--ink-soft);font-size:10.5px;letter-spacing:.3px;}
  .pill b{font-size:15px;}
  #best-pill b{color:#e8943a;}
  .mute-btn{
    width:42px;height:42px;flex:0 0 auto;border-radius:13px;cursor:pointer;
    background:linear-gradient(180deg,#ffffff,#eef0fa);border:1px solid var(--glass-border);
    box-shadow:0 3px 0 rgba(120,112,160,.2), 0 4px 10px var(--shadow);
    display:flex;align-items:center;justify-content:center;color:#6b6890;transition:transform .1s;
  }
  .mute-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(120,112,160,.2);}
  .ki{width:24px;height:24px;fill:currentColor;display:block;}

  /* ── 보드 ── */
  #stage{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;width:100%;min-height:0;z-index:2;}
  #board{
    position:relative;background:var(--board-bg);border:1px solid var(--glass-border);
    border-radius:16px;padding:6px;box-shadow:inset 0 1px 0 rgba(255,255,255,.7), 0 8px 22px var(--shadow);
    display:grid;gap:4px;touch-action:none;
  }
  .cell{
    background:var(--cell);border-radius:7px;position:relative;
    box-shadow:inset 0 0 0 1px var(--cell-line);
  }
  .cell.drop-ok{background:rgba(150,200,160,.45);box-shadow:inset 0 0 0 1px rgba(90,160,110,.5);}
  .cell.drop-bad{background:rgba(225,150,150,.35);}
  /* 채워진 블록 — 파스텔 단색 라운드 사각형 (색+모양으로 구분, 이모지 없음) */
  .blk{
    position:absolute;inset:0;border-radius:7px;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.45), inset 0 -3px 0 rgba(0,0,0,.10), 0 2px 0 rgba(0,0,0,.06);
  }
  .blk.spawn{animation:blk-in .18s cubic-bezier(.3,1.4,.5,1);}
  @keyframes blk-in{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
  .blk.clearing{animation:blk-pop .32s ease forwards;z-index:3;}
  @keyframes blk-pop{
    0%{transform:scale(1);}
    35%{transform:scale(1.18);filter:brightness(1.25);}
    100%{transform:scale(0);opacity:0;}
  }
  /* 폭탄 블록 표식 — 동심원(이모지 아님) */
  .blk.bomb::after{
    content:'';position:absolute;inset:25%;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, rgba(255,255,255,.9), rgba(255,255,255,.15) 55%, transparent 60%),
               rgba(40,38,60,.78);
    box-shadow:0 0 0 2px rgba(255,255,255,.35);
  }
  #board.shake{animation:shake .34s;}
  @keyframes shake{0%,100%{transform:translate(0,0);}20%{transform:translate(-5px,2px);}40%{transform:translate(5px,-2px);}60%{transform:translate(-4px,-2px);}80%{transform:translate(4px,2px);}}

  /* ── 트레이 (조각 3개) ── */
  #tray{
    display:flex;align-items:center;justify-content:space-around;gap:8px;
    width:100%;max-width:480px;flex:0 0 auto;
    background:var(--board-bg);border:1px solid var(--glass-border);
    border-radius:18px;padding:10px 8px;box-shadow:inset 0 1px 0 rgba(255,255,255,.7), 0 6px 18px var(--shadow);
    min-height:104px;
  }
  .slot{
    flex:1 1 0;display:flex;align-items:center;justify-content:center;min-width:0;height:88px;
    touch-action:none;
  }
  .piece{
    display:grid;gap:3px;cursor:grab;touch-action:none;transition:transform .12s;
  }
  .piece.dragging{opacity:.25;}
  .piece.used{visibility:hidden;}
  .piece .pc{border-radius:6px;box-shadow:inset 0 2px 0 rgba(255,255,255,.45), inset 0 -3px 0 rgba(0,0,0,.10);}
  .piece .pc.bomb::after{content:'';position:absolute;}

  /* 드래그 고스트 (포인터 따라다님) */
  #ghost{position:fixed;left:0;top:0;z-index:60;pointer-events:none;display:none;}
  #ghost .gp{display:grid;gap:4px;}
  #ghost .gc{border-radius:6px;box-shadow:inset 0 2px 0 rgba(255,255,255,.45), inset 0 -3px 0 rgba(0,0,0,.10), 0 3px 8px rgba(0,0,0,.18);}

  /* 점수 팝업 + 콤보 */
  #fx{position:fixed;inset:0;width:100vw;height:100dvh;z-index:50;pointer-events:none;}
  #combo{
    position:fixed;left:50%;top:38%;transform:translate(-50%,-50%) scale(.4);
    font-family:"Pretendard Variable",-apple-system,sans-serif;font-weight:700;font-size:46px;z-index:55;pointer-events:none;
    color:#fff;opacity:0;text-shadow:0 3px 0 rgba(120,90,160,.35), 0 6px 16px rgba(0,0,0,.25);
    white-space:nowrap;
  }
  #combo.show{animation:combo-pop .9s ease forwards;}
  @keyframes combo-pop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-6deg);}
    20%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(2deg);}
    70%{opacity:1;transform:translate(-50%,-58%) scale(1) rotate(0);}
    100%{opacity:0;transform:translate(-50%,-72%) scale(1);}
  }

  /* ── 게임오버 오버레이 ── */
  #over{
    position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;
    background:var(--scrim);backdrop-filter:blur(6px);
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
  #over.show{opacity:1;pointer-events:auto;}
  .over-card{
    background:var(--card);border:1px solid var(--glass-border);
    border-radius:26px;padding:30px 28px 24px;text-align:center;width:min(320px,86vw);
    box-shadow:0 24px 60px rgba(50,40,80,.28), inset 0 1px 0 rgba(255,255,255,.9);
    transform:scale(.82);transition:transform .35s cubic-bezier(.2,1.4,.4,1);
  }
  #over.show .over-card{transform:scale(1);}
  .over-card h2{font-family:"Pretendard Variable",-apple-system,sans-serif;font-size:26px;margin-bottom:4px;color:var(--ink);}
  .over-card .sc{font-family:"Pretendard Variable",-apple-system,sans-serif;font-size:44px;font-weight:700;color:#7c7af0;margin:8px 0 2px;line-height:1;}
  .over-card .sc-lbl{font-size:12px;color:var(--ink-soft);letter-spacing:.5px;}
  #over-best{font-size:13px;color:var(--ink-soft);margin-top:8px;}
  #over-record{
    display:none;font-family:"Pretendard Variable",-apple-system,sans-serif;font-size:13px;color:#7a4d00;font-weight:700;
    background:linear-gradient(135deg,#ffe6a3,#ffcf7e);border-radius:999px;padding:4px 14px;margin-top:10px;
  }
  #over-record.show{display:inline-block;animation:rec-pop .5s ease;}
  @keyframes rec-pop{0%{transform:scale(.5);}60%{transform:scale(1.12);}100%{transform:scale(1);}}
  #btn-again{
    margin-top:18px;width:100%;border:none;border-radius:16px;cursor:pointer;
    font-family:"Pretendard Variable",-apple-system,sans-serif;font-size:18px;font-weight:600;color:#fff;padding:14px 0;
    background:linear-gradient(180deg,#8f8df3,#6e6cdd);
    box-shadow:0 4px 0 #5755bf, 0 6px 14px rgba(90,80,200,.4);
    transition:transform .1s;
  }
  #btn-again:active{transform:translateY(2px);box-shadow:0 2px 0 #5755bf;}

  .credit{position:fixed;left:0;right:0;bottom:calc(4px + env(safe-area-inset-bottom));text-align:center;font-size:10px;color:var(--ink-soft);opacity:.6;font-family:"Pretendard Variable",-apple-system,sans-serif;z-index:1;}

  @media (max-width:380px){
    h1{font-size:18px;}
    #combo{font-size:38px;}
  }
</style>
</head>
<body>
  <!-- 스피커 아이콘 심볼 (vase/sprite.svg에서 복사) — 인라인, fetch 안 함 -->
  <svg style="display:none" aria-hidden="true">
    <symbol id="p-speaker-high" viewBox="0 0 256 256"><path d="M160,32.25V223.69a8.29,8.29,0,0,1-3.91,7.18,8,8,0,0,1-9-.56l-65.57-51A4,4,0,0,1,80,176.16V79.84a4,4,0,0,1,1.55-3.15l65.57-51a8,8,0,0,1,10,.16A8.27,8.27,0,0,1,160,32.25ZM60,80H32A16,16,0,0,0,16,96v64a16,16,0,0,0,16,16H60a4,4,0,0,0,4-4V84A4,4,0,0,0,60,80Zm126.77,20.84a8,8,0,0,0-.72,11.3,24,24,0,0,1,0,31.72,8,8,0,1,0,12,10.58,40,40,0,0,0,0-52.88A8,8,0,0,0,186.74,100.84Zm40.89-26.17a8,8,0,1,0-11.92,10.66,64,64,0,0,1,0,85.34,8,8,0,1,0,11.92,10.66,80,80,0,0,0,0-106.66Z"/></symbol>
    <symbol id="p-speaker-slash" viewBox="0 0 256 256"><path d="M213.92,210.62a8,8,0,1,1-11.84,10.76L160,175.09v48.6a8.29,8.29,0,0,1-3.91,7.18,8,8,0,0,1-9-.56l-65.55-51A4,4,0,0,1,80,176.18V87.09L42.08,45.38A8,8,0,1,1,53.92,34.62Zm-27.21-55.46a8,8,0,0,0,11.29-.7,40,40,0,0,0,0-52.88,8,8,0,1,0-12,10.57,24,24,0,0,1,0,31.72A8,8,0,0,0,186.71,155.16Zm40.92-80.49a8,8,0,1,0-11.92,10.66,64,64,0,0,1,0,85.34,8,8,0,1,0,11.92,10.66,80,80,0,0,0,0-106.66ZM153,119.87a4,4,0,0,0,7-2.7V32.25a8.27,8.27,0,0,0-2.88-6.4,8,8,0,0,0-10-.16L103.83,59.33a4,4,0,0,0-.5,5.85ZM60,80H32A16,16,0,0,0,16,96v64a16,16,0,0,0,16,16H60a4,4,0,0,0,4-4V84A4,4,0,0,0,60,80Z"/></symbol>
  </svg>

  <div class="topbar">
    <h1><span class="logo"><i></i><i></i><i></i></span>블록 팡</h1>
    <div class="pill"><span class="lbl">점수</span><b id="score">0</b></div>
    <div class="pill" id="best-pill"><span class="lbl">최고</span><b id="best">0</b></div>
    <button class="mute-btn" id="mute" aria-label="소리 켜기/끄기">
      <svg class="ki"><use id="mute-use" href="#p-speaker-high"/></svg>
    </button>
  </div>

  <div id="stage">
    <div id="board"></div>
  </div>

  <div id="tray">
    <div class="slot" data-slot="0"></div>
    <div class="slot" data-slot="1"></div>
    <div class="slot" data-slot="2"></div>
  </div>

  <canvas id="fx"></canvas>
  <div id="combo"></div>
  <div id="ghost"><div class="gp"></div></div>

  <div id="over">
    <div class="over-card">
      <h2>게임 오버</h2>
      <div class="sc" id="over-score">0</div>
      <div class="sc-lbl">점</div>
      <div id="over-best">최고 0점</div>
      <span id="over-record">신기록!</span>
      <button id="btn-again">다시 하기</button>
    </div>
  </div>

  <div class="credit">블록 팡</div>

<script src="game.js"></script>
<script>
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
