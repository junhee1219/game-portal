<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffe6cf">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="과일 팡팡">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>과일 팡팡</title>
<style>
  @font-face {
    font-family: "Pretendard Variable"; font-weight: 45 920; font-style: normal; font-display: swap;
    src: url("/fonts/PretendardVariable.woff2") format("woff2-variations");
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink: #6b4a32; --ink-dim: #b08c72; --accent: #ff7a59;
    --fs-1: clamp(28px, 8vw, 40px);  /* display */
    --fs-2: 16px;                     /* body / 숫자 */
    --fs-3: 13px;                     /* 라벨 / caption */
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: linear-gradient(170deg, #fff5e9 0%, #ffe6cf 100%);
    font-family: "Pretendard Variable", -apple-system, "Apple SD Gothic Neo", sans-serif;
    color: var(--ink);
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation; -webkit-touch-callout: none;
    display: flex; flex-direction: column; align-items: center;
    padding-top: env(safe-area-inset-top);
  }

  /* ── HUD ── */
  #hud {
    width: 100%; max-width: 480px; padding: 12px 18px 4px;
    display: flex; align-items: center; gap: 14px;
  }
  .stat { display: flex; flex-direction: column; line-height: 1.1; }
  .stat .lbl { font-size: var(--fs-3); font-weight: 800; color: var(--ink-dim); }
  .stat .val { font-size: var(--fs-2); font-weight: 900; }
  #level { font-size: var(--fs-1); }
  .stat.score { margin-left: 4px; }
  #score { display: inline-block; transform-origin: left center; }
  .moves-pill {
    margin-left: auto; display: flex; flex-direction: column; align-items: center;
    background: #fff; border-radius: 16px; padding: 6px 16px;
    box-shadow: 0 3px 0 rgba(107,74,50,.12);
  }
  .moves-pill .lbl { font-size: var(--fs-3); font-weight: 800; color: var(--ink-dim); }
  #moves { font-size: var(--fs-1); font-weight: 900; line-height: 1; }
  .moves-pill.low #moves { color: var(--accent); animation: pulse .6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
  #mute {
    width: 40px; height: 40px; flex: none; border-radius: 50%;
    background: #fff; border: 1px solid rgba(107,74,50,.14); color: var(--ink);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 0 2px 0 rgba(107,74,50,.12);
  }
  #mute:active { transform: translateY(1px); box-shadow: none; }
  .ki { width: 20px; height: 20px; fill: currentColor; }

  /* ── 목표 칩 ── */
  #goals { display: flex; gap: 8px; padding: 8px 18px 10px; flex-wrap: wrap; justify-content: center; }
  .goal {
    display: flex; align-items: center; gap: 5px;
    background: #fff; border-radius: 99px; padding: 5px 12px 5px 8px;
    box-shadow: 0 2px 0 rgba(107,74,50,.1);
    font-size: var(--fs-2); font-weight: 900;
  }
  .goal .gfrt { width: 22px; height: 22px; fill: var(--fc); }
  .goal.done { opacity: .45; }
  .goal.done span { color: #2ec4b6; }

  /* ── 보드 ── */
  #board { position: relative; margin: 2px auto 0; }
  #fx { position: absolute; inset: 0; pointer-events: none; z-index: 20; overflow: visible; }
  .tile { position: absolute; top: 0; left: 0; transition: transform .18s cubic-bezier(.34,1.4,.5,1); will-change: transform; }
  .ti {
    width: 100%; height: 100%; border-radius: 24%;
    background: #fff; box-shadow: 0 3px 0 rgba(107,74,50,.13), inset 0 0 0 1px rgba(107,74,50,.05);
    display: flex; align-items: center; justify-content: center;
    transition: transform .12s ease;
  }
  .frt { width: 66%; height: 66%; fill: var(--fc); filter: drop-shadow(0 1px 0 rgba(0,0,0,.08)); }
  .tile.sel .ti { transform: scale(1.13); box-shadow: 0 0 0 3px var(--fc), 0 4px 8px rgba(107,74,50,.25); }
  .tile.pop { z-index: 5; }
  .tile.pop .ti { animation: pop .28s ease forwards; }
  @keyframes pop { 0% { transform: scale(1); } 38% { transform: scale(1.32); } 100% { transform: scale(0); opacity: 0; } }
  #board.shake { animation: shake .3s ease; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); } }

  /* ── 손맛 ── */
  .spark { position: absolute; width: 9px; height: 9px; border-radius: 50%; background: var(--fc); transform: translate(-50%,-50%); animation: sparkfly .48s ease-out forwards; }
  @keyframes sparkfly { 0% { opacity: 1; transform: translate(-50%,-50%) scale(1); } 100% { opacity: 0; transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.2); } }
  .gain { position: absolute; transform: translate(-50%,-50%); font-size: var(--fs-2); font-weight: 900; color: #fff; text-shadow: 0 1px 0 rgba(0,0,0,.25), 0 0 6px rgba(255,160,90,.6); animation: gainup .72s ease-out forwards; }
  @keyframes gainup { 0% { opacity: 0; transform: translate(-50%,-50%) scale(.6); } 25% { opacity: 1; transform: translate(-50%,-90%) scale(1.1); } 100% { opacity: 0; transform: translate(-50%,-170%) scale(1); } }
  .combo { position: absolute; left: 50%; top: 40%; transform: translate(-50%,-50%); font-size: var(--fs-1); font-weight: 900; color: var(--accent); text-shadow: 0 2px 0 #fff, 0 4px 10px rgba(255,122,89,.4); white-space: nowrap; animation: comboPop .78s ease-out forwards; }
  @keyframes comboPop { 0% { opacity: 0; transform: translate(-50%,-50%) scale(.5) rotate(-7deg); } 30% { opacity: 1; transform: translate(-50%,-50%) scale(1.18) rotate(3deg); } 72% { opacity: 1; transform: translate(-50%,-60%) scale(1) rotate(0); } 100% { opacity: 0; transform: translate(-50%,-95%) scale(1); } }
  #score.bump { animation: bump .25s ease; }
  @keyframes bump { 0% { transform: scale(1); } 40% { transform: scale(1.28); } 100% { transform: scale(1); } }

  /* ── 오버레이 ── */
  .ov { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; background: rgba(255,238,220,.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 24px; }
  .ov.hidden { display: none; }
  .card { background: #fff; border-radius: 28px; padding: 30px 28px 26px; text-align: center; width: 100%; max-width: 320px; box-shadow: 0 12px 0 rgba(107,74,50,.1), 0 20px 40px rgba(107,74,50,.18); }
  .card h1 { font-size: var(--fs-1); font-weight: 900; letter-spacing: -.02em; }
  .card .row-fruit { display: flex; justify-content: center; gap: 6px; margin: 14px 0 6px; }
  .card .row-fruit svg { width: 34px; height: 34px; }
  .card p { font-size: var(--fs-3); color: var(--ink-dim); line-height: 1.6; margin-top: 10px; }
  .big { font-size: var(--fs-1); font-weight: 900; margin: 4px 0 2px; }
  .label-sm { font-size: var(--fs-3); color: var(--ink-dim); font-weight: 700; }
  .new-badge { display: inline-block; background: var(--accent); color: #fff; font-weight: 800; font-size: var(--fs-3); padding: 4px 12px; border-radius: 99px; margin: 6px 0; }
  .btn { margin-top: 18px; width: 100%; border: none; cursor: pointer; font-family: inherit; background: var(--accent); color: #fff; font-size: var(--fs-2); font-weight: 900; padding: 16px; border-radius: 18px; box-shadow: 0 5px 0 #d8553a; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn:active { transform: translateY(4px); box-shadow: none; }
  .btn .ki { width: 22px; height: 22px; }
  .btn-ghost { margin-top: 10px; background: none; box-shadow: none; color: var(--ink-dim); font-weight: 700; font-size: var(--fs-3); padding: 8px; }
  .btn-ghost:active { transform: none; }
  .k-credit { margin-top: 14px; font-size: var(--fs-3); color: var(--ink-dim); }
  .k-credit a { color: var(--ink-dim); }
</style>
</head>
