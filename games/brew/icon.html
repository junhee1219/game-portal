<!DOCTYPE html><html><head><meta charset="utf-8"><style>html,body{margin:0;background:#fff;}</style></head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
const cv=document.getElementById('c'), x=cv.getContext('2d');
function rr(ctx,X,Y,W,H,R){R=Math.min(R,W/2,H/2);ctx.beginPath();ctx.moveTo(X+R,Y);ctx.arcTo(X+W,Y,X+W,Y+H,R);ctx.arcTo(X+W,Y+H,X,Y+H,R);ctx.arcTo(X,Y+H,X,Y,R);ctx.arcTo(X,Y,X+W,Y,R);ctx.closePath();}
// 라벤더 배경 (명도폭 좁게)
const g=x.createLinearGradient(0,0,0,512);
g.addColorStop(0,'#f4eef8'); g.addColorStop(1,'#e2d8ea');
rr(x,0,0,512,512,112); x.fillStyle=g; x.fill();
// 가마솥 (단순 캔디 스타일: 윗 림 + 하단 하드 섀도)
x.fillStyle='rgba(60,40,85,.18)';
x.beginPath(); x.ellipse(256,438,150,18,0,0,7); x.fill();
const pot=x.createLinearGradient(0,250,0,440);
pot.addColorStop(0,'#5d5468'); pot.addColorStop(1,'#453d50');
x.beginPath(); x.ellipse(256,330,150,55,0,Math.PI,0); // 입구 타원 위
x.lineTo(396,360); x.quadraticCurveTo(380,440,256,440); x.quadraticCurveTo(132,440,116,360); x.closePath();
x.fillStyle=pot; x.fill();
// 입구
x.beginPath(); x.ellipse(256,330,150,42,0,0,7); x.fillStyle='#372f42'; x.fill();
// 마법 액체
x.beginPath(); x.ellipse(256,330,128,32,0,0,7);
const liq=x.createLinearGradient(106,0,406,0);
liq.addColorStop(0,'#9d77c8'); liq.addColorStop(1,'#8a63b8');
x.fillStyle=liq; x.fill();
// 윗 림 하이라이트
x.beginPath(); x.ellipse(256,326,128,28,0,Math.PI*1.05,Math.PI*1.95);
x.strokeStyle='rgba(255,255,255,.5)'; x.lineWidth=7; x.stroke();
// 보글보글 방울
[[200,318,13],[262,308,9],[310,322,11]].forEach(([bx,by,br])=>{
  x.beginPath(); x.arc(bx,by,br,0,7); x.fillStyle='#c5a8e4'; x.fill();
  x.beginPath(); x.arc(bx-br*0.3,by-br*0.3,br*0.32,0,7); x.fillStyle='rgba(255,255,255,.7)'; x.fill();
});
// 떠오르는 원소 방울: 물(파랑)+불(주황) → 별
function orb(cx,cy,r,c0,c1){
  const og=x.createLinearGradient(0,cy-r,0,cy+r);
  og.addColorStop(0,c0); og.addColorStop(1,c1);
  x.beginPath(); x.arc(cx,cy,r,0,7); x.fillStyle=og; x.fill();
  x.beginPath(); x.arc(cx-r*0.32,cy-r*0.34,r*0.27,0,7); x.fillStyle='rgba(255,255,255,.6)'; x.fill();
  x.fillStyle='rgba(60,40,85,.16)';
  x.beginPath(); x.ellipse(cx,cy+r+9,r*0.8,7,0,0,7); x.fill();
}
orb(150,168,52,'#8fc4e4','#5fa3cc');  // 물
orb(362,168,52,'#eb9a7e','#dd6e52');  // 불
// + 기호
x.fillStyle='#6b5a80'; x.font='900 84px -apple-system,sans-serif';
x.textAlign='center'; x.textBaseline='middle'; x.fillText('+',256,168);
// 결과 별 (반짝)
function star(cx,cy,R){
  x.beginPath();
  for(let k=0;k<8;k++){
    const a=Math.PI/4*k - Math.PI/2, rr2=k%2?R*0.45:R;
    const px=cx+rr2*Math.cos(a), py=cy+rr2*Math.sin(a);
    k?x.lineTo(px,py):x.moveTo(px,py);
  }
  x.closePath();
  x.fillStyle='#f2c75e'; x.fill();
}
star(256,86,38);
window.__png=()=>cv.toDataURL('image/png');
</script>
</body></html>
