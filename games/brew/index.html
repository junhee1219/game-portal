<html lang="ko">

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#f1ecf6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta property="og:description" content="물·불·흙·바람에서 시작해 용과 현자의 돌까지. 시간제한 없는 발견 도감 퍼즐.">
  <link rel="manifest" href="manifest.json">

  <link rel="apple-touch-icon" href="icon-192.png">
  <title>꼬마 연금술사</title>
  <style>
    @font-face{font-family:"Pretendard Variable";font-weight:45 920;font-style:normal;font-display:swap;src:url("/fonts/PretendardVariable.woff2") format("woff2-variations");}
    :root{
      --bg-a:#f6f1f8;
      --bg-b:#efe9f3;
      --bg-c:#e3dbe9;
      --ink:#352e3c;
      --ink-soft:#7d7388;
      --accent:#8a63b8;
      --accent-deep:#6b4a93;
      --warn:#d4543f;
      --fs-1:clamp(32px,10vw,44px);
      --fs-2:16px;
      --fs-3:13px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--bg-b);}
    body{
      font-family:"Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
      background-color:var(--bg-b);
      background-image:radial-gradient(130% 100% at 50% 0%,var(--bg-a) 0%,var(--bg-b) 56%,var(--bg-c) 100%);
      color:var(--ink);
      user-select:none;-webkit-user-select:none;touch-action:manipulation;
    }
    button{font:inherit;}
    .topbar{display:flex;align-items:center;gap:8px;width:100%;max-width:500px;flex:0 0 auto;z-index:2;}
    .pill{
      display:flex;align-items:center;gap:6px;white-space:nowrap;
      border:1px solid rgba(100,80,130,.16);background:rgba(255,255,255,.72);
      border-radius:999px;padding:7px 12px;box-shadow:0 2px 0 rgba(100,80,130,.10);
      color:var(--ink-soft);font-size:var(--fs-3);font-weight:700;
    }
    .pill b{color:var(--ink);font-size:var(--fs-2);}
    .sp{margin-left:auto;}
    .icon-btn{
      width:42px;height:42px;border:1px solid rgba(100,80,130,.16);border-radius:13px;
      background:linear-gradient(180deg,#fff,#f0eaf4);color:#6d6178;
      display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 rgba(100,80,130,.15);
      cursor:pointer;transition:transform .1s ease,box-shadow .1s ease;position:relative;
    }
    .icon-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(100,80,130,.15);}
    .icon-btn:disabled{opacity:.4;}
    .icon-btn .badge{
      position:absolute;top:-5px;right:-5px;min-width:19px;height:19px;border-radius:10px;
      background:var(--accent);color:#fff;font-size:11px;font-weight:900;
      display:flex;align-items:center;justify-content:center;padding:0 5px;
    }
    .ki{width:23px;height:23px;fill:currentColor;display:block;}

    #stage{flex:1 1 auto;width:100%;max-width:500px;display:flex;flex-direction:column;align-items:center;gap:10px;min-height:0;padding-top:6px;}

    /* 가마솥(작업대) */
    #bench{
      flex:0 0 auto;width:min(92vw,420px);border-radius:20px;padding:14px 12px 12px;
      background:linear-gradient(180deg,#fff,#f3eef7);
      border:1px solid rgba(100,80,130,.14);
      box-shadow:0 6px 0 rgba(100,80,130,.12),0 14px 28px rgba(100,80,130,.14);
      display:flex;align-items:center;justify-content:center;gap:10px;position:relative;overflow:visible;
    }
    .slot{
      width:96px;height:76px;border-radius:16px;border:2px dashed rgba(100,80,130,.3);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
      color:#b3a8bf;font-size:12px;font-weight:800;background:rgba(138,99,184,.05);
      transition:transform .12s ease,border-color .15s ease;
    }
    .slot.filled{border-style:solid;border-color:transparent;color:var(--ink);background:none;}
    .slot .chip{pointer-events:none;}
    .plus{font-size:22px;font-weight:900;color:#c4b9cf;flex:0 0 auto;}
    #bench.bubble{animation:bubble .5s ease;}
    @keyframes bubble{0%,100%{transform:none;}25%{transform:scale(1.03) rotate(-1deg);}60%{transform:scale(.99) rotate(.8deg);}}
    #bench.poof .slot{animation:poof .45s ease;}
    @keyframes poof{0%{transform:none;}30%{transform:translateY(3px) scale(.94);}100%{transform:none;}}

    /* 결과 카드 */
    #reveal{
      position:absolute;left:50%;top:-12px;transform:translate(-50%,-100%) scale(.6);
      opacity:0;pointer-events:none;z-index:30;
      transition:transform .3s cubic-bezier(.3,1.5,.5,1),opacity .25s ease;
    }
    #reveal.show{opacity:1;transform:translate(-50%,-104%) scale(1);}
    #reveal .chip{box-shadow:0 8px 22px rgba(100,80,130,.35);}

    /* 원소 칩 */
    .chip{
      display:inline-flex;align-items:center;gap:6px;
      border-radius:13px;padding:8px 11px;border:none;cursor:pointer;
      font-size:14px;font-weight:850;color:var(--ink);
      background:linear-gradient(180deg,#fff,var(--cc,#eee));
      box-shadow:inset 0 0 0 1.5px var(--cb,rgba(0,0,0,.08)),0 3px 0 var(--cs,rgba(100,80,130,.18));
      transition:transform .1s ease,box-shadow .1s ease;
    }
    .chip:active{transform:translateY(2px);box-shadow:inset 0 0 0 1.5px var(--cb),0 1px 0 var(--cs);}
    .chip .ki{width:17px;height:17px;color:var(--cg,#666);}
    .chip.sel{outline:3px solid var(--accent);outline-offset:1.5px;}
    .chip.new{animation:born .5s cubic-bezier(.3,1.5,.5,1);}
    @keyframes born{0%{transform:scale(.3);}70%{transform:scale(1.15);}100%{transform:scale(1);}}

    /* 도감 */
    #dex{
      flex:1 1 auto;width:min(92vw,420px);min-height:0;overflow-y:auto;
      border-radius:20px;padding:12px;
      background:rgba(255,255,255,.5);
      border:1px solid rgba(100,80,130,.12);
      box-shadow:inset 0 2px 6px rgba(100,80,130,.08);
      -webkit-overflow-scrolling:touch;
    }
    .tier-label{
      width:100%;font-size:11px;font-weight:900;color:var(--ink-soft);letter-spacing:.06em;
      margin:10px 2px 6px;display:flex;align-items:center;gap:8px;
    }
    .tier-label:first-child{margin-top:0;}
    .tier-label::after{content:"";flex:1;height:1px;background:rgba(100,80,130,.14);}
    .chips{display:flex;flex-wrap:wrap;gap:7px;}

    .confetti{
      position:fixed;width:9px;height:13px;z-index:90;border-radius:2px;pointer-events:none;
      animation:fall 1.5s ease-in forwards;
    }
    @keyframes fall{0%{transform:translateY(0) rotate(0);opacity:1;}100%{transform:translateY(60vh) rotate(540deg);opacity:0;}}

    #note{min-height:19px;color:var(--ink-soft);font-size:var(--fs-3);font-weight:700;text-align:center;padding:0 12px;flex:0 0 auto;}

    #over{
      position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:24px;
      background:rgba(42,32,55,.5);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
      opacity:0;pointer-events:none;transition:opacity .25s ease;
    }
    #over.show{opacity:1;pointer-events:auto;}
    .card{
      width:min(330px,88vw);border-radius:24px;background:#fff;color:var(--ink);padding:26px 22px 20px;text-align:center;
      box-shadow:0 24px 60px rgba(30,20,45,.35);transform:translateY(12px);transition:transform .25s ease;
    }
    #over.show .card{transform:none;}
    .card .badge2{
      width:64px;height:64px;border-radius:50%;margin:0 auto 12px;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(180deg,#a47fd0,#8a63b8);color:#fff;
      box-shadow:0 4px 0 rgba(80,55,120,.4);
    }
    .card .badge2 .ki{width:34px;height:34px;}
    .card h2{font-size:24px;font-weight:900;}
    .card .sub{margin-top:6px;color:var(--ink-soft);font-size:14px;line-height:1.45;}
    .result{font-size:14px;color:var(--ink-soft);margin:14px 0 16px;}
    .result b{color:var(--ink);}
    .card .primary{
      width:100%;height:50px;border:none;border-radius:16px;background:var(--accent);color:#fff;font-weight:900;font-size:var(--fs-2);
      box-shadow:0 4px 0 var(--accent-deep),0 10px 20px rgba(138,99,184,.24);cursor:pointer;
      transition:transform .1s ease,box-shadow .1s ease;
    }
    .card .primary:active{transform:translateY(3px);box-shadow:0 1px 0 var(--accent-deep);}
    .mini{display:flex;justify-content:center;gap:16px;margin-top:15px;}
    .mini a,.mini button{border:none;background:none;color:var(--ink-soft);font-size:13px;font-weight:800;text-decoration:none;cursor:pointer;}
    .credit{flex:0 0 auto;font-size:10px;color:var(--ink-soft);opacity:.55;padding-top:2px;}
  </style>
</head>

i":"tree","n":"나무","c":"plant","r":["plant","plant"],"t":2},{"i":"forest","n":"숲","c":"plant","r":["tree","tree"],"t":2},{"i":"flower","n":"꽃","c":"plant","r":["plant","sun"],"t":2},{"i":"garden","n":"정원","c":"plant","r":["flower","flower"],"t":2},{"i":"swamp","n":"늪","c":"plant","r":["mud","grass"],"t":2},{"i":"cactus","n":"선인장","c":"plant","r":["plant","desert"],"t":2},{"i":"mushroom","n":"버섯","c":"plant","r":["swamp","plant"],"t":2},{"i":"fruit","n":"과일","c":"food","r":["tree","sun"],"t":2},{"i":"life","n":"생명","c":"magic","r":["swamp","lightning"],"t":3},{"i":"fish","n":"물고기","c":"sea","r":["life","sea"],"t":3},{"i":"bird","n":"새","c":"bird","r":["life","sky"],"t":3},{"i":"animal","n":"동물","c":"animal","r":["life","earth"],"t":3},{"i":"human","n":"사람","c":"human","r":["life","mud"],"t":3},{"i":"whale","n":"고래","c":"sea","r":["sea","animal"],"t":3},{"i":"snake","n":"뱀","c":"animal","r":["animal","desert"],"t":3},{"i":"wolf","n":"늑대","c":"animal","r":["animal","forest"],"t":3},{"i":"sheep","n":"양","c":"animal","r":["animal","grass"],"t":3},{"i":"horse","n":"말","c":"animal","r":["animal","wind"],"t":3},{"i":"dog","n":"개","c":"animal","r":["wolf","human"],"t":3},{"i":"cat","n":"고양이","c":"animal","r":["animal","house"],"t":3},{"i":"penguin","n":"펭귄","c":"bird","r":["bird","ice"],"t":3},{"i":"tool","n":"도구","c":"civ","r":["human","stone"],"t":4},{"i":"brick","n":"벽돌","c":"civ","r":["mud","fire"],"t":4},{"i":"house","n":"집","c":"place","r":["brick","brick"],"t":4},{"i":"village","n":"마을","c":"place","r":["house","house"],"t":4},{"i":"city","n":"도시","c":"place","r":["village","village"],"t":4},{"i":"field","n":"밭","c":"earth","r":["earth","tool"],"t":4},{"i":"wheat","n":"밀","c":"plant","r":["field","plant"],"t":4},{"i":"flour","n":"밀가루","c":"food","r":["wheat","stone"],"t":4},{"i":"bread","n":"빵","c":"food","r":["flour","fire"],"t":4},{"i":"ramen","n":"라면","c":"food","r":["flour","steam"],"t":4},{"i":"metal","n":"금속","c":"civ","r":["stone","fire"],"t":4},{"i":"knife","n":"칼","c":"civ","r":["metal","tool"],"t":4},{"i":"boat","n":"배","c":"civ","r":["tree","sea"],"t":4},{"i":"sailboat","n":"돛단배","c":"civ","r":["boat","wind"],"t":4},{"i":"sailor","n":"선원","c":"human","r":["human","boat"],"t":4},{"i":"lighthouse","n":"등대","c":"place","r":["house","sea"],"t":4},{"i":"paper","n":"종이","c":"civ","r":["tree","tool"],"t":4},{"i":"book","n":"책","c":"civ","r":["paper","human"],"t":4},{"i":"school","n":"학교","c":"place","r":["book","house"],"t":4},{"i":"library","n":"도서관","c":"place","r":["book","book"],"t":4},{"i":"glasses","n":"안경","c":"civ","r":["glass","human"],"t":4},{"i":"rocket","n":"로켓","c":"civ","r":["metal","energy"],"t":4},{"i":"astronaut","n":"우주인","c":"human","r":["human","rocket"],"t":4},{"i":"alien","n":"외계인","c":"myth","r":["astronaut","space"],"t":5},{"i":"robot","n":"로봇","c":"civ","r":["metal","life"],"t":4},{"i":"dragon","n":"용","c":"myth","r":["snake","fire"],"t":5},{"i":"phoenix","n":"불사조","c":"myth","r":["bird","fire"],"t":5},{"i":"mermaid","n":"인어","c":"myth","r":["human","fish"],"t":5},{"i":"ghost","n":"유령","c":"myth","r":["human","night"],"t":5},{"i":"unicorn","n":"유니콘","c":"myth","r":["horse","rainbow"],"t":5},{"i":"wizard","n":"마법사","c":"human","r":["human","energy"],"t":5},{"i":"magic","n":"마법","c":"magic","r":["wizard","star"],"t":5},{"i":"fairy","n":"요정","c":"myth","r":["flower","magic"],"t":5},{"i":"dokkaebi","n":"도깨비","c":"myth","r":["ghost","tool"],"t":5},{"i":"gold","n":"황금","c":"civ","r":["metal","sun"],"t":4},{"i":"philosopher","n":"현자의 돌","c":"magic","r":["gold","magic"],"t":5}]</script>
  <script>
  (function(){
    var KEY={found:'brewFound',own:'brewOwn',muted:'brewMuted',hintUsed:'brewHintUsed'};
    var ELEMENTS=JSON.parse(document.getElementById('data').textContent);
    var byId={}; ELEMENTS.forEach(function(e){byId[e.i]=e;});
    var RECIPES={}; // "a|b"(정렬) → id
    ELEMENTS.forEach(function(e){ if(e.r)RECIPES[e.r.slice().sort().join('|')]=e.i; });
    var TOTAL=ELEMENTS.length;

    // 카테고리 → 글리프/색
    var CATS={
      water:{g:'#g-drop',c:'#6db3d8'}, fire:{g:'#p-fire',c:'#e0705c'},
      earth:{g:'#g-mountains',c:'#b08a5e'}, wind:{g:'#g-tornado',c:'#92aec2'},
      sky:{g:'#p-sparkle',c:'#8fa0d8'}, plant:{g:'#g-three-leaves',c:'#6fae7d'},
      animal:{g:'#g-paw-print',c:'#c9925f'}, sea:{g:'#g-tropical-fish',c:'#5fa8c2'},
      bird:{g:'#g-bird',c:'#84aed4'}, human:{g:'#g-person',c:'#d8a06a'},
      civ:{g:'#p-wrench',c:'#9694a8'}, place:{g:'#g-house',c:'#b2917a'},
      food:{g:'#g-bread',c:'#d4b25e'}, myth:{g:'#g-dragon-head',c:'#b07ad0'},
      magic:{g:'#g-magic',c:'#7d64ae'}
    };
    var GLYPH_OVERRIDE={snake:'#g-snake',ramen:'#g-noodles',dragon:'#g-dragon-head'};
    function tierOf(e){ return e.t||0; }
    var TIER_LABELS=['태초의 원소','자연의 힘','대지와 숲','생명의 시대','문명의 시대','신화와 마법'];

    function gj(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch(e){return null;}}
    function gi(k){try{return parseInt(localStorage.getItem(k)||'0',10)||0;}catch(e){return 0;}}
    function set(k,v){try{localStorage.setItem(k,String(v));}catch(e){}}
    function setJson(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

    var own=gj(KEY.own)||{water:1,fire:1,earth:1,wind:1};
    ['water','fire','earth','wind'].forEach(function(b){own[b]=1;});
    Object.keys(own).forEach(function(k){if(!byId[k])delete own[k];});
    var muted=false; try{muted=localStorage.getItem(KEY.muted)==='1';}catch(e){}
    var hintUsed=gi(KEY.hintUsed);
    var selA=null,selB=null,busy=false;

    var dex=document.getElementById('dex'), note=document.getElementById('note');
    var slotA=document.getElementById('slot-a'), slotB=document.getElementById('slot-b');
    var bench=document.getElementById('bench'), reveal=document.getElementById('reveal');

    // ===== 사운드 =====
    var ac=null;
    function actx(){ if(!ac){ try{ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return ac; }
    function tone(f,t,d,type,vol){ if(muted)return; var c=actx(); if(!c)return; var o=c.createOscillator(),g=c.createGain(); o.type=type||'sine'; o.frequency.value=f; o.connect(g); g.connect(c.destination); var x=c.currentTime+(t||0); g.gain.setValueAtTime(.0001,x); g.gain.exponentialRampToValueAtTime(vol||.12,x+.01); g.gain.exponentialRampToValueAtTime(.0001,x+(d||.1)); o.start(x); o.stop(x+(d||.1)+.03); }
    function sPick(){ tone(360,0,.05,'triangle',.1); }
    function sPick2(){ tone(440,0,.05,'triangle',.1); }
    function sNew(t){ var base=[523,659,784]; base.forEach(function(f,i){tone(f*(1+t*0.04),i*.07,.13,'triangle',.13);}); }
    function sMyth(){ [523,659,784,1047,1319].forEach(function(f,i){tone(f,i*.08,.16,'triangle',.15);}); }
    function sKnown(){ tone(420,0,.07,'sine',.08); }
    function sFail(){ tone(220,0,.12,'sine',.09); tone(165,.09,.16,'sine',.08); }
    function sHint(){ tone(660,0,.08,'sine',.1); tone(880,.06,.1,'sine',.09); }
    function sDone(){ [523,659,784,1047,1319,1568].forEach(function(f,i){tone(f,i*.09,.18,'triangle',.15);}); }

    function foundCount(){ return Object.keys(own).length; }
    function hintBank(){ return Math.max(0,Math.floor((foundCount()-4)/5)-hintUsed); }

    function chipEl(e,btn){
      var el=document.createElement(btn?'button':'div');
      el.className='chip';
      var cat=CATS[e.c]||CATS.civ;
      el.style.setProperty('--cc',cat.c+'33');
      el.style.setProperty('--cb',cat.c+'55');
      el.style.setProperty('--cs',cat.c+'44');
      el.style.setProperty('--cg',cat.c);
      var g=GLYPH_OVERRIDE[e.i]||cat.g;
      el.innerHTML='<svg class="ki"><use href="'+g+'"/></svg>'+e.n;
      return el;
    }

    // ===== 도감 렌더 =====
    function renderDex(){
      dex.innerHTML='';
      var groups={};
      ELEMENTS.forEach(function(e){
        if(!own[e.i])return;
        var t=tierOf(e);
        (groups[t]=groups[t]||[]).push(e);
      });
      Object.keys(groups).map(Number).sort(function(a,b){return a-b;}).forEach(function(t){
        var lab=document.createElement('div'); lab.className='tier-label'; lab.textContent=TIER_LABELS[t];
        dex.appendChild(lab);
        var box=document.createElement('div'); box.className='chips';
        groups[t].forEach(function(e){
          var ch=chipEl(e,true);
          ch.id='chip-'+e.i;
          ch.addEventListener('click',function(){pick(e);});
          if(selA===e.i||selB===e.i)ch.classList.add('sel');
          box.appendChild(ch);
        });
        dex.appendChild(box);
      });
      document.getElementById('found').textContent=String(foundCount());
      document.getElementById('total').textContent='/'+TOTAL;
      document.getElementById('hint-n').textContent=String(hintBank());
      document.getElementById('mute-ic').innerHTML='<use href="'+(muted?'#p-speaker-slash':'#p-speaker-high')+'"/>';
    }

    function renderSlots(){
      [[slotA,selA,'재료 1'],[slotB,selB,'재료 2']].forEach(function(t){
        var el=t[0],id=t[1];
        if(id){ el.classList.add('filled'); el.innerHTML=''; el.appendChild(chipEl(byId[id],false)); }
        else{ el.classList.remove('filled'); el.textContent=t[2]; }
      });
    }

    // ===== 조합 =====
    function pick(e){
      if(busy)return;
      if(!selA){ selA=e.i; sPick(); }
      else if(!selB){ selB=e.i; sPick2(); }
      else { selA=e.i; selB=null; sPick(); }
      renderSlots(); renderDex();
      if(selA&&selB)setTimeout(combine,260);
    }
    function combine(){
      if(!selA||!selB)return;
      busy=true;
      var key=[selA,selB].slice().sort().join('|');
      var rid=RECIPES[key];
      var a=selA,b=selB;
      setTimeout(function(){
        if(rid&&!own[rid]){ discover(rid); }
        else if(rid){
          sKnown();
          note.textContent='이미 발견했어요: '+byId[rid].n;
          flashReveal(byId[rid],false);
        }else{
          sFail();
          bench.classList.remove('poof'); void bench.offsetWidth; bench.classList.add('poof');
          note.textContent='퐁… 아무 일도 일어나지 않았어요. 다른 조합을!';
        }
        selA=null; selB=null; busy=false;
        renderSlots(); renderDex();
      },120);
    }
    function discover(rid){
      var e=byId[rid];
      own[rid]=1;
      setJson(KEY.own,own);
      set(KEY.found,foundCount());
      var t=tierOf(e);
      if(t>=5){ sMyth(); confetti(26); }
      else { sNew(t); if(foundCount()%10===0)confetti(14); }
      bench.classList.remove('bubble'); void bench.offsetWidth; bench.classList.add('bubble');
      flashReveal(e,true);
      note.textContent='새로운 발견! ['+e.n+'] '+(t>=5?'— 신화의 영역이에요!':'');
      if(navigator.vibrate)navigator.vibrate(t>=5?[30,40,60]:20);
      renderDex();
      var ch=document.getElementById('chip-'+rid);
      if(ch){ ch.classList.add('new'); ch.scrollIntoView({block:'nearest',behavior:'smooth'}); }
      if(foundCount()>=TOTAL)setTimeout(showDone,900);
    }
    function flashReveal(e,isNew){
      reveal.innerHTML=''; reveal.appendChild(chipEl(e,false));
      reveal.classList.remove('show'); void reveal.offsetWidth; reveal.classList.add('show');
      setTimeout(function(){reveal.classList.remove('show');},isNew?1500:900);
    }
    function confetti(n){
      var colors=['#8a63b8','#e0705c','#6db3d8','#6fae7d','#d4b25e'];
      for(var i=0;i<n;i++){
        var el=document.createElement('div');
        el.className='confetti';
        el.style.left=(8+Math.random()*84)+'vw';
        el.style.top=(8+Math.random()*15)+'vh';
        el.style.background=colors[i%colors.length];
        el.style.animationDelay=(Math.random()*0.4)+'s';
        document.body.appendChild(el);
        (function(x){setTimeout(function(){x.remove();},2200);})(el);
      }
    }

    // ===== 힌트 =====
    document.getElementById('hint').addEventListener('click',function(){
      if(hintBank()<1){
        note.textContent='힌트는 5개 발견마다 1개! (다음 힌트까지 '+(5-((foundCount()-4)%5))+'개)';
        return;
      }
      // 만들 수 있는 미발견 조합 찾기
      var cands=[];
      ELEMENTS.forEach(function(e){
        if(!e.r||own[e.i])return;
        if(own[e.r[0]]&&own[e.r[1]])cands.push(e);
      });
      if(!cands.length){ note.textContent='지금 재료로 만들 수 있는 건 다 찾았어요!'; return; }
      var e=cands[Math.floor(Math.random()*cands.length)];
      hintUsed++; set(KEY.hintUsed,hintUsed);
      selA=e.r[0]; selB=null;
      sHint();
      note.textContent='힌트: ['+byId[e.r[0]].n+'] + ??? = 새로운 무언가!';
      renderSlots(); renderDex();
    });

    // ===== 전체 초기화 (2번 탭) =====
    var resetArm=0;
    document.getElementById('reset').addEventListener('click',function(){
      var now=Date.now();
      if(now-resetArm>3000){
        resetArm=now;
        note.textContent='정말 도감을 비울까요? 3초 안에 한 번 더 누르면 초기화!';
        return;
      }
      own={water:1,fire:1,earth:1,wind:1};
      hintUsed=0; selA=null; selB=null;
      setJson(KEY.own,own); set(KEY.found,4); set(KEY.hintUsed,0);
      note.textContent='새 가마솥! 물·불·흙·바람부터 다시.';
      renderSlots(); renderDex();
    });

    function showDone(){
      sDone(); confetti(40);
      document.getElementById('over-sub').textContent='세상 만물 '+TOTAL+'가지를 모두 만들어냈어요. 현자의 돌이 당신 것입니다.';
      document.getElementById('over-result').innerHTML='발견 <b>'+foundCount()+'</b> / '+TOTAL;
      document.getElementById('over').classList.add('show');
    }
    document.getElementById('over-btn').addEventListener('click',function(){ document.getElementById('over').classList.remove('show'); });
    document.getElementById('mute').addEventListener('click',function(){ muted=!muted; set(KEY.muted,muted?'1':'0'); renderDex(); if(!muted)sPick(); });
    document.getElementById('support').addEventListener('click',function(){ if(window.GamePortal&&GamePortal.openSupport)GamePortal.openSupport(); });

    set(KEY.found,foundCount());
    renderSlots(); renderDex();
  })();
  </script>
  <script>
    if('serviceWorker' in navigator && location.protocol === 'https:') navigator.serviceWorker.register('./sw.js');
  </script>
