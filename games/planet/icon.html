<!DOCTYPE html><html><head><meta charset="utf-8"><style>html,body{margin:0;background:#fff;}</style></head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
const cv=document.getElementById('c'), x=cv.getContext('2d');
function rr(ctx,X,Y,W,H,R){R=Math.min(R,W/2,H/2);ctx.beginPath();ctx.moveTo(X+R,Y);ctx.arcTo(X+W,Y,X+W,Y+H,R);ctx.arcTo(X+W,Y+H,X,Y+H,R);ctx.arcTo(X,Y+H,X,Y,R);ctx.arcTo(X,Y,X+W,Y,R);ctx.closePath();}
// 배경: 차분한 단일 색조 우주 (검보라·네온 금지)
const bg=x.createLinearGradient(0,0,0,512); bg.addColorStop(0,'#222b45'); bg.addColorStop(1,'#141a2b');
rr(x,0,0,512,512,112); x.fillStyle=bg; x.fill();
x.save(); rr(x,0,0,512,512,112); x.clip();
// 별 몇 점
x.fillStyle='rgba(205,216,242,.7)';
[[90,110,2.4],[150,360,1.8],[410,140,2.2],[440,380,1.6],[360,90,1.4],[110,420,1.8]].forEach(s=>{x.beginPath();x.arc(s[0],s[1],s[2],0,6.28);x.fill();});
// 위성(달)
const mx=372,my=150,mr=34;
let mg=x.createRadialGradient(mx-10,my-10,8,mx,my,mr); mg.addColorStop(0,'#dfe4ee'); mg.addColorStop(1,'#9098a8');
x.fillStyle=mg; x.beginPath(); x.arc(mx,my,mr,0,6.28); x.fill();
// 고리(뒤)
x.save(); x.translate(256,272); x.rotate(-0.5); x.scale(1,0.34);
x.lineWidth=34; x.strokeStyle='rgba(180,170,210,.4)'; x.beginPath(); x.arc(0,0,260,Math.PI,Math.PI*2); x.stroke(); x.restore();
// 행성 본체 — 빛나는 단계 톤(골드+초록 바다)
const cx=256,cy=272,R=150, col='#5fa06a';
function shade(c,f){c=c.replace('#','');let r=[parseInt(c.substr(0,2),16),parseInt(c.substr(2,2),16),parseInt(c.substr(4,2),16)];function k(v){return Math.max(0,Math.min(255,Math.round(v)));}return 'rgb('+k(r[0]+f)+','+k(r[1]+f)+','+k(r[2]+f)+')';}
// 대기 림
x.strokeStyle='rgba(150,200,255,.45)'; x.lineWidth=12; x.beginPath(); x.arc(cx,cy,R*1.05,0,6.28); x.stroke();
let g=x.createRadialGradient(cx-55,cy-64,18,cx,cy,R); g.addColorStop(0,shade(col,52)); g.addColorStop(.55,col); g.addColorStop(1,shade(col,-46));
x.fillStyle=g; x.beginPath(); x.arc(cx,cy,R,0,6.28); x.fill();
x.save(); x.beginPath(); x.arc(cx,cy,R,0,6.28); x.clip();
// 바다 패치
x.fillStyle='rgba(63,115,176,.85)';
[[210,250,40],[300,310,32],[250,200,22],[320,235,18]].forEach(o=>{x.beginPath();x.arc(o[0],o[1],o[2],0,6.28);x.fill();});
// 숲
x.fillStyle='rgba(47,107,62,.8)';
[[230,300,16],[290,260,14],[200,230,12]].forEach(o=>{x.beginPath();x.arc(o[0],o[1],o[2],0,6.28);x.fill();});
// 도시 불빛
x.fillStyle='#ffe9a8';
[[270,300],[285,295],[300,305],[262,288]].forEach(o=>{x.beginPath();x.arc(o[0],o[1],3.4,0,6.28);x.fill();});
// 명암
let term=x.createRadialGradient(cx-60,cy-66,30,cx+40,cy+50,R*1.25); term.addColorStop(0,'rgba(0,0,0,0)'); term.addColorStop(.62,'rgba(0,0,0,0)'); term.addColorStop(1,'rgba(8,10,20,.55)');
x.fillStyle=term; x.fillRect(cx-R,cy-R,R*2,R*2);
// 윗 림 하이라이트
let rim=x.createRadialGradient(cx-58,cy-72,8,cx-58,cy-72,R*0.9); rim.addColorStop(0,'rgba(255,255,255,.3)'); rim.addColorStop(1,'rgba(255,255,255,0)');
x.fillStyle=rim; x.fillRect(cx-R,cy-R,R*2,R*2);
x.restore();
// 고리(앞)
x.save(); x.translate(256,272); x.rotate(-0.5); x.scale(1,0.34);
x.lineWidth=34; x.strokeStyle='rgba(210,200,235,.7)'; x.beginPath(); x.arc(0,0,260,0,Math.PI); x.stroke(); x.restore();
x.restore();
window.__png=()=>cv.toDataURL('image/png');
</script>
</body></html>
