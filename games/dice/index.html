<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#efe6d3">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="원석 세공">
  <meta property="og:type" content="website">
  <meta property="og:title" content="원석 세공 — 원석을 굴려 여섯 광물을 세공하는 야추 주사위">
  <meta property="og:description" content="주사위 다섯 알을 굴려 원하는 원석을 고정하고, 열두 칸에 세공해 넣어 총점을 겨루세요. 시간제한 없음.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>원석 세공</title>
  <style>
    @font-face{font-family:"Pretendard Variable";font-weight:45 920;font-style:normal;font-display:swap;src:url("/fonts/PretendardVariable.woff2") format("woff2-variations");}
    :root{
      --bg-a:#f9f3e6;
      --bg-b:#efe6d3;
      --bg-c:#e4d6bb;
      --ink:#38302a;
      --ink-soft:#8b7d67;
      --line:#d8c8a6;
      --card:#fffdf7;
      --accent:#c99a3a;
      --accent-deep:#9c7418;
      --good:#3f9b6e;
      --tray:#2d2721;
      --tray-2:#241f1a;
      --slot:#f3ebd8;
      --slot-line:#dfceaa;
      --fs-1:clamp(28px,8.5vw,40px);
      --fs-2:16px;
      --fs-3:13px;
      /* 광물 티어 색 (1돌 → 6다이아, 서열이 색으로도 보이게) */
      --t1:#a49a8d; --t2:#c2803f; --t3:#b9c4d0; --t4:#e0b23c; --t5:#37ac79; --t6:#6fcfe4;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--bg-b);}
    body{
      font-family:"Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
      background-color:var(--bg-b);
      background-image:radial-gradient(135% 100% at 50% 0%,var(--bg-a) 0%,var(--bg-b) 55%,var(--bg-c) 100%);
      color:var(--ink);
      user-select:none;-webkit-user-select:none;touch-action:manipulation;
      overflow:hidden;
    }
    button{font:inherit;}
    #wrap{
      position:relative;height:100%;width:100%;max-width:500px;margin:0 auto;
      display:flex;flex-direction:column;align-items:center;
      padding:8px 12px calc(10px + env(safe-area-inset-bottom));gap:8px;
    }

    /* ===== 상단 바 ===== */
    .topbar{display:flex;align-items:center;gap:7px;width:100%;flex:0 0 auto;z-index:2;}
    .pill{
      display:flex;align-items:center;gap:6px;white-space:nowrap;
      border:1px solid rgba(122,96,38,.18);background:rgba(255,255,255,.7);
      border-radius:999px;padding:7px 13px;box-shadow:0 2px 0 rgba(122,96,38,.10);
      color:var(--ink-soft);font-size:var(--fs-3);font-weight:700;
    }
    .pill b{color:var(--ink);font-size:var(--fs-2);font-variant-numeric:tabular-nums;}
    .pill.total b{color:var(--accent-deep);}
    .sp{margin-left:auto;}
    .icon-btn{
      width:40px;height:40px;border:1px solid rgba(122,96,38,.18);border-radius:12px;
      background:linear-gradient(180deg,#fff,#f4edda);color:#74633f;
      display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 rgba(122,96,38,.16);
      cursor:pointer;transition:transform .1s ease,box-shadow .1s ease;flex:0 0 auto;
    }
    .icon-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(122,96,38,.16);}
    .ki{width:22px;height:22px;fill:currentColor;display:block;}

    /* ===== 점수판 ===== */
    #card{width:100%;flex:0 0 auto;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .slot{
      position:relative;display:flex;align-items:center;gap:8px;
      border:1px solid var(--slot-line);border-radius:13px;background:var(--slot);
      padding:8px 11px;min-height:44px;cursor:default;overflow:hidden;
      transition:transform .12s ease,box-shadow .12s ease,background .15s ease;
    }
    .slot .gem{width:22px;height:22px;flex:0 0 auto;border-radius:6px;position:relative;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.5),inset 0 -2px 3px rgba(0,0,0,.12);}
    .slot .lbl{font-size:var(--fs-3);font-weight:800;color:var(--ink);line-height:1.15;flex:1 1 auto;}
    .slot .lbl small{display:block;font-size:10px;font-weight:700;color:var(--ink-soft);}
    .slot .val{font-size:15px;font-weight:900;color:var(--ink-soft);font-variant-numeric:tabular-nums;min-width:22px;text-align:right;}
    /* 열려있고 이번 굴림으로 얻을 점수 프리뷰 */
    .slot.open{cursor:pointer;}
    .slot.open .val{color:var(--accent-deep);}
    .slot.open:active{transform:scale(.97);}
    .slot.open.zero .val{color:#c2b7a0;}
    /* 추천(최고 득점 열린 칸) 살짝 강조 */
    .slot.best{background:#fff6e0;border-color:var(--accent);box-shadow:0 0 0 2px rgba(201,154,58,.22);}
    /* 확정 기입됨 */
    .slot.done{background:#ece3cf;border-color:#d8c8a6;}
    .slot.done .lbl{color:var(--ink-soft);}
    .slot.done .val{color:var(--ink);}
    .slot.just{animation:slotPop .5s ease;}
    @keyframes slotPop{0%{transform:scale(1);}30%{transform:scale(1.08);box-shadow:0 0 0 3px rgba(63,155,110,.4);}100%{transform:scale(1);}}
    /* 지금 이 굴림이 특별 족보를 성립시키면 해당 칸 반짝 */
    .slot.hot{background:#fff2d4;border-color:var(--accent);}
    .slot.hot .val{color:var(--accent-deep);}

    /* 상단 보너스 진행 바 */
    #bonus{width:100%;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;color:var(--ink-soft);
      padding:0 3px;flex:0 0 auto;}
    #bonus .bar{flex:1 1 auto;height:7px;border-radius:999px;background:#e3d6b8;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.08);}
    #bonus .bar i{display:block;height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--t4),var(--accent));transition:width .35s ease;}
    #bonus.reached{color:var(--good);}
    #bonus.reached .bar i{background:linear-gradient(90deg,var(--good),#57c08c);}

    /* ===== 세공대 (주사위 트레이) ===== */
    #stage{flex:1 1 auto;width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:10px;min-height:0;}
    #tray{
      width:100%;border-radius:20px;padding:16px 10px 14px;
      background:linear-gradient(180deg,var(--tray),var(--tray-2));
      box-shadow:inset 0 2px 6px rgba(0,0,0,.5),inset 0 -1px 0 rgba(255,255,255,.05),0 6px 18px rgba(40,30,10,.2);
      display:flex;flex-direction:column;gap:10px;position:relative;
    }
    #dice{display:flex;justify-content:center;gap:calc(2.2vw + 2px);}
    .die{
      position:relative;width:56px;height:56px;border:none;padding:0;cursor:pointer;flex:0 0 auto;
      border-radius:14px;background:
        linear-gradient(180deg,#fffdf7,#efe6d2);
      box-shadow:0 3px 0 rgba(0,0,0,.35),0 6px 10px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.9);
      display:flex;align-items:center;justify-content:center;
      transition:transform .12s ease,box-shadow .12s ease,filter .12s ease;
    }
    .die.empty{background:linear-gradient(180deg,#4a423a,#3b342d);box-shadow:inset 0 2px 5px rgba(0,0,0,.5);}
    .die.empty .gemwrap{opacity:.18;}
    .die .gemwrap{width:74%;height:74%;position:relative;display:flex;align-items:center;justify-content:center;}
    .die .gembg{position:absolute;inset:0;border-radius:50% 50% 48% 48%/55% 55% 45% 45%;
      box-shadow:inset 0 2px 2px rgba(255,255,255,.55),inset 0 -3px 5px rgba(0,0,0,.22);}
    .die img{width:100%;height:100%;object-fit:contain;position:relative;z-index:1;pointer-events:none;
      filter:drop-shadow(0 1px 1px rgba(0,0,0,.2));}
    .die .num{
      position:absolute;right:-3px;bottom:-3px;z-index:2;min-width:19px;height:19px;padding:0 4px;
      border-radius:7px;background:var(--tray-2);color:#fff;font-size:12px;font-weight:900;
      display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;
      box-shadow:0 1px 2px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.12);
    }
    .die.kept{
      background:linear-gradient(180deg,#ffe9b0,#f3cf78);
      box-shadow:0 0 0 2px var(--accent),0 4px 0 var(--accent-deep),0 8px 12px rgba(150,110,20,.35);
      transform:translateY(-6px);
    }
    .die.kept::after{
      content:"";position:absolute;top:-6px;left:50%;transform:translateX(-50%);
      width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 1px 2px rgba(0,0,0,.3);
    }
    .die.tumble{animation:tumble .12s linear infinite;}
    @keyframes tumble{0%{transform:translateY(0) rotate(-7deg) scale(.96);}50%{transform:translateY(-4px) rotate(6deg) scale(1.02);}100%{transform:translateY(0) rotate(-4deg) scale(.98);}}
    .die.settle{animation:settle .42s cubic-bezier(.34,1.56,.64,1);}
    @keyframes settle{0%{transform:scale(.6) rotate(-12deg);}60%{transform:scale(1.14) rotate(3deg);}100%{transform:scale(1) rotate(0);}}
    .die.breathe{animation:breathe 3.4s ease-in-out infinite;}
    @keyframes breathe{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-1.5px) scale(1.02);}}
    .die.hotdie{box-shadow:0 0 0 2px var(--accent),0 3px 0 rgba(0,0,0,.35),0 0 14px rgba(224,178,60,.7);}
    .die.hotdie.kept{box-shadow:0 0 0 2px var(--accent),0 4px 0 var(--accent-deep),0 0 16px rgba(224,178,60,.8);}
    .spark{position:absolute;inset:0;border-radius:14px;pointer-events:none;overflow:hidden;z-index:3;}

    #note{min-height:18px;color:#e9dcc0;font-size:var(--fs-3);font-weight:700;text-align:center;padding:0 6px;line-height:1.3;}
    #note b{color:#ffdd88;}

    /* ===== 굴리기 버튼 (엄지 존) ===== */
    #dock{width:100%;flex:0 0 auto;padding-top:2px;}
    #roll{
      width:100%;height:60px;border:none;border-radius:18px;cursor:pointer;
      background:linear-gradient(180deg,#e0b653,var(--accent));color:#3a2a06;
      font-size:19px;font-weight:900;letter-spacing:-.2px;
      box-shadow:0 5px 0 var(--accent-deep),0 12px 22px rgba(201,138,24,.28);
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:transform .1s ease,box-shadow .1s ease,opacity .15s ease,background .15s ease;
    }
    #roll:active{transform:translateY(4px);box-shadow:0 1px 0 var(--accent-deep);}
    #roll .rl{display:flex;gap:4px;}
    #roll .rl i{width:9px;height:9px;border-radius:50%;background:rgba(58,42,6,.28);transition:background .2s ease;}
    #roll .rl i.on{background:#3a2a06;}
    #roll.score{background:linear-gradient(180deg,#57c08c,var(--good));color:#08361f;box-shadow:0 5px 0 #2d7a53,0 12px 22px rgba(63,155,110,.28);}
    #roll.score:active{box-shadow:0 1px 0 #2d7a53;}
    #roll[disabled]{opacity:.5;pointer-events:none;}

    .credit{flex:0 0 auto;font-size:10px;color:var(--ink-soft);opacity:.5;padding-top:1px;}

    /* ===== 결과 화면 ===== */
    #over{
      position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:24px;
      background:rgba(48,38,20,.5);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
      opacity:0;pointer-events:none;transition:opacity .25s ease;
    }
    #over.show{opacity:1;pointer-events:auto;}
    .rcard{
      width:min(340px,90vw);border-radius:24px;background:var(--card);color:var(--ink);
      padding:26px 22px 20px;text-align:center;box-shadow:0 24px 60px rgba(40,30,10,.34);
      transform:translateY(14px);transition:transform .3s cubic-bezier(.34,1.4,.6,1);
    }
    #over.show .rcard{transform:none;}
    .rcard .badge{
      width:72px;height:72px;border-radius:22px;margin:0 auto 12px;padding:12px;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(180deg,#fbe6bf,#f0cf7f);box-shadow:0 4px 0 rgba(122,96,38,.25);
    }
    .rcard .badge img{width:100%;height:100%;object-fit:contain;}
    .rcard .badge.rec{background:linear-gradient(180deg,#ffe08a,#f5c23c);box-shadow:0 0 0 3px rgba(201,154,58,.4),0 4px 0 rgba(122,96,38,.3);}
    .rcard h2{font-size:24px;font-weight:900;}
    .rcard .sub{margin-top:6px;color:var(--ink-soft);font-size:14px;line-height:1.45;}
    .bigscore{font-size:48px;font-weight:900;color:var(--accent-deep);margin:12px 0 2px;font-variant-numeric:tabular-nums;line-height:1;}
    .bigscore small{font-size:16px;color:var(--ink-soft);font-weight:800;margin-left:3px;}
    .rrow{display:flex;justify-content:center;gap:8px;margin:10px 0 16px;flex-wrap:wrap;}
    .rchip{font-size:12px;font-weight:800;color:var(--ink-soft);background:#f0e7d3;border-radius:999px;padding:5px 11px;}
    .rchip b{color:var(--ink);}
    .rchip.gold{color:var(--accent-deep);background:#fbefcf;}
    .rcard .primary{
      width:100%;height:52px;border:none;border-radius:16px;background:var(--accent);color:#fff;font-weight:900;font-size:var(--fs-2);
      box-shadow:0 4px 0 var(--accent-deep),0 10px 20px rgba(201,138,24,.22);cursor:pointer;
      transition:transform .1s ease,box-shadow .1s ease;
    }
    .rcard .primary:active{transform:translateY(3px);box-shadow:0 1px 0 var(--accent-deep);}
    .mini{display:flex;justify-content:center;gap:16px;margin-top:15px;}
    .mini a,.mini button{border:none;background:none;color:var(--ink-soft);font-size:13px;font-weight:800;text-decoration:none;cursor:pointer;}

    #fx{position:fixed;inset:0;z-index:70;pointer-events:none;}
    .shake{animation:shake .4s ease;}
    @keyframes shake{0%,100%{transform:translate(0,0);}20%{transform:translate(-6px,2px);}40%{transform:translate(5px,-3px);}60%{transform:translate(-4px,3px);}80%{transform:translate(3px,-2px);}}

    @media (max-height:720px){
      .die{width:50px;height:50px;}
      #roll{height:54px;}
      .slot{min-height:40px;padding:6px 9px;}
    }
  </style>
</head>
<body>
  <svg style="display:none" aria-hidden="true">
    <symbol id="p-speaker-high" viewBox="0 0 256 256"><path d="M160,32.25V223.69a8.29,8.29,0,0,1-3.91,7.18,8,8,0,0,1-9-.56l-65.57-51A4,4,0,0,1,80,176.16V79.84a4,4,0,0,1,1.55-3.15l65.57-51a8,8,0,0,1,10,.16A8.27,8.27,0,0,1,160,32.25ZM60,80H32A16,16,0,0,0,16,96v64a16,16,0,0,0,16,16H60a4,4,0,0,0,4-4V84A4,4,0,0,0,60,80Zm126.77,20.84a8,8,0,0,0-.72,11.3,24,24,0,0,1,0,31.72,8,8,0,1,0,12,10.58,40,40,0,0,0,0-52.88A8,8,0,0,0,186.74,100.84Zm40.89-26.17a8,8,0,1,0-11.92,10.66,64,64,0,0,1,0,85.34,8,8,0,1,0,11.92,10.66,80,80,0,0,0,0-106.66Z"/></symbol>

    <symbol id="p-arrow-clockwise" viewBox="0 0 256 256"><path d="M240,56v48a8,8,0,0,1-8,8H184a8,8,0,0,1-5.66-13.66L197.77,78.9A88,88,0,1,0,216,128a8,8,0,0,1,16,0A104,104,0,1,1,186.9,42.23L226.34,2.34A8,8,0,0,1,240,8Z"/></symbol>
  </svg>

  <div id="wrap">
    <div class="topbar">
      <div class="pill total">총점 <b id="total">0</b></div>
      <div class="pill">최고 <b id="best">0</b></div>
      <div class="sp"></div>
      <button class="icon-btn" id="reset" aria-label="새 게임"><svg class="ki"><use href="#p-arrow-clockwise"/></svg></button>
      <button class="icon-btn" id="mute" aria-label="소리 켜기/끄기"><svg class="ki" id="mute-ic"><use href="#p-speaker-high"/></svg></button>
    </div>

    <div id="card">
      <div class="grid" id="grid"></div>
    </div>
    <div id="bonus">
      <span id="bonus-label">상단 보너스</span>
      <div class="bar"><i id="bonus-fill"></i></div>
      <span id="bonus-num">0/63</span>
    </div>

    <div id="stage">
      <div id="tray">
        <div id="dice"></div>
      </div>
      <div id="note">원석 다섯 알을 굴려 세공을 시작하세요</div>
    </div>

    <div id="dock">
      <button id="roll"><span id="roll-t">굴리기</span> <span class="rl" id="rl"><i class="on"></i><i class="on"></i><i class="on"></i></span></button>
    </div>

    <div class="credit">Icons: Phosphor</div>
  </div>

  <canvas id="fx"></canvas>

  <div id="over">
    <div class="rcard">
      <div class="badge" id="badge"><img id="badge-img" alt=""></div>
      <h2 id="over-title">세공 완료!</h2>
      <p class="sub" id="over-sub"></p>
      <div class="bigscore"><span id="over-score">0</span><small>점</small></div>
      <div class="rrow" id="over-row"></div>
      <button class="primary" id="over-btn">새 원석으로 다시</button>
      <div class="mini">
        <a href="/rank">기록실</a>
        <button id="support">후원 · 의견</button>
      </div>
    </div>
  </div>

  <script>
  (function(){
    // ===== 저장 키 (전부 dice 접두사) =====
    var KEY={best:'diceBest',save:'diceSave',muted:'diceMuted'};
    function gi(k){try{return parseInt(localStorage.getItem(k)||'0',10)||0;}catch(e){return 0;}}
    function set(k,v){try{localStorage.setItem(k,String(v));}catch(e){}}
    function del(k){try{localStorage.removeItem(k);}catch(e){}}

    // ===== 순수 점수 로직 (scratch에서 유닛테스트로 검증한 코어) =====
    var CATS=[
      {id:'ones',up:true,n:1},{id:'twos',up:true,n:2},{id:'threes',up:true,n:3},
      {id:'fours',up:true,n:4},{id:'fives',up:true,n:5},{id:'sixes',up:true,n:6},
      {id:'choice'},{id:'fourKind'},{id:'fullHouse'},{id:'sStraight'},{id:'lStraight'},{id:'yacht'}
    ];
    var UPPER=['ones','twos','threes','fours','fives','sixes'];
    var LOWER=['choice','fourKind','fullHouse','sStraight','lStraight','yacht'];
    var GEM_NAME=['','돌','구리','은','금','에메랄드','다이아'];
    var META={
      ones:{lbl:'돌',sub:'①만 합산'},twos:{lbl:'구리',sub:'②만 합산'},threes:{lbl:'은',sub:'③만 합산'},
      fours:{lbl:'금',sub:'④만 합산'},fives:{lbl:'에메랄드',sub:'⑤만 합산'},sixes:{lbl:'다이아',sub:'⑥만 합산'},
      choice:{lbl:'초이스',sub:'다섯 알 합'},fourKind:{lbl:'포카드',sub:'같은 4알 · 합'},
      fullHouse:{lbl:'풀하우스',sub:'3+2 · 25'},sStraight:{lbl:'스트레이트4',sub:'4연속 · 30'},
      lStraight:{lbl:'스트레이트5',sub:'5연속 · 40'},yacht:{lbl:'야추',sub:'5알 일치 · 50'}
    };
    function counts(d){var c=[0,0,0,0,0,0,0];for(var i=0;i<d.length;i++)c[d[i]]++;return c;}
    function sumOf(d){var s=0;for(var i=0;i<d.length;i++)s+=d[i];return s;}
    function hasRun(c,len){var run=0;for(var v=1;v<=6;v++){if(c[v]>0){run++;if(run>=len)return true;}else run=0;}return false;}
    function scoreFor(id,d){
      var c=counts(d),s=sumOf(d);
      switch(id){
        case 'ones':return c[1];case 'twos':return c[2]*2;case 'threes':return c[3]*3;
        case 'fours':return c[4]*4;case 'fives':return c[5]*5;case 'sixes':return c[6]*6;
        case 'choice':return s;
        case 'fourKind':for(var i=1;i<=6;i++)if(c[i]>=4)return s;return 0;
        case 'fullHouse':{var h3=false,h2=false,h5=false;for(var j=1;j<=6;j++){if(c[j]===5)h5=true;if(c[j]===3)h3=true;if(c[j]===2)h2=true;}return((h3&&h2)||h5)?25:0;}
        case 'sStraight':return hasRun(c,4)?30:0;
        case 'lStraight':return hasRun(c,5)?40:0;
        case 'yacht':for(var k=1;k<=6;k++)if(c[k]===5)return 50;return 0;
      }
      return 0;
    }
    function upperSubtotal(sc){var t=0;UPPER.forEach(function(id){if(sc[id]!=null)t+=sc[id];});return t;}
    function upperBonus(sc){return upperSubtotal(sc)>=63?35:0;}
    function grandTotal(sc){var t=0;for(var k in sc)if(sc.hasOwnProperty(k)&&sc[k]!=null)t+=sc[k];return t+upperBonus(sc);}
    function allFilled(sc){for(var i=0;i<CATS.length;i++)if(sc[CATS[i].id]==null)return false;return true;}
    function liveBadge(d){
      var c=counts(d);
      for(var i=1;i<=6;i++)if(c[i]===5)return 'yacht';
      if(hasRun(c,5))return 'lStraight';
      var h3=false,h2=false;for(var j=1;j<=6;j++){if(c[j]===3)h3=true;if(c[j]===2)h2=true;}
      if(h3&&h2)return 'fullHouse';
      if(hasRun(c,4))return 'sStraight';
      for(var k=1;k<=6;k++)if(c[k]===4)return 'fourKind';
      return null;
    }

    // ===== 게임 상태 =====
    var best=gi(KEY.best);
    var muted=false;try{muted=localStorage.getItem(KEY.muted)==='1';}catch(e){}
    var dice=[0,0,0,0,0], kept=[false,false,false,false,false];
    var rollsLeft=3, rolled=false, scored={}, ended=false, rolling=false;

    // ===== DOM =====
    var gridEl=document.getElementById('grid'), diceEl=document.getElementById('dice');
    var noteEl=document.getElementById('note'), overEl=document.getElementById('over');
    var totalEl=document.getElementById('total'), bestEl=document.getElementById('best');
    var rollBtn=document.getElementById('roll'), rollT=document.getElementById('roll-t'), rlEl=document.getElementById('rl');
    var bonusEl=document.getElementById('bonus'), bonusFill=document.getElementById('bonus-fill'), bonusNum=document.getElementById('bonus-num');
    var wrap=document.getElementById('wrap');

    // 광물 색 (CSS 폴백 젬 + 하이라이트)
    var TIER=['','#a49a8d','#c2803f','#b9c4d0','#e0b23c','#37ac79','#6fcfe4'];
    function gemGrad(v){
      var base=TIER[v];
      return 'radial-gradient(120% 100% at 35% 25%,rgba(255,255,255,.85),rgba(255,255,255,0) 42%),linear-gradient(180deg,'+shade(base,26)+','+shade(base,-24)+')';
    }
    function hx(c){c=c.replace('#','');return [parseInt(c.substr(0,2),16),parseInt(c.substr(2,2),16),parseInt(c.substr(4,2),16)];}
    function shade(c,f){var r=hx(c);function k(v){return Math.max(0,Math.min(255,Math.round(v)));}return 'rgb('+k(r[0]+f)+','+k(r[1]+f)+','+k(r[2]+f)+')';}

    // 젬 이미지 프리로드 (실패 시 CSS 폴백 젬으로)
    var gemReady=[false,false,false,false,false,false,false];
    for(var v=1;v<=6;v++)(function(v){
      var img=new Image();
      img.onload=function(){gemReady[v]=true;paintDice();};
      img.src='assets/gem'+v+'.png';
    })(v);

    // ===== 사운드 (WebAudio, hive 패턴 재사용) =====
    var ac=null;
    function ctx(){if(!ac){try{ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return ac;}
    function tone(f,t,d,type,vol){if(muted)return;var c=ctx();if(!c)return;var o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.value=f;o.connect(g);g.connect(c.destination);var x=c.currentTime+(t||0);g.gain.setValueAtTime(.0001,x);g.gain.exponentialRampToValueAtTime(vol||.14,x+.01);g.gain.exponentialRampToValueAtTime(.0001,x+(d||.12));o.start(x);o.stop(x+(d||.12)+.03);}
    function noise(t,d,vol){if(muted)return;var c=ctx();if(!c)return;var n=Math.floor(c.sampleRate*(d||.05)),b=c.createBuffer(1,n,c.sampleRate),dat=b.getChannelData(0);for(var i=0;i<n;i++)dat[i]=(Math.random()*2-1)*(1-i/n);var s=c.createBufferSource();s.buffer=b;var g=c.createGain();g.gain.value=vol||.08;var f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=1400;s.connect(f);f.connect(g);g.connect(c.destination);s.start(c.currentTime+(t||0));}
    function sRoll(){for(var i=0;i<4;i++)noise(i*.09,.06,.09);tone(180,.05,.1,'triangle',.06);}
    function sKeep(){tone(560,0,.05,'triangle',.11);tone(760,.04,.05,'sine',.08);}
    function sUnkeep(){tone(420,0,.05,'sine',.08);}
    function sScore(pts){var f=380+Math.min(pts,50)*7;tone(f,0,.09,'triangle',.12);tone(f*1.5,.06,.09,'sine',.08);}
    function sPattern(){tone(660,0,.08,'triangle',.1);tone(880,.07,.1,'sine',.09);}
    function sYacht(){[784,988,1319,1568].forEach(function(f,i){tone(f,i*.09,.16,'triangle',.16);});tone(2093,.4,.3,'sine',.1);}
    function sRecord(){[880,1109,1319,1760].forEach(function(f,i){tone(f,i*.1,.16,'sine',.14);});}
    function sEnd(){[523,659,784].forEach(function(f,i){tone(f,i*.11,.18,'triangle',.13);});}

    // ===== 렌더링 =====
    function buildGrid(){
      gridEl.innerHTML='';
      for(var r=0;r<6;r++){ makeSlot(UPPER[r]); makeSlot(LOWER[r]); }
    }
    function makeSlot(id){
      var m=META[id];
      var el=document.createElement('div');
      el.className='slot'; el.setAttribute('data-id',id);
      var gem='';
      if(CATS.find(function(c){return c.id===id;}).up){
        var v=CATS.find(function(c){return c.id===id;}).n;
        gem='<span class="gem" style="background:'+gemGrad(v)+'"></span>';
      }else{
        gem='<span class="gem" style="background:linear-gradient(180deg,#f6ecd4,#e6d6b3)"></span>';
      }
      el.innerHTML=gem+'<span class="lbl">'+m.lbl+'<small>'+m.sub+'</small></span><span class="val">·</span>';
      el.addEventListener('click',function(){ tryScore(id); });
      gridEl.appendChild(el);
    }

    function paintDice(){
      diceEl.innerHTML='';
      for(var i=0;i<5;i++)(function(i){
        var v=dice[i];
        var el=document.createElement('button');
        el.className='die'+(v===0?' empty':'')+(kept[i]?' kept':'');
        el.setAttribute('aria-label','원석 '+(i+1));
        var inner='<span class="gemwrap">';
        if(v>0){
          inner+='<span class="gembg" style="background:'+gemGrad(v)+'"></span>';
          if(gemReady[v]) inner+='<img src="assets/gem'+v+'.png" alt="">';
        }else{
          inner+='<span class="gembg" style="background:transparent"></span>';
        }
        inner+='</span>';
        if(v>0) inner+='<span class="num">'+v+'</span>';
        el.innerHTML=inner;
        el.addEventListener('click',function(){ toggleKeep(i); });
        diceEl.appendChild(el);
        if(v>0 && !rolling && !kept[i]) el.classList.add('breathe');
      })(i);
    }

    function updateHud(){
      totalEl.textContent=String(grandTotal(scored));
      bestEl.textContent=String(best);
      var us=upperSubtotal(scored);
      bonusFill.style.width=Math.min(100,us/63*100)+'%';
      bonusNum.textContent=us+'/63';
      var reached=us>=63;
      bonusEl.classList.toggle('reached',reached);
      document.getElementById('bonus-label').textContent=reached?'상단 보너스 +35 획득!':'상단 보너스';
      document.getElementById('mute-ic').innerHTML='<use href="'+(muted?'#p-speaker-slash':'#p-speaker-high')+'"/>';
    }

    // 열린 칸 프리뷰 + 최고 득점 칸 추천 + 라이브 족보 하이라이트
    function updateSlots(){
      var badge = rolled ? liveBadge(dice) : null;
      var bestId=null, bestPts=-1;
      var slots=gridEl.querySelectorAll('.slot');
      slots.forEach(function(el){
        var id=el.getAttribute('data-id');
        var valEl=el.querySelector('.val');
        el.classList.remove('best','hot','open','zero','done');
        if(scored[id]!=null){
          el.classList.add('done');
          valEl.textContent=scored[id];
          return;
        }
        if(!rolled){ valEl.textContent='·'; return; }
        el.classList.add('open');
        var pts=scoreFor(id,dice);
        valEl.textContent=pts;
        if(pts===0) el.classList.add('zero');
        if(badge===id) el.classList.add('hot');
        if(pts>bestPts){bestPts=pts;bestId=id;}
      });
      if(rolled && bestId && bestPts>0){
        var bel=gridEl.querySelector('.slot[data-id="'+bestId+'"]');
        if(bel && !bel.classList.contains('hot')) bel.classList.add('best');
      }
      // 라이브 족보면 해당 주사위도 강조
      var dies=diceEl.querySelectorAll('.die');
      dies.forEach(function(d){d.classList.remove('hotdie');});
      if(badge){
        markHotDice(badge);
      }
    }
    function markHotDice(badge){
      var c=counts(dice), keep={};
      if(badge==='yacht'||badge==='fourKind'){
        var target=0,need=badge==='yacht'?5:4;
        for(var v=1;v<=6;v++)if(c[v]>=need){target=v;break;}
        for(var i=0;i<5;i++)if(dice[i]===target)keep[i]=1;
      }else if(badge==='lStraight'||badge==='sStraight'){
        for(var i2=0;i2<5;i2++)keep[i2]=1; // 스트레이트는 전부 관여
      }else if(badge==='fullHouse'){
        for(var i3=0;i3<5;i3++)keep[i3]=1;
      }
      var dies=diceEl.querySelectorAll('.die');
      for(var k in keep){ if(dies[k])dies[k].classList.add('hotdie'); }
    }

    function updateRollBtn(){
      // 남은 굴림 표시
      var dots=rlEl.querySelectorAll('i');
      dots.forEach(function(d,i){ d.classList.toggle('on', i<rollsLeft); });
      if(ended){ rollBtn.setAttribute('disabled','1'); return; }
      rollBtn.removeAttribute('disabled');
      if(rollsLeft>0){
        rollBtn.classList.remove('score');
        rollT.textContent=rolled?'다시 굴리기':'굴리기';
        rlEl.style.display='';
      }else{
        // 굴림 소진 → 반드시 칸 선택
        rollBtn.classList.add('score');
        rollT.textContent='칸을 골라 세공하기';
        rlEl.style.display='none';
      }
    }

    // ===== 액션 =====
    function roll(){
      if(rolling||ended||rollsLeft<=0)return;
      firstAudio();
      rolling=true;
      var idxs=[];
      for(var i=0;i<5;i++){ if(dice[i]===0||!kept[i]) idxs.push(i); }
      if(idxs.length===0){ rolling=false; return; } // 전부 고정 상태에서 방어
      sRoll();
      if(navigator.vibrate)navigator.vibrate(18);
      paintDice();
      var dies=diceEl.querySelectorAll('.die');
      idxs.forEach(function(i){ dies[i].classList.remove('breathe','settle'); dies[i].classList.add('tumble'); });
      // 텀블 프레임
      var frames=0, maxF=9;
      var iv=setInterval(function(){
        idxs.forEach(function(i){ dice[i]=1+Math.floor(Math.random()*6); });
        paintDiceFacesOnly(idxs);
        frames++;
        if(frames>=maxF){
          clearInterval(iv);
          idxs.forEach(function(i){ dice[i]=1+Math.floor(Math.random()*6); });
          paintDiceFacesOnly(idxs); // 최종 눈을 확정 표시한 뒤 정착 바운스
          rollsLeft--;
          rolled=true;
          settleDice(idxs);
        }
      },55);
    }
    // 텀블 중 얼굴만 갱신 (전체 rebuild 안 함 → 부드럽게)
    function paintDiceFacesOnly(idxs){
      var dies=diceEl.querySelectorAll('.die');
      idxs.forEach(function(i){
        var el=dies[i]; var v=dice[i];
        el.classList.remove('empty');
        el.innerHTML='<span class="gemwrap"><span class="gembg" style="background:'+gemGrad(v)+'"></span>'+(gemReady[v]?'<img src="assets/gem'+v+'.png" alt="">':'')+'</span><span class="num">'+v+'</span>';
      });
    }
    function settleDice(idxs){
      var dies=diceEl.querySelectorAll('.die');
      idxs.forEach(function(i,k){
        var el=dies[i];
        setTimeout(function(){
          el.classList.remove('tumble');
          el.classList.add('settle');
        },k*40);
      });
      setTimeout(function(){
        rolling=false;
        paintDice();
        updateSlots(); updateRollBtn();
        var badge=liveBadge(dice);
        if(badge==='yacht'){ celebrateYacht(); }
        else if(badge){ sPattern(); flashNote(badgeMsg(badge)); }
        else{
          if(rollsLeft>0) noteEl.textContent='남길 원석을 톡 해서 고정하고 다시 굴려요';
          else noteEl.textContent='칸을 골라 점수를 새겨요 — 아쉬운 굴림은 낮은 칸에 버려도 OK';
        }
        save();
      }, idxs.length*40+380);
    }
    function badgeMsg(b){
      if(b==='lStraight')return '스트레이트 5연속! <b>스트레이트5</b> 칸이면 40점';
      if(b==='sStraight')return '4연속! <b>스트레이트4</b> 칸이면 30점';
      if(b==='fullHouse')return '풀하우스! <b>풀하우스</b> 칸이면 25점';
      if(b==='fourKind')return '같은 원석 4알! <b>포카드</b>로 크게';
      return '';
    }
    function flashNote(html){ noteEl.innerHTML=html; }

    function toggleKeep(i){
      if(ended||rolling)return;
      if(!rolled){ noteEl.textContent='먼저 굴리기! 굴린 뒤에 남길 원석을 고정해요'; return; }
      if(rollsLeft<=0){ noteEl.textContent='더 굴릴 수 없어요 — 칸을 골라 세공하세요'; return; }
      kept[i]=!kept[i];
      if(kept[i])sKeep();else sUnkeep();
      if(navigator.vibrate)navigator.vibrate(10);
      paintDice(); updateSlots();
      save();
    }

    function tryScore(id){
      if(ended||rolling||!rolled)return;
      if(scored[id]!=null)return;
      var pts=scoreFor(id,dice);
      scored[id]=pts;
      sScore(pts);
      if(navigator.vibrate)navigator.vibrate(pts>20?[20,30,40]:20);
      // 슬롯 팝 + 플로팅 텍스트
      var el=gridEl.querySelector('.slot[data-id="'+id+'"]');
      if(el){ el.classList.add('just'); setTimeout(function(){el.classList.remove('just');},520); floatOverSlot(el,'+'+pts); }
      // 다음 턴 준비
      if(allFilled(scored)){ finish(); return; }
      nextTurn();
    }
    function floatOverSlot(el,txt){
      var r=el.getBoundingClientRect();
      var f=document.createElement('div');
      f.textContent=txt;
      f.style.cssText='position:fixed;left:'+(r.left+r.width/2)+'px;top:'+(r.top+r.height/2)+'px;transform:translate(-50%,-50%);z-index:75;font-weight:900;font-size:22px;color:#2d7a53;pointer-events:none;transition:transform .7s ease,opacity .7s ease;text-shadow:0 1px 2px rgba(255,255,255,.8);';
      document.body.appendChild(f);
      requestAnimationFrame(function(){ f.style.transform='translate(-50%,-160%)'; f.style.opacity='0'; });
      setTimeout(function(){ f.remove(); }, 720);
    }

    function nextTurn(){
      dice=[0,0,0,0,0]; kept=[false,false,false,false,false];
      rollsLeft=3; rolled=false;
      paintDice(); updateSlots(); updateHud(); updateRollBtn();
      noteEl.textContent='다음 원석을 굴려요 · 남은 칸 '+remaining()+'개';
      save();
    }
    function remaining(){var n=0;CATS.forEach(function(c){if(scored[c.id]==null)n++;});return n;}

    function finish(){
      ended=true; del(KEY.save);
      var total=grandTotal(scored);
      var record=total>best;
      if(record){ best=total; set(KEY.best,best); }
      paintDice(); updateSlots(); updateHud(); updateRollBtn();
      sEnd();
      if(record){ setTimeout(sRecord,320); confetti(record?90:50); shakeScreen(); }
      setTimeout(function(){ showOver(total,record); }, record?700:520);
    }

    function showOver(total,record){
      document.getElementById('over-title').textContent=record?'신기록 세공!':'세공 완료!';
      document.getElementById('over-sub').textContent=record
        ?'열두 칸을 모두 세공해 최고 기록을 갈아치웠어요.'
        :'열두 칸을 모두 채웠어요. 배치를 바꾸면 더 높이 나와요.';
      document.getElementById('over-score').textContent=total;
      var img=document.getElementById('badge-img');
      img.src='assets/gem6.png'; img.onerror=function(){this.style.display='none';};
      document.getElementById('badge').classList.toggle('rec',record);
      // 하이라이트 요약 칩
      var row=document.getElementById('over-row'); row.innerHTML='';
      var chips=[];
      var us=upperSubtotal(scored);
      if(upperBonus(scored)>0) chips.push({t:'상단 보너스 +35',g:true});
      if(scored.yacht===50) chips.push({t:'야추 달성',g:true});
      if(scored.lStraight===40) chips.push({t:'스트레이트5',g:false});
      chips.push({t:'상단 '+us+'/63',g:false});
      if(!record) chips.push({t:'최고 '+best+'점',g:false});
      chips.forEach(function(ch){
        var c=document.createElement('span'); c.className='rchip'+(ch.g?' gold':''); c.innerHTML=ch.t;
        row.appendChild(c);
      });
      overEl.classList.add('show');
    }

    // ===== 축하 연출 =====
    function celebrateYacht(){
      sYacht();
      if(navigator.vibrate)navigator.vibrate([40,40,80,40,120]);
      flashNote('<b>야추!</b> 다섯 원석이 하나로 — 야추 칸이면 50점!');
      confetti(70); shakeScreen();
    }
    function shakeScreen(){ wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake'); }
    var fx=document.getElementById('fx'), fxc=fx.getContext('2d'), parts=[], fxAnim=null;
    function fxResize(){ fx.width=innerWidth; fx.height=innerHeight; }
    fxResize(); window.addEventListener('resize',fxResize);
    function confetti(n){
      var cols=['#e0b23c','#37ac79','#6fcfe4','#c2803f','#fffdf7','#c99a3a'];
      for(var i=0;i<n;i++){
        parts.push({x:innerWidth/2+(Math.random()-.5)*120,y:innerHeight*.42,
          vx:(Math.random()-.5)*10,vy:-6-Math.random()*9,
          g:.28+Math.random()*.12,r:4+Math.random()*5,rot:Math.random()*6.28,vr:(Math.random()-.5)*.4,
          col:cols[Math.floor(Math.random()*cols.length)],life:1,shape:Math.random()<.4?'c':'s'});
      }
      if(!fxAnim) fxLoop();
    }
    function fxLoop(){
      fxc.clearRect(0,0,fx.width,fx.height);
      for(var i=parts.length-1;i>=0;i--){
        var p=parts[i];
        p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life-=.008;
        if(p.y>fx.height+30||p.life<=0){ parts.splice(i,1); continue; }
        fxc.save(); fxc.translate(p.x,p.y); fxc.rotate(p.rot); fxc.globalAlpha=Math.max(0,Math.min(1,p.life));
        fxc.fillStyle=p.col;
        if(p.shape==='c'){ fxc.beginPath(); fxc.arc(0,0,p.r,0,6.28); fxc.fill(); }
        else fxc.fillRect(-p.r,-p.r*.6,p.r*2,p.r*1.2);
        fxc.restore();
      }
      if(parts.length){ fxAnim=requestAnimationFrame(fxLoop); }
      else{ fxc.clearRect(0,0,fx.width,fx.height); fxAnim=null; }
    }

    // ===== 저장 / 복원 (이 기기 이어하기 + 로그인 시 diceSave lww 동기화) =====
    function save(){
      if(ended){ del(KEY.save); return; }
      try{ localStorage.setItem(KEY.save,JSON.stringify({v:1,dice:dice,kept:kept,rollsLeft:rollsLeft,rolled:rolled,scored:scored})); }catch(e){}
    }
    function load(){
      var d=null; try{ d=JSON.parse(localStorage.getItem(KEY.save)||'null'); }catch(e){}
      if(!d||d.v!==1||!Array.isArray(d.dice)||d.dice.length!==5||typeof d.scored!=='object')return false;
      dice=d.dice.map(function(x){return (x|0);});
      kept=Array.isArray(d.kept)&&d.kept.length===5?d.kept.map(Boolean):[false,false,false,false,false];
      rollsLeft=Math.max(0,Math.min(3,d.rollsLeft|0));
      rolled=!!d.rolled; scored={};
      for(var k in d.scored){ if(CATS.find(function(c){return c.id===k;}) && typeof d.scored[k]==='number') scored[k]=d.scored[k]; }
      if(allFilled(scored))return false; // 끝난 판은 이어하지 않음
      return true;
    }

    // ===== 첫 오디오 언락 =====
    var audioReady=false;
    function firstAudio(){ if(audioReady)return; audioReady=true; var c=ctx(); if(c&&c.state==='suspended')c.resume(); }

    // ===== 초기화 =====
    function startNew(){
      dice=[0,0,0,0,0]; kept=[false,false,false,false,false];
      rollsLeft=3; rolled=false; scored={}; ended=false; rolling=false;
      del(KEY.save);
      paintDice(); buildGridVals(); updateHud(); updateRollBtn();
      noteEl.textContent='원석 다섯 알을 굴려 세공을 시작하세요';
    }
    function buildGridVals(){ updateSlots(); }

    // ===== 이벤트 =====
    rollBtn.addEventListener('click',function(){
      if(ended)return;
      if(rollsLeft>0) roll();
      else noteEl.textContent='굴림을 다 썼어요 — 위에서 칸을 골라 세공하세요';
    });
    document.getElementById('reset').addEventListener('click',function(){
      if(!ended && (rolled || remaining()<12)){ if(!confirm('지금 판을 버리고 새 원석으로 시작할까요?'))return; }
      overEl.classList.remove('show'); startNew();
    });
    document.getElementById('mute').addEventListener('click',function(){ muted=!muted; set(KEY.muted,muted?'1':'0'); updateHud(); if(!muted)sKeep(); });
    document.getElementById('over-btn').addEventListener('click',function(){ overEl.classList.remove('show'); startNew(); });
    document.getElementById('support').addEventListener('click',function(){ if(window.GamePortal&&GamePortal.openSupport)GamePortal.openSupport(); });
    window.addEventListener('keydown',function(e){
      if(ended)return;
      if(e.key===' '||e.key==='Enter'){ e.preventDefault(); if(rollsLeft>0)roll(); }
      else if(e.key>='1'&&e.key<='5'){ toggleKeep(parseInt(e.key,10)-1); }
    });
    window.addEventListener('pagehide',save);
    document.addEventListener('visibilitychange',function(){ if(document.hidden)save(); });

    // ===== 부트 =====
    buildGrid();
    if(load()){
      ended=false; rolling=false;
      paintDice(); updateSlots(); updateHud(); updateRollBtn();
      noteEl.textContent=rolled?'하던 세공을 이어서 — 남은 칸 '+remaining()+'개':'원석을 굴려 이어서 세공하세요';
    }else{
      startNew();
    }
  })();
  </script>
  <script>
    if('serviceWorker' in navigator && location.protocol === 'https:') navigator.serviceWorker.register('./sw.js');
  </script>
</body>
