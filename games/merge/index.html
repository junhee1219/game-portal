<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#ffeede">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="동물 합치기">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta property="og:type" content="website">
<meta property="og:title" content="동물 합치기 — 같은 친구끼리 팡!">
<meta property="og:description" content="동그란 동물을 떨어뜨려 합치는 중독성 드롭 퍼즐. 넘치기 전에 최고 점수에 도전!">
<title>동물 합치기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Gowun+Dodum&display=swap');
  :root{
    /* 밝은 파스텔 단일 색조 — 따뜻한 살구/크림 톤 (명도 폭 좁게) */
    --base:#fff3e6;
    --deep:#ffe7d2;
    --vig:#fcdcc1;
    --glass:rgba(255,255,255,0.62);
    --glass-border:rgba(120,85,55,0.18);
    --ink:#5a4636;        /* 본문 텍스트 (차분한 코코아) */
    --ink-soft:#9c8472;   /* 보조 텍스트 */
    --card:#fffaf4;
    --scrim:rgba(70,48,32,0.34);
    --accent:#ff9a6b;     /* 포인트 코랄 */
    --line:#ff7a59;       /* 위험선 */
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Gowun Dodum',sans-serif;
    height:100vh;height:100dvh;width:100vw;overflow:hidden;
    background:radial-gradient(130% 100% at 50% 0%, var(--base) 0%, var(--deep) 55%, var(--vig) 100%);
    color:var(--ink);display:flex;flex-direction:column;align-items:center;
    padding:calc(8px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));
    position:relative;
    user-select:none;-webkit-user-select:none;touch-action:manipulation;
    overscroll-behavior:none;
  }
  /* 옅은 흰 블룸이 숨쉬듯 — 단일 빛 표현 */
  body::after{
    content:'';position:fixed;top:-25%;left:-40%;width:90%;height:80%;z-index:0;pointer-events:none;
    background:radial-gradient(50% 50% at 50% 50%, rgba(255,255,255,.5), transparent 70%);
    animation:bg-breathe 14s ease-in-out infinite alternate;
  }
  @keyframes bg-breathe{from{transform:translate(0,0) scale(1);}to{transform:translate(55vw,30vh) scale(1.3);}}
  @media (prefers-reduced-motion:reduce){body::after{animation:none;}}

  /* ── 상단 바 ── */
  .topbar{display:flex;align-items:center;gap:8px;z-index:2;width:100%;max-width:480px;flex:0 0 auto;}
  h1{
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:20px;letter-spacing:-.3px;
    color:var(--ink);margin-right:auto;white-space:nowrap;display:flex;align-items:center;gap:6px;
  }
  h1 .logo{font-size:22px;line-height:1;}
  .pill{
    background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(10px);
    padding:6px 13px;border-radius:999px;font-size:13px;font-family:'Fredoka',sans-serif;
    display:flex;align-items:center;gap:5px;white-space:nowrap;color:var(--ink);
  }
  .pill .lab{font-size:11px;color:var(--ink-soft);}
  .pill b{font-size:15px;}
  #score-pill b{color:var(--accent);}
  .sq{
    min-height:40px;min-width:44px;width:44px;border-radius:13px;cursor:pointer;
    background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(10px);
    color:var(--ink);font-size:20px;display:flex;align-items:center;justify-content:center;
    transition:transform .12s;box-shadow:0 3px 7px rgba(120,85,55,.12);
  }
  .sq:active{transform:scale(.92);}

  /* ── 보드(게임 영역) ── */
  #stage{
    flex:1 1 auto;display:flex;align-items:center;justify-content:center;
    z-index:2;width:100%;max-width:480px;min-height:0;padding:10px 0 6px;position:relative;
  }
  #wrap{
    position:relative;height:100%;aspect-ratio:5/7;max-width:100%;
    border-radius:22px;
    /* 통(컨테이너) — 크림 유리 느낌, 바닥 하드섀도 */
    background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,255,255,.24));
    border:3px solid rgba(120,85,55,.22);border-top:none;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 8px 0 rgba(120,85,55,.13), 0 14px 22px rgba(120,85,55,.16);
  }
  #game{position:absolute;inset:0;width:100%;height:100%;border-radius:0 0 19px 19px;display:block;}
  /* 다음 동물 미리보기 (좌상단 작은 칩) */
  #next{
    position:absolute;top:8px;left:8px;z-index:3;display:flex;align-items:center;gap:5px;
    background:rgba(255,255,255,.72);border:1px solid var(--glass-border);border-radius:999px;
    padding:3px 9px 3px 6px;font-size:11px;font-family:'Fredoka',sans-serif;color:var(--ink-soft);
    backdrop-filter:blur(8px);
  }
  #next .nface{font-size:18px;line-height:1;}

  #credit{font-size:10px;color:var(--ink-soft);opacity:.7;z-index:2;margin-top:2px;}

  /* ── 게임오버 / 시작 오버레이 ── */
  #over{
    position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;
    background:var(--scrim);backdrop-filter:blur(6px);
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
  #over.show{opacity:1;pointer-events:auto;}
  .over-card{
    background:var(--card);border:1px solid var(--glass-border);
    border-radius:26px;padding:26px 26px 22px;text-align:center;width:min(320px,86vw);
    box-shadow:0 24px 60px rgba(70,48,32,.28), inset 0 1px 0 rgba(255,255,255,.9);
    transform:scale(.82);transition:transform .35s cubic-bezier(.2,1.4,.4,1);
  }
  #over.show .over-card{transform:scale(1);}
  .over-card .face{font-size:54px;line-height:1;margin-bottom:6px;}
  .over-card h2{font-family:'Fredoka',sans-serif;font-size:24px;margin-bottom:10px;color:var(--ink);}
  .over-stats{display:flex;gap:10px;justify-content:center;margin:8px 0 4px;}
  .stat{
    background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;
    padding:9px 16px;min-width:88px;
  }
  .stat .lab{font-size:11px;color:var(--ink-soft);font-family:'Fredoka',sans-serif;}
  .stat .val{font-size:23px;font-family:'Fredoka',sans-serif;font-weight:600;color:var(--ink);}
  .stat.best .val{color:var(--accent);}
  #over-record{
    display:none;font-family:'Fredoka',sans-serif;font-size:13px;color:#7a3a12;font-weight:700;
    background:linear-gradient(135deg,#ffe2a6,#ffba7a);border-radius:999px;padding:4px 14px;margin-top:10px;
  }
  #over-record.show{display:inline-flex;align-items:center;gap:5px;animation:pop .5s ease;}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
  #btn-again{
    margin-top:16px;width:100%;font-size:16px;font-weight:700;padding:13px 0;font-family:'Fredoka',sans-serif;
    border:none;border-radius:16px;cursor:pointer;color:#fff;
    background:linear-gradient(135deg,#ff9a6b,#ff7a59);
    box-shadow:0 6px 16px rgba(255,120,80,.4);transition:transform .12s;
  }
  #btn-again:active{transform:scale(.96);}
  .evo-row{display:flex;flex-wrap:wrap;justify-content:center;gap:3px;margin-top:14px;font-size:18px;opacity:.9;}
  .evo-row .arr{font-size:11px;color:var(--ink-soft);align-self:center;}
</style>
</head>
<body>
  <div class="topbar">
    <h1><span class="logo">🐾</span>동물 합치기</h1>
    <div class="pill" id="score-pill"><span class="lab">점수</span> <b id="score">0</b></div>
    <div class="pill"><span class="lab">최고</span> <b id="best">0</b></div>
    <button class="sq" id="mute" aria-label="소리 켜기/끄기">🔊</button>
  </div>

  <div id="stage">
    <div id="wrap">
      <div id="next"><span class="nface">🐭</span><span>다음</span></div>
      <canvas id="game"></canvas>
    </div>
  </div>
  <div id="credit">손가락으로 조준 · 떼면 떨어져요</div>

  <!-- 게임오버 오버레이 -->
  <div id="over">
    <div class="over-card">
      <div class="face" id="over-face">🐻</div>
      <h2 id="over-title">게임 끝!</h2>
      <div class="over-stats">
        <div class="stat"><div class="lab">점수</div><div class="val" id="over-score">0</div></div>
        <div class="stat best"><div class="lab">최고</div><div class="val" id="over-best">0</div></div>
      </div>
      <span id="over-record">🏆 신기록!</span>
      <button id="btn-again">다시 하기</button>
      <div class="evo-row" id="evo-row"></div>
    </div>
  </div>

<script src="matter.js"></script>
<script src="game.js"></script>
<script>
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
</script>
</body>
</html>
