<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#eaf2fb">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="탑 쌓기">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta property="og:type" content="website">
<meta property="og:title" content="탑 쌓기 — 어긋난 만큼 깎여요">
<meta property="og:description" content="좌우로 움직이는 블록을 톡! 정확히 맞출수록 안 깎이고, 몇 층까지 쌓느냐가 실력. 한 손으로 즐기는 타이밍 게임.">
<title>탑 쌓기</title>
<style>
  @font-face{font-family:"Pretendard Variable";font-weight:45 920;font-style:normal;font-display:swap;src:url("/fonts/PretendardVariable.woff2") format("woff2-variations");}
  :root{
    /* 밝은 파스텔 단일 색조 — 하늘/크림 톤. 검보라·네온 금지 */
    --bg-a:#f2f8ff;       /* 위쪽 살짝 밝게 */
    --bg-b:#e6eefb;       /* 가운데 */
    --bg-c:#dde7f6;       /* 아래쪽 */
    --ink:#3b4258;        /* 본문 */
    --ink-soft:#7b8298;   /* 보조 */
    --card:#ffffff;
    --scrim:rgba(45,52,75,.34);
    --glass:rgba(255,255,255,.66);
    --glass-border:rgba(70,84,120,.16);
    --shadow:rgba(70,84,120,.22);
    --accent:#6e8cff;
    /* 타입 스케일 — 딱 3종(portal 기준). 위계는 font-weight + color로. */
    --fs-1:clamp(34px,11vw,46px);  /* 큰 숫자 / 히어로 */
    --fs-2:16px;                    /* 본문 / 제목(굵게) / 버튼 */
    --fs-3:13px;                    /* 라벨 / 캡션 */
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg-b);}
  body{
    font-family:"Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    min-height:100vh;min-height:100dvh;width:100vw;overflow:hidden;
    background-color:var(--bg-b);
    background-image:radial-gradient(130% 100% at 50% 0%, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%);
    color:var(--ink);display:flex;flex-direction:column;align-items:center;
    padding:calc(8px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));
    position:relative;
    user-select:none;-webkit-user-select:none;touch-action:none;
    overscroll-behavior:none;
  }
  button{font-family:inherit;}

  /* ── 상단 바 ── */
  .topbar{display:flex;align-items:center;gap:8px;z-index:2;width:100%;max-width:480px;flex:0 0 auto;}
  h1{
    font-family:"Pretendard Variable",-apple-system,sans-serif;font-weight:800;font-size:var(--fs-2);letter-spacing:-.3px;
    color:var(--ink);margin-right:auto;white-space:nowrap;display:flex;align-items:center;gap:7px;
  }
  /* 미니 로고: 어긋나게 쌓인 블록 3칸 */
  h1 .logo{display:inline-flex;flex-direction:column;gap:2px;}
  h1 .logo i{height:6px;border-radius:2px;display:block;box-shadow:0 1px 0 rgba(0,0,0,.10);}
  h1 .logo i:nth-child(1){width:20px;background:#7fb2ef;margin-left:4px;}
  h1 .logo i:nth-child(2){width:20px;background:#8ad3b0;}
  h1 .logo i:nth-child(3){width:20px;background:#f3b27e;margin-left:2px;}
  .pill{
    background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(10px);
    padding:6px 13px;border-radius:999px;font-size:var(--fs-3);
    display:flex;align-items:center;gap:6px;white-space:nowrap;color:var(--ink);line-height:1;
  }
  .pill .lbl{color:var(--ink-soft);font-size:var(--fs-3);letter-spacing:.3px;}
  .pill b{font-size:var(--fs-2);}
  #best-pill b{color:#e8943a;}
  .mute-btn{
    width:42px;height:42px;flex:0 0 auto;border-radius:13px;cursor:pointer;
    background:linear-gradient(180deg,#ffffff,#eef2fb);border:1px solid var(--glass-border);
    box-shadow:0 3px 0 rgba(110,124,170,.2), 0 4px 10px var(--shadow);
    display:flex;align-items:center;justify-content:center;color:#6b7295;transition:transform .1s;
  }
  .mute-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(110,124,170,.2);}
  .ki{width:24px;height:24px;fill:currentColor;display:block;}

  /* ── 무대(캔버스) ── */
  #stage{flex:1 1 auto;display:flex;align-items:stretch;justify-content:center;width:100%;max-width:480px;min-height:0;z-index:2;margin-top:8px;}
  #wrap{
    position:relative;flex:1 1 auto;border-radius:20px;overflow:hidden;
    background:linear-gradient(180deg,rgba(255,255,255,.45),rgba(255,255,255,.16));
    border:1px solid var(--glass-border);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.7), 0 10px 26px var(--shadow);
  }
  #game{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
  /* 시작/안내 힌트 (첫 탭 전) */
  #hint{
    position:absolute;left:0;right:0;top:14%;text-align:center;z-index:3;pointer-events:none;
    color:var(--ink);font-size:var(--fs-2);font-weight:800;opacity:.92;transition:opacity .25s;
  }
  #hint small{display:block;margin-top:6px;font-size:var(--fs-3);font-weight:600;color:var(--ink-soft);}
  #hint.hide{opacity:0;}

  /* ── 게임오버 오버레이 ── */
  #over{
    position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;
    background:var(--scrim);backdrop-filter:blur(6px);
    opacity:0;pointer-events:none;transition:opacity .3s;
  }
  #over.show{opacity:1;pointer-events:auto;}
  .over-card{
    background:var(--card);border:1px solid var(--glass-border);
    border-radius:26px;padding:30px 28px 24px;text-align:center;width:min(320px,86vw);
    box-shadow:0 24px 60px rgba(45,40,80,.28), inset 0 1px 0 rgba(255,255,255,.9);
    transform:scale(.82);transition:transform .35s cubic-bezier(.2,1.4,.4,1);
  }
  #over.show .over-card{transform:scale(1);}
  .over-card h2{font-size:var(--fs-2);font-weight:800;margin-bottom:4px;color:var(--ink);}
  .over-card .sc{font-size:var(--fs-1);font-weight:800;color:var(--accent);margin:8px 0 2px;line-height:1;}
  .over-card .sc-lbl{font-size:var(--fs-3);color:var(--ink-soft);letter-spacing:.5px;}
  #over-best{font-size:var(--fs-3);color:var(--ink-soft);margin-top:8px;}
  #over-record{
    display:none;font-size:var(--fs-3);color:#7a4d00;font-weight:800;
    background:linear-gradient(135deg,#ffe6a3,#ffcf7e);border-radius:999px;padding:4px 14px;margin-top:10px;
  }
  #over-record.show{display:inline-flex;align-items:center;gap:5px;animation:rec-pop .5s ease;}
  @keyframes rec-pop{0%{transform:scale(.5);}60%{transform:scale(1.12);}100%{transform:scale(1);}}
  #btn-again{
    margin-top:18px;width:100%;border:none;border-radius:16px;cursor:pointer;
    font-size:var(--fs-2);font-weight:800;color:#fff;padding:14px 0;
    background:linear-gradient(180deg,#8aa0ff,#6478ee);
    box-shadow:0 4px 0 #5161c8, 0 6px 14px rgba(80,90,200,.4);
    transition:transform .1s;
  }
  #btn-again:active{transform:translateY(2px);box-shadow:0 2px 0 #5161c8;}

  .credit{position:fixed;left:0;right:0;bottom:calc(4px + env(safe-area-inset-bottom));text-align:center;font-size:10px;color:var(--ink-soft);opacity:.55;z-index:1;}
</style>
</head>
<body>
  <!-- 스피커 아이콘 심볼 (Phosphor Fill, 인라인) -->
  <svg style="display:none" aria-hidden="true">
    <symbol id="p-speaker-high" viewBox="0 0 256 256"><path d="M160,32.25V223.69a8.29,8.29,0,0,1-3.91,7.18,8,8,0,0,1-9-.56l-65.57-51A4,4,0,0,1,80,176.16V79.84a4,4,0,0,1,1.55-3.15l65.57-51a8,8,0,0,1,10,.16A8.27,8.27,0,0,1,160,32.25ZM60,80H32A16,16,0,0,0,16,96v64a16,16,0,0,0,16,16H60a4,4,0,0,0,4-4V84A4,4,0,0,0,60,80Zm126.77,20.84a8,8,0,0,0-.72,11.3,24,24,0,0,1,0,31.72,8,8,0,1,0,12,10.58,40,40,0,0,0,0-52.88A8,8,0,0,0,186.74,100.84Zm40.89-26.17a8,8,0,1,0-11.92,10.66,64,64,0,0,1,0,85.34,8,8,0,1,0,11.92,10.66,80,80,0,0,0,0-106.66Z"/></symbol>
    <symbol id="p-speaker-slash" viewBox="0 0 256 256"><path d="M213.92,210.62a8,8,0,1,1-11.84,10.76L160,175.09v48.6a8.29,8.29,0,0,1-3.91,7.18,8,8,0,0,1-9-.56l-65.55-51A4,4,0,0,1,80,176.18V87.09L42.08,45.38A8,8,0,1,1,53.92,34.62Zm-27.21-55.46a8,8,0,0,0,11.29-.7,40,40,0,0,0,0-52.88,8,8,0,1,0-12,10.57,24,24,0,0,1,0,31.72A8,8,0,0,0,186.71,155.16Zm40.92-80.49a8,8,0,1,0-11.92,10.66,64,64,0,0,1,0,85.34,8,8,0,1,0,11.92,10.66,80,80,0,0,0,0-106.66ZM153,119.87a4,4,0,0,0,7-2.7V32.25a8.27,8.27,0,0,0-2.88-6.4,8,8,0,0,0-10-.16L103.83,59.33a4,4,0,0,0-.5,5.85ZM60,80H32A16,16,0,0,0,16,96v64a16,16,0,0,0,16,16H60a4,4,0,0,0,4-4V84A4,4,0,0,0,60,80Z"/></symbol>
  </svg>

  <div class="topbar">
    <h1><span class="logo"><i></i><i></i><i></i></span>탑 쌓기</h1>
    <div class="pill"><span class="lbl">층</span><b id="score">0</b></div>
    <div class="pill" id="best-pill"><span class="lbl">최고</span><b id="best">0</b></div>
    <button class="mute-btn" id="mute" aria-label="소리 켜기/끄기">
      <svg class="ki"><use id="mute-use" href="#p-speaker-high"/></svg>
    </button>
  </div>

  <div id="stage">
    <div id="wrap">
      <canvas id="game"></canvas>
      <div id="hint">톡 쳐서 블록 쌓기<small>좌우로 움직일 때 딱 맞춰 떨어뜨려요</small></div>
    </div>
  </div>

  <div id="over">
    <div class="over-card">
      <h2>탑이 무너졌어요</h2>
      <div class="sc" id="over-score">0</div>
      <div class="sc-lbl">층</div>
      <div id="over-best">최고 0층</div>
      <span id="over-record">신기록!</span>
      <button id="btn-again">다시 쌓기</button>
    </div>
  </div>

  <div class="credit">탑 쌓기</div>

<script src="core.js"></script>
<script src="game.js"></script>
<script>
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
