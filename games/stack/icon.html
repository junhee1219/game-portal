<!DOCTYPE html><html><head><meta charset="utf-8"><style>html,body{margin:0;background:#fff;}</style></head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
const cv=document.getElementById('c'), x=cv.getContext('2d');
function rr(ctx,X,Y,W,H,R){R=Math.min(R,W/2,H/2);ctx.beginPath();ctx.moveTo(X+R,Y);ctx.arcTo(X+W,Y,X+W,Y+H,R);ctx.arcTo(X+W,Y+H,X,Y+H,R);ctx.arcTo(X,Y+H,X,Y,R);ctx.arcTo(X,Y,X+W,Y,R);ctx.closePath();}
// 파스텔 배경 (하늘→크림, 명도폭 좁게), 마스커블 안전영역 고려해 라운드 사각
const g=x.createLinearGradient(0,0,0,512);
g.addColorStop(0,'#f2f8ff'); g.addColorStop(1,'#e1ebf8');
rr(x,0,0,512,512,112); x.fillStyle=g; x.fill();
// 어긋나게 쌓인 블록 4층 (색상 walk, 윗 림 + 하단 음영)
function slab(cx,cy,w,h,hue){
  rr(x,cx,cy,w,h,h*0.30); x.fillStyle='hsl('+hue+',46%,63%)'; x.fill();
  x.save(); rr(x,cx,cy,w,h,h*0.30); x.clip();
  let lg=x.createLinearGradient(0,cy,0,cy+h);
  lg.addColorStop(0,'rgba(255,255,255,.42)'); lg.addColorStop(.5,'rgba(255,255,255,0)'); lg.addColorStop(1,'rgba(0,0,0,.12)');
  x.fillStyle=lg; x.fillRect(cx,cy,w,h); x.restore();
}
const H=70, gapY=14, w=210;
const cx=151, byBottom=420;
// 아래에서 위로, 좌우로 살짝 어긋나게
slab(cx+0,   byBottom-0*(H+gapY)-H, w, H, 200);
slab(cx+26,  byBottom-1*(H+gapY)-H, w, H, 218);
slab(cx-18,  byBottom-2*(H+gapY)-H, w, H, 236);
slab(cx+10,  byBottom-3*(H+gapY)-H, w, H, 254);
window.__png=()=>cv.toDataURL('image/png');
</script>
</body></html>
