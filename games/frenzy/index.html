    html,body{height:100%;background:#07182a;}

    button{font:inherit;}
    #cv{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:0;touch-action:none;}
    .icon-btn{
      position:fixed;z-index:6;pointer-events:auto;width:40px;height:40px;border:1px solid rgba(150,190,230,.22);border-radius:12px;
      background:rgba(8,22,38,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      color:#cfe1f2;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s ease;
      right:calc(10px + env(safe-area-inset-right));bottom:calc(14px + env(safe-area-inset-bottom));
    }
    .icon-btn:active{transform:scale(.92);}
    .ki{width:22px;height:22px;fill:currentColor;display:block;}

    #hint{position:fixed;left:50%;top:54%;transform:translate(-50%,-50%);z-index:5;text-align:center;pointer-events:none;transition:opacity .3s ease;text-shadow:0 2px 10px rgba(0,0,0,.6);}
    #hint .big{font-size:21px;font-weight:900;color:#fff;}
    #hint .sm{margin-top:7px;font-size:14px;font-weight:700;color:var(--ink-soft);line-height:1.5;}

    #over{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(4,12,22,.62);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);opacity:0;pointer-events:none;transition:opacity .3s ease;}
    #over.show{opacity:1;pointer-events:auto;}
    .card{width:min(340px,90vw);border-radius:26px;background:linear-gradient(180deg,#15355a,var(--card));border:1px solid rgba(150,190,230,.16);padding:26px 22px 20px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.5);transform:translateY(14px) scale(.97);transition:transform .3s cubic-bezier(.2,1.1,.4,1);}
    #over.show .card{transform:none;}
    .badge{width:70px;height:70px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#ffd27a,var(--accent));color:#5a3608;box-shadow:0 6px 0 var(--accent-deep),0 12px 24px rgba(255,177,61,.3);}
    .badge .ki{width:42px;height:42px;}
    .card h2{font-size:25px;font-weight:900;letter-spacing:-.02em;}
    .card .sub{margin-top:6px;color:var(--ink-soft);font-size:14px;line-height:1.5;}
    .bigscore{margin:16px 0 2px;font-size:54px;font-weight:900;line-height:1;color:var(--accent);font-variant-numeric:tabular-nums;}
    .bigscore small{font-size:22px;color:var(--ink-soft);font-weight:800;margin-left:3px;}
    .rec{font-size:13px;font-weight:800;color:#7fe0a8;min-height:18px;margin-bottom:8px;}
    .passline{font-size:13.5px;color:var(--ink-soft);line-height:1.6;margin:6px 0 16px;padding:11px 12px;border-radius:14px;background:rgba(8,20,36,.5);border:1px solid rgba(150,190,230,.12);}
    .passline b{color:#fff;} .passline .nm{color:#ffd690;font-weight:800;}
    .primary{width:100%;height:52px;border:none;border-radius:16px;background:var(--accent);color:#3a2406;font-weight:900;font-size:17px;box-shadow:0 5px 0 var(--accent-deep),0 12px 22px rgba(255,177,61,.26);cursor:pointer;transition:transform .1s ease,box-shadow .1s ease;}
    .primary:active{transform:translateY(3px);box-shadow:0 2px 0 var(--accent-deep);}
    .mini{display:flex;justify-content:center;gap:18px;margin-top:15px;}
    .mini a,.mini button{border:none;background:none;color:var(--ink-soft);font-size:13px;font-weight:800;text-decoration:none;cursor:pointer;}
    .credit{position:fixed;left:0;right:0;bottom:calc(4px + env(safe-area-inset-bottom));z-index:4;text-align:center;font-size:10px;color:rgba(159,182,204,.45);pointer-events:none;}

    function loop(t){ raf=requestAnimationFrame(loop); var dt=last?Math.min((t-last)/1000,0.05):0.016; last=t; step(dt); draw(); }

    // 속도는 크기에 거의 무관(평탄). 플레이어는 +12% 우위 → 작은 먹이를 따라잡을 수 있다.
    function speedOf(f){ var s=Math.max(130,Math.min(228,176*Math.pow(START/f.size,0.10))); return f.isPlayer?s*1.22:s; }

    function step(dt){
      // 플레이어 조준
      if(started && !ended){
        var dirx, diry;
        if(keys['ArrowLeft']||keys['ArrowRight']||keys['ArrowUp']||keys['ArrowDown']){
          dirx=(keys['ArrowRight']?1:0)-(keys['ArrowLeft']?1:0); diry=(keys['ArrowDown']?1:0)-(keys['ArrowUp']?1:0);
        } else {
          dirx=(pointer.x-W/2); diry=(pointer.y-H/2);
        }
        var dl=Math.hypot(dirx,diry)||1;
        var sp=speedOf(player);
        var pull=Math.min(1,dl/90);
        player.vx += ((dirx/dl)*sp*pull - player.vx)*Math.min(1,dt*8);
        player.vy += ((diry/dl)*sp*pull - player.vy)*Math.min(1,dt*8);
      } else { player.vx*=0.9; player.vy*=0.9; }
      if(started && !ended && player.grace>0) player.grace=Math.max(0,player.grace-dt);

      // 물고기 업데이트
      for(var i=0;i<fishes.length;i++){ var f=fishes[i]; if(!f.alive)continue; if(!f.isPlayer && started && !ended) aiThink(f,dt); moveFish(f,dt); }

      // 먹기 판정
      if(started && !ended) resolveEats(dt);

      // 카메라 / 줌
      cam.x += (player.x-cam.x)*Math.min(1,dt*5);
      cam.y += (player.y-cam.y)*Math.min(1,dt*5);
      var tz=Math.max(0.42,Math.min(1.1, Math.pow(START/player.size,0.5)));
      zoom += (tz-zoom)*Math.min(1,dt*3);

      // 성장 추적 / 티어업 / 기록
      if(player.size>maxSize){ maxSize=player.size; }
      var nt=['fish','octopus','dolphin','whale','dragon'].indexOf(shapeFor(player.size));
      if(nt>tier){ tier=nt; floatTxt(player.x,player.y-player.size-18,tierName(player.size)+'로 진화!','#ffd27a',22); ring(player.x,player.y,'#ffd27a'); burst(player.x,player.y,'#ffd27a',16); sTier(); }

      // 위협 감지(가까운 더 큰 물고기) → 위험 비네트
      danger=Math.max(0,danger-dt*2);
      for(var j=0;j<fishes.length;j++){ var o=fishes[j]; if(o.alive&&!o.isPlayer&&o.size>player.size*1.12){ var d=Math.hypot(o.x-player.x,o.y-player.y); if(d<player.size+o.size+140) danger=Math.max(danger,1-(d/(player.size+o.size+140))); } }

      // 개체수 유지 — 항상 '먹잇감(새우)'을 충분히, 그리고 새 유저(작은 놈)가 끊임없이 입장
      var alive=0, fry=0;
      for(var a=0;a<fishes.length;a++){ var fa=fishes[a]; if(fa.alive){ alive++; if(!fa.isPlayer&&fa.size<Math.max(18,player.size*0.85)) fry++; } }
      if(fry<18 && Math.random()<dt*9){ spawnFry(); }        // 플레이어가 먹을 수 있는 작은 놈 보충(근처에)
      if(alive<46 && Math.random()<dt*5){ spawnEdge(); }     // 새 유저가 가장자리에서 계속 입장

      // 파티클 수명
      ageParts(dt);
      if(shake>0)shake=Math.max(0,shake-dt*55);
      if(rankFlash>0)rankFlash=Math.max(0,rankFlash-dt*2);

      // 죽은 fishes 정리(배열 비대화 방지)
      if(fishes.length>60){ fishes=fishes.filter(function(f){return f.alive;}); }
    }

    function moveFish(f,dt){
      f.x+=f.vx*dt; f.y+=f.vy*dt;
      // 경계 반사
      var m=f.size;
      if(f.x<m){f.x=m;f.vx=Math.abs(f.vx)*0.5;} if(f.x>WORLD-m){f.x=WORLD-m;f.vx=-Math.abs(f.vx)*0.5;}
      if(f.y<m){f.y=m;f.vy=Math.abs(f.vy)*0.5;} if(f.y>WORLD-m){f.y=WORLD-m;f.vy=-Math.abs(f.vy)*0.5;}
      if(Math.abs(f.vx)>6) f.face=f.vx<0?-1:1;
      var tt=Math.max(-.5,Math.min(.5,f.vy/(speedOf(f)+1)*0.8));
      f.tilt+=(tt-f.tilt)*Math.min(1,dt*6);
      if(f.sq>0)f.sq=Math.max(0,f.sq-dt*3);
    }

    function aiThink(f,dt){
      f.wob+=dt; f.retarget-=dt;
      // 가장 가까운 위협/먹이 탐색
      var threat=null,td=1e9, prey=null,pd=1e9;
      for(var i=0;i<fishes.length;i++){ var o=fishes[i]; if(o===f||!o.alive)continue;
        var d=Math.hypot(o.x-f.x,o.y-f.y); if(d>f.vision)continue;
        if(o.size>f.size*1.12){ if(d<td){td=d;threat=o;} }
        else if(f.size>o.size*1.12){ if(d<pd){pd=d;prey=o;} }
      }
      var sp=speedOf(f), dirx=0,diry=0;
      var wary = f.size>=16;   // 작은 피라미는 위협도 사냥도 모르고 그저 헤엄친다 = 쉬운 먹잇감
      if(wary && threat){ dirx=f.x-threat.x; diry=f.y-threat.y; sp*=0.82; }            // 도망(허둥지둥)
      else if(wary && prey && Math.random()<f.aggr+0.25){ dirx=prey.x-f.x; diry=prey.y-f.y; } // 사냥
      else {
        // 먹이 알갱이/배회
        var fp=null,fd=1e9; for(var p=0;p<pellets.length;p++){ var pe=pellets[p]; var d2=Math.hypot(pe.x-f.x,pe.y-f.y); if(d2<f.vision&&d2<fd){fd=d2;fp=pe;} }
        if(fp){ dirx=fp.x-f.x; diry=fp.y-f.y; }
        else { if(f.retarget<=0){ f.tx=f.x+(Math.random()-.5)*400; f.ty=f.y+(Math.random()-.5)*400; f.retarget=1+Math.random()*2; } dirx=f.tx-f.x; diry=f.ty-f.y; sp*=0.6; }
      }
      var dl=Math.hypot(dirx,diry)||1;
      // 약간의 흔들림(유기적)
      var jx=Math.cos(f.wob*1.7)*0.15, jy=Math.sin(f.wob*1.3)*0.15;
      f.vx += ((dirx/dl+jx)*sp - f.vx)*Math.min(1,dt*(3+f.aggr*3));
      f.vy += ((diry/dl+jy)*sp - f.vy)*Math.min(1,dt*(3+f.aggr*3));
    }

    function resolveEats(dt){
      // 알갱이
      for(var p=pellets.length-1;p>=0;p--){ var pe=pellets[p];
        for(var i=0;i<fishes.length;i++){ var f=fishes[i]; if(!f.alive)continue;
          if(Math.hypot(pe.x-f.x,pe.y-f.y)<f.size*0.95){ f.size=Math.sqrt(massOf(f.size)+34); f.sq=1; if(f.isPlayer){sPellet();} pellets.splice(p,1); pellets.push({x:Math.random()*WORLD,y:Math.random()*WORLD,c:COLORS[(Math.random()*COLORS.length)|0]}); break; }
        }
      }
      // 물고기끼리
      for(var a=0;a<fishes.length;a++){ var A=fishes[a]; if(!A.alive)continue;
        for(var b=0;b<fishes.length;b++){ var B=fishes[b]; if(A===B||!B.alive)continue;
          if(A.size>B.size*1.1){ var d=Math.hypot(A.x-B.x,A.y-B.y); if(d < A.size + B.size*0.4){ eat(A,B); } }
        }
      }
    }

    function eat(A,B){
      if(B.isPlayer && B.grace>0) return;   // 스폰 보호
      // AI 과성장 상한 — 안 그러면 거대 물고기만 남아 먹잇감이 사라진다
      if(!A.isPlayer && A.size>120){ B.alive=false; burst(B.x,B.y,B.col,8); return; }
      A.size=Math.sqrt(massOf(A.size)+massOf(B.size)*0.92); A.sq=1; A.eaten++;
      B.alive=false;
      burst(B.x,B.y,B.col,Math.min(20,8+B.size/4)); ring(B.x,B.y,B.isPlayer?'#ff7a6a':'#bfe9ff');
      if(A.isPlayer){
        kills++;
        floatTxt(B.x,B.y,'냠! '+B.name,'#bfe9ff',Math.min(26,15+B.size/6));
        shake=Math.min(12,4+B.size/8); if(navigator.vibrate)navigator.vibrate(B.size>player.size*0.7?22:10);
        sEat(B.size);
        var fk=Math.floor(kills);
        if(fk>best){ best=fk; setLS(KEY.best,best); if(!recordBeaten&&startBest>0){recordBeaten=true; floatTxt(player.x,player.y-player.size-40,'신기록!','#ffd27a',24); sRecord();} }
      } else if(B.isPlayer){
        gameOver(A);
      } else {
        if(A.size>40) floatTxt(B.x,B.y,B.name+' 잡아먹힘','rgba(255,255,255,.55)',13);
      }
    }

    function spawnFry(){
      // 플레이어가 잡아먹기 좋은 크기를, 화면 가장자리쯤(보이되 코앞은 아닌) 거리에 둔다
      var ang=Math.random()*6.28, dist=220+Math.random()*300;
      var x=Math.max(12,Math.min(WORLD-12,player.x+Math.cos(ang)*dist));
      var y=Math.max(12,Math.min(WORLD-12,player.y+Math.sin(ang)*dist));
      var sz=Math.max(8,Math.min(player.size*0.7, 9+Math.random()*9));
      fishes.push(makeFish(x,y,sz,false));
    }
    function spawnEdge(){
      var side=(Math.random()*4)|0, x,y;
      if(side===0){x=Math.random()*WORLD;y=10;} else if(side===1){x=Math.random()*WORLD;y=WORLD-10;}
      else if(side===2){x=10;y=Math.random()*WORLD;} else {x=WORLD-10;y=Math.random()*WORLD;}
      var r=Math.random();
      // 새 유저는 대부분 작게 입장(신규 유입 느낌), 가끔 중간/큰 놈
      var sz = r<0.78 ? 9+Math.random()*9 : (r<0.94 ? 20+Math.random()*18 : Math.max(20,player.size*(0.7+Math.random()*0.6)));
      fishes.push(makeFish(x,y,sz,false));
    }

    function ageParts(dt){
      for(var i=parts.length-1;i>=0;i--){ var p=parts[i];
        if(p.kind==='c'){ p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=Math.pow(0.2,dt);p.vy*=Math.pow(0.2,dt);p.life-=dt*1.4; }
        else if(p.kind==='r'){ p.r+=dt*240;p.life-=dt*2; }
        if(p.life<=0)parts.splice(i,1);
      }
      for(var j=floats.length-1;j>=0;j--){ var f=floats[j]; f.y-=dt*36*(1/zoom); f.life-=dt*1.0; if(f.life<=0)floats.splice(j,1); }
    }

    // ===== 렌더 =====
    function sx(wx){ return W/2 + (wx-cam.x)*zoom; }
    function sy(wy){ return H/2 + (wy-cam.y)*zoom; }
    function draw(){
      ctx.save();
      var shx=(Math.random()-.5)*shake, shy=(Math.random()-.5)*shake; ctx.translate(shx,shy);
      // 배경
      var g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0d2b4a'); g.addColorStop(1,'#07182a'); ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
      // 경계
      ctx.strokeStyle='rgba(150,190,230,.16)'; ctx.lineWidth=2; ctx.strokeRect(sx(0),sy(0),WORLD*zoom,WORLD*zoom);
      // 그리드 점
      ctx.fillStyle='rgba(150,190,230,.06)'; var gs=130;
      for(var gx=0;gx<=WORLD;gx+=gs){ for(var gy=0;gy<=WORLD;gy+=gs){ var px=sx(gx),py=sy(gy); if(px>-10&&px<W+10&&py>-10&&py<H+10){ ctx.beginPath();ctx.arc(px,py,1.5,0,6.28);ctx.fill(); } } }

      // 먹이 알갱이
      for(var p=0;p<pellets.length;p++){ var pe=pellets[p]; var px=sx(pe.x),py=sy(pe.y); if(px<-10||px>W+10||py<-10||py>H+10)continue;
        ctx.fillStyle=pe.c; ctx.globalAlpha=.22; ctx.beginPath();ctx.arc(px,py,6.5*zoom,0,6.28);ctx.fill();
        ctx.globalAlpha=.95; ctx.beginPath();ctx.arc(px,py,3.6*zoom,0,6.28);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.65)'; ctx.beginPath();ctx.arc(px-1.1*zoom,py-1.1*zoom,1.3*zoom,0,6.28);ctx.fill();
      }
      ctx.globalAlpha=1;

      // 물고기 (작은 것부터 그려 큰 게 위로)
      var sorted=fishes.filter(function(f){return f.alive;}).sort(function(a,b){return a.size-b.size;});
      for(var i=0;i<sorted.length;i++) drawFish(sorted[i]);

      // 파티클
      for(var q=0;q<parts.length;q++){ var pt=parts[q]; var X=sx(pt.x),Y=sy(pt.y);
        if(pt.kind==='c'){ ctx.globalAlpha=pt.life; ctx.fillStyle=pt.col; ctx.beginPath();ctx.arc(X,Y,pt.r*zoom,0,6.28);ctx.fill(); }
        else if(pt.kind==='r'){ ctx.globalAlpha=pt.life*0.6; ctx.strokeStyle=pt.col; ctx.lineWidth=3; ctx.beginPath();ctx.arc(X,Y,pt.r*zoom,0,6.28);ctx.stroke(); }
      }
      ctx.globalAlpha=1;

      // 플로팅 텍스트
      ctx.textAlign='center';
      for(var f2=0;f2<floats.length;f2++){ var fl=floats[f2]; ctx.globalAlpha=Math.min(1,fl.life*1.4); ctx.font='900 '+fl.sz+'px Pretendard Variable,sans-serif'; ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.5)'; var fx=sx(fl.x),fy=sy(fl.y); ctx.strokeText(fl.txt,fx,fy); ctx.fillStyle=fl.col; ctx.fillText(fl.txt,fx,fy); }
      ctx.globalAlpha=1; ctx.textAlign='left';

      ctx.restore();

      // 위험 비네트
      if(danger>0){ var rg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.7); rg.addColorStop(0,'rgba(255,40,30,0)'); rg.addColorStop(1,'rgba(255,30,20,'+(danger*0.4)+')'); ctx.fillStyle=rg; ctx.fillRect(0,0,W,H); }

      drawLeaderboard();
    }

    function drawFish(f){
      var X=sx(f.x),Y=sy(f.y), r=f.size*zoom;
      if(X< -r-20||X>W+r+20||Y<-r-20||Y>H+r+20) return;
      var shp=shapeFor(f.size); var spr=sprite(shp,f.col);
      var rad=r*(1.7); var pop=1+(f.sq||0)*0.16;
      ctx.save(); ctx.translate(X,Y); ctx.rotate(f.tilt*0.5); ctx.scale(f.face*pop,pop);
      if(f.isPlayer){ ctx.shadowColor='rgba(255,200,90,.75)'; ctx.shadowBlur=18; }
      else { ctx.shadowColor='rgba(0,0,0,.35)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3*zoom; }
      if(spr) ctx.drawImage(spr,-rad/2,-rad/2,rad,rad);
      else { ctx.fillStyle=f.col; ctx.beginPath();ctx.arc(0,0,r,0,6.28);ctx.fill(); }
      ctx.restore();
      // 이름표
      if(r>9){
        ctx.save(); ctx.globalAlpha=f.isPlayer?1:0.9; ctx.textAlign='center';
        ctx.font='800 '+Math.max(10,Math.min(15,r*0.34))+'px Pretendard Variable,sans-serif';
        var nm=f.name.length>7?f.name.slice(0,7):f.name; var ny=Y-r-6;
        var tw=ctx.measureText(nm).width;
        ctx.fillStyle=f.isPlayer?'rgba(255,177,61,.9)':'rgba(6,18,32,.45)'; rr(X-tw/2-6,ny-12,tw+12,16,8); ctx.fill();
        ctx.fillStyle=f.isPlayer?'#3a2406':'#dcebf7'; ctx.fillText(nm,X,ny);
        ctx.restore();
      }
    }
    function rr(x,y,w,h,r){ ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath(); }

    function drawLeaderboard(){
      var rank=fishes.filter(function(f){return f.alive;}).sort(function(a,b){return b.size-a.size;});
      var myRank=rank.indexOf(player)+1;
      var x=W-calcLbW(rank)-12, y=14+ (window.__safeTop||0);
      var rows=Math.min(5,rank.length);
      ctx.save();
      ctx.font='800 13px Pretendard Variable,sans-serif'; ctx.textAlign='left';
      ctx.fillStyle='rgba(8,22,38,.55)'; rr(x-10,y-6,calcLbW(rank)+10,rows*22+ (myRank>5?26:0) +14,12); ctx.fill();
      ctx.fillStyle='rgba(159,182,204,.8)'; ctx.font='800 11px Pretendard Variable,sans-serif'; ctx.fillText('순위',x,y+8);
      ctx.font='800 13px Pretendard Variable,sans-serif';
      for(var i=0;i<rows;i++){ var f=rank[i]; var ry=y+20+i*22;
        var me=f.isPlayer;
        ctx.fillStyle=me?'#ffd27a':'rgba(220,235,247,.9)';
        var nm=f.name.length>7?f.name.slice(0,7):f.name;
        ctx.fillText((i+1)+'. '+nm,x,ry+8);
        ctx.fillStyle=me?'rgba(255,210,122,.7)':'rgba(159,182,204,.6)'; ctx.textAlign='right';
        ctx.fillText(Math.round(massOf(f.size)/100)+'', W-16, ry+8); ctx.textAlign='left';
      }
      if(myRank>5){ var yy=y+20+5*22+4; ctx.fillStyle='#ffd27a'; ctx.fillText(myRank+'. 나',x,yy+8); ctx.textAlign='right'; ctx.fillStyle='rgba(255,210,122,.7)'; ctx.fillText(Math.round(massOf(player.size)/100)+'',W-16,yy+8); ctx.textAlign='left'; }
      ctx.restore();
    }
    function calcLbW(){ return 150; }

    // ===== 게임오버 =====
    function gameOver(killer){
      if(ended)return; ended=true;
      player.alive=false; shake=14;
      burst(player.x,player.y,'#ff7a6a',22); sDie(); if(navigator.vibrate)navigator.vibrate([40,40,80]);
      var rank=fishes.filter(function(f){return f.alive;}).concat([player]).sort(function(a,b){return b.size-a.size;});
      var fk=Math.floor(kills);
      var isRec= startBest>0 ? fk>startBest : fk>0;
      setTimeout(function(){
        document.getElementById('over-title').textContent= isRec?'신기록!':( killer&&killer.name?(killer.name+'에게 먹힘'):'잡아먹혔어요!');
        document.getElementById('over-sub').textContent= isRec?'이렇게 많이 잡아먹은 건 처음이에요. 최강 포식자!':(fk>0?'더 작은 놈만 노렸어야 했나… 큰 놈을 조심!':'먼저 작은 물고기부터 노려 몸집을 키워요.');
        document.getElementById('over-k').textContent=fk;
        document.getElementById('over-rec').textContent= isRec?('이전 최고 '+startBest+'마리 → '+fk+'마리'):('최고 기록 '+best+'마리');
        document.getElementById('over-pass').innerHTML='최고 몸집 <b>'+tierName(maxSize)+'</b> · 최종 순위 <b>'+(rank.indexOf(player)+1)+'위</b>';
        document.getElementById('over').classList.add('show');
      },600);
    }

    // ===== 버튼 =====
    function setMuteIc(){ document.querySelector('#mute .ki use').setAttribute('href',muted?'#p-speaker-slash':'#p-speaker-high'); }
    document.getElementById('mute').addEventListener('click',function(){ muted=!muted; setLS(KEY.muted,muted?'1':'0'); setMuteIc(); if(!muted)sPellet(); });
    document.getElementById('over-btn').addEventListener('click',function(){ startBest=best; reset(); });
    document.getElementById('support').addEventListener('click',function(){ if(window.GamePortal&&GamePortal.openSupport)GamePortal.openSupport(); });
    setMuteIc();

    // 스프라이트 워밍업 후 시작 (몇 종만 미리)
    ['fish','octopus','dolphin','whale','dragon'].forEach(function(s){ COLORS.forEach(function(c){sprite(s,c);}); sprite(s,'#ffd05b'); });
    reset();
    pointer.x=W/2; pointer.y=H/2;
    last=0; raf=requestAnimationFrame(loop);
  })();
  </script>
  <script>
    if('serviceWorker' in navigator && location.protocol === 'https:') navigator.serviceWorker.register('./sw.js');
  </script>
