<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#101014">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="2048">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta property="og:type" content="website">
<meta property="og:title" content="2048 — 조약돌에서 다이아몬드까지">
<meta property="og:description" content="같은 보석이 만나면 한 단계 진화! 조약돌을 합쳐 전설의 다이아몬드까지. 시간제한 없이 한 손으로 즐기는 보석 퍼즐.">
<title>2048</title>
<style>
  @font-face{font-family:"Pretendard Variable";font-weight:45 920;font-style:normal;font-display:swap;src:url("/fonts/PretendardVariable.woff2") format("woff2-variations");}
  :root{
    /* 다크 — 보석이 어둠 위에서 스스로 빛나 보이게(spec: 밝은 배경이면 저티어 돌이 죽는다) */
    --bg:#101014;
    --bg-soft:#15151c;
    --panel:#191920;       /* 보드 패널 */
    --well:#22232b;         /* 빈 칸 */
    --well-rim:#2c2d37;
    --well-inset:#101015;
    --ink:#e9ebf2;
    --ink-soft:#9298ac;
    --gold:#e7b24b;
    --card:#18181f;
    --card-border:#272730;
    --scrim:rgba(8,8,11,.62);
    --glass:rgba(255,255,255,.055);
    --glass-border:rgba(255,255,255,.10);
    --fs-1:clamp(34px,11vw,46px);
    --fs-2:16px;
    --fs-3:13px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);}
  body{
    font-family:"Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
    background-color:var(--bg);
    background-image:radial-gradient(125% 100% at 50% -8%, var(--bg-soft) 0%, var(--bg) 60%);
    color:var(--ink);
    user-select:none;-webkit-user-select:none;touch-action:none;
  }
  /* 공통 셸 헤더(홈/제목)를 밝은 글자로 — 다크 배경 대응.
     game-shell.css의 body[data-shell-mode]{--gp-shell-fg:#1b1b22}를 이기려면 같은 attribute 선택자 필요(specificity). */
  body[data-shell-mode]{--gp-shell-fg:#e9ebf2;}
  /* 공통 shell 헤더가 제목 표시 — 게임 자체 제목/워터마크 숨김 */
  .topbar h1{display:none;}
  .credit{display:none;}
  button{font-family:inherit;}
  /* 다크 배경에서 셸 홈버튼 가독 */
  .gp-shell-home{background:rgba(255,255,255,.07)!important;color:#e9ebf2!important;}
  .gp-shell-home:hover{background:rgba(255,255,255,.13)!important;}

  /* ── 상단 바 ── */
  .topbar{display:flex;align-items:center;gap:8px;z-index:2;width:100%;max-width:480px;flex:0 0 auto;}
  .pill{
    background:var(--glass);border:1px solid var(--glass-border);
    padding:6px 13px;border-radius:999px;font-size:var(--fs-3);
    display:flex;align-items:center;gap:6px;white-space:nowrap;color:var(--ink);line-height:1;
  }
  .pill .lbl{color:var(--ink-soft);font-size:var(--fs-3);letter-spacing:.3px;}
  .pill b{font-size:var(--fs-2);min-width:1ch;text-align:right;font-variant-numeric:tabular-nums;transition:transform .14s cubic-bezier(.2,1.5,.4,1);}
  #score-pill{margin-left:auto;}
  #best-pill b{color:var(--gold);}
  #best-pill.pulse{animation:best-pulse .42s cubic-bezier(.2,1.4,.4,1);}
  @keyframes best-pulse{0%{transform:scale(1);}45%{transform:scale(1.18);}100%{transform:scale(1);}}
  #best-pill .ul{display:inline-block;width:0;height:2px;background:var(--gold);border-radius:2px;margin-left:0;align-self:flex-end;transition:width .36s ease;}
  #best-pill.pulse .ul{width:14px;}
  .mute-btn{
    width:42px;height:42px;flex:0 0 auto;border-radius:13px;cursor:pointer;
    background:var(--glass);border:1px solid var(--glass-border);
    display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:transform .1s, color .15s;
  }
  .mute-btn:active{transform:scale(.93);}
  .ki{width:24px;height:24px;fill:currentColor;display:block;}

  /* ── 무대 ── */
  #stage{flex:1 1 auto;display:flex;align-items:center;justify-content:center;width:100%;max-width:480px;min-height:0;z-index:2;margin-top:8px;}
  #board{position:relative;width:min(92vw,420px);aspect-ratio:1/1;max-height:100%;touch-action:none;}
  #g{position:absolute;inset:0;width:100%;height:100%;display:block;}

  /* 첫 안내 (첫 입력 전) — 캔버스 위 DOM */
  #hint{
    position:absolute;left:0;right:0;bottom:-28px;text-align:center;z-index:3;pointer-events:none;
    color:var(--ink-soft);font-size:var(--fs-3);font-weight:700;opacity:.95;transition:opacity .3s;
  }
  #hint.hide{opacity:0;}

  /* ── 게임오버 오버레이 ── */
  #over{
    position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;
    background:var(--scrim);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
    opacity:0;pointer-events:none;transition:opacity .3s;padding:24px;
  }
  #over.show{opacity:1;pointer-events:auto;}
  .over-card{
    background:var(--card);border:1px solid var(--card-border);
    border-radius:26px;padding:26px 26px 22px;text-align:center;width:min(320px,86vw);
    box-shadow:0 24px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
    transform:scale(.84) translateY(8px);transition:transform .4s cubic-bezier(.2,1.4,.4,1);
  }
  #over.show .over-card{transform:scale(1) translateY(0);}
  #over-gem{width:84px;height:84px;margin:0 auto 6px;display:block;}
  .over-card .gem-name{font-size:var(--fs-3);font-weight:800;color:var(--ink-soft);letter-spacing:.3px;margin-bottom:10px;}
  .over-card h2{font-size:var(--fs-3);font-weight:700;color:var(--ink-soft);margin-bottom:2px;}
  .over-card .sc{font-size:var(--fs-1);font-weight:800;color:var(--ink);margin:2px 0 0;line-height:1;font-variant-numeric:tabular-nums;}
  .over-card .sc.rec{color:var(--gold);}
  .over-card .sc-lbl{font-size:var(--fs-3);color:var(--ink-soft);letter-spacing:.5px;margin-top:3px;}
  #over-sub{font-size:var(--fs-3);color:var(--ink-soft);margin-top:9px;line-height:1.5;}
  #over-record{
    display:none;font-size:var(--fs-3);color:#3a2a05;font-weight:800;
    background:linear-gradient(180deg,#f4cf78,#e7b24b);border-radius:999px;padding:5px 15px;margin-top:11px;
  }
  #over-record.show{display:inline-flex;align-items:center;gap:5px;animation:rec-pop .5s ease;}
  @keyframes rec-pop{0%{transform:scale(.5);}60%{transform:scale(1.12);}100%{transform:scale(1);}}
  #btn-again{
    margin-top:18px;width:100%;border:none;border-radius:16px;cursor:pointer;
    font-size:var(--fs-2);font-weight:800;color:#101014;padding:15px 0;
    background:linear-gradient(180deg,#f4cf78,#e7b24b);
    box-shadow:0 4px 0 #b98a2e, 0 7px 16px rgba(170,120,30,.35);
    transition:transform .1s;
  }
  #btn-again:active{transform:translateY(2px);box-shadow:0 2px 0 #b98a2e;}
  .over-actions{display:flex;gap:8px;margin-top:9px;}
  .over-actions button{
    flex:1 1 0;border:1px solid var(--card-border);background:transparent;color:var(--ink-soft);
    border-radius:13px;padding:11px 0;font-size:var(--fs-3);font-weight:700;cursor:pointer;transition:transform .1s, background .15s;
  }
  .over-actions button:active{transform:scale(.97);}
  .over-actions button:hover{background:rgba(255,255,255,.04);}
</style>
</head>
<body>
  <!-- Phosphor Fill 스피커 아이콘 (인라인) -->
  <svg style="display:none" aria-hidden="true">
    <symbol id="p-speaker-high" viewBox="0 0 256 256"><path d="M160,32.25V223.69a8.29,8.29,0,0,1-3.91,7.18,8,8,0,0,1-9-.56l-65.57-51A4,4,0,0,1,80,176.16V79.84a4,4,0,0,1,1.55-3.15l65.57-51a8,8,0,0,1,10,.16A8.27,8.27,0,0,1,160,32.25ZM60,80H32A16,16,0,0,0,16,96v64a16,16,0,0,0,16,16H60a4,4,0,0,0,4-4V84A4,4,0,0,0,60,80Zm126.77,20.84a8,8,0,0,0-.72,11.3,24,24,0,0,1,0,31.72,8,8,0,1,0,12,10.58,40,40,0,0,0,0-52.88A8,8,0,0,0,186.74,100.84Zm40.89-26.17a8,8,0,1,0-11.92,10.66,64,64,0,0,1,0,85.34,8,8,0,1,0,11.92,10.66,80,80,0,0,0,0-106.66Z"/></symbol>
    <symbol id="p-speaker-slash" viewBox="0 0 256 256"><path d="M213.92,210.62a8,8,0,1,1-11.84,10.76L160,175.09v48.6a8.29,8.29,0,0,1-3.91,7.18,8,8,0,0,1-9-.56l-65.55-51A4,4,0,0,1,80,176.18V87.09L42.08,45.38A8,8,0,1,1,53.92,34.62Zm-27.21-55.46a8,8,0,0,0,11.29-.7,40,40,0,0,0,0-52.88,8,8,0,1,0-12,10.57,24,24,0,0,1,0,31.72A8,8,0,0,0,186.71,155.16Zm40.92-80.49a8,8,0,1,0-11.92,10.66,64,64,0,0,1,0,85.34,8,8,0,1,0,11.92,10.66,80,80,0,0,0,0-106.66ZM153,119.87a4,4,0,0,0,7-2.7V32.25a8.27,8.27,0,0,0-2.88-6.4,8,8,0,0,0-10-.16L103.83,59.33a4,4,0,0,0-.5,5.85Z"/></symbol>
  </svg>

  <div class="topbar">
    <h1>2048</h1>
    <div class="pill" id="score-pill"><span class="lbl">점</span><b id="score">0</b></div>
    <div class="pill" id="best-pill"><span class="lbl">최고</span><b id="best">0</b><span class="ul"></span></div>
    <button class="mute-btn" id="mute" aria-label="소리 켜기/끄기">
      <svg class="ki"><use id="mute-use" href="#p-speaker-high"/></svg>
    </button>
  </div>

  <div id="stage">
    <div id="board">
      <canvas id="g"></canvas>
      <div id="hint">한 방향으로 쓱 — 같은 보석이 만나면 한 단계 진화</div>
    </div>
  </div>

  <div id="over" role="dialog" aria-modal="true" aria-label="게임 결과">
    <div class="over-card">
      <canvas id="over-gem" width="168" height="168"></canvas>
      <div class="gem-name" id="over-gem-name">조약돌</div>
      <h2>더 움직일 수 없어요</h2>
      <div class="sc" id="over-score">0</div>
      <div class="sc-lbl">점</div>
      <span id="over-record">신기록!</span>
      <div id="over-sub">최고 0점</div>
      <button id="btn-again">다시 하기</button>
      <div class="over-actions">
        <button id="btn-support">의견 · 후원하기</button>
      </div>
    </div>
  </div>

<script src="core.js"></script>
<script src="game.js"></script>
<script>
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
