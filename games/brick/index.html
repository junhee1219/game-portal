<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#d8ecff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="벽돌 깨기">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>벽돌 깨기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Gowun+Dodum&display=swap');
  :root{
    --base:#e3f1ff; --deep:#cfe6fb; --vig:#bfdcf6;
    --ink:#39344e; --ink-soft:#736c8c;
    --glass:rgba(255,255,255,0.62);
    --glass-border:rgba(70,60,105,0.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  /* 안전영역: html·body 둘 다 파스텔 배경 → 설치형에서 하단 흰 영역 방지 */
  html{height:100%;background:var(--deep);}
  body{
    font-family:'Gowun Dodum',sans-serif;
    min-height:100vh;min-height:100dvh;width:100vw;overflow:hidden;
    background:radial-gradient(130% 100% at 50% 0%, var(--base) 0%, var(--deep) 55%, var(--vig) 100%);
    color:var(--ink);display:flex;flex-direction:column;align-items:center;
    padding:calc(8px + env(safe-area-inset-top)) calc(10px + env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) calc(10px + env(safe-area-inset-left));
    position:relative;
    user-select:none;-webkit-user-select:none;touch-action:none;
    overscroll-behavior:none;
  }
  .topbar{display:flex;align-items:center;gap:8px;z-index:2;width:100%;max-width:560px;flex:0 0 auto;}
  h1{
    font-family:'Fredoka',sans-serif;font-weight:600;font-size:20px;letter-spacing:-.3px;
    color:var(--ink);margin-right:auto;white-space:nowrap;display:flex;align-items:center;gap:8px;
  }
  h1 .logo{display:inline-flex;gap:3px;align-items:center;}
  h1 .logo i{display:block;width:11px;height:7px;border-radius:2px;}
  .pill{background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(10px);padding:6px 12px;border-radius:999px;font-size:13px;font-family:'Fredoka',sans-serif;display:flex;align-items:center;gap:6px;white-space:nowrap;color:var(--ink);}
  .pill b{font-weight:600;}
  #lives{display:flex;gap:3px;align-items:center;}
  #lives .ki{width:15px;height:15px;fill:#ff7a93;}
  #lives .ki.gone{fill:rgba(120,108,140,.25);}
  .mute-btn{
    cursor:pointer;color:var(--ink);background:var(--glass);border:1px solid var(--glass-border);
    backdrop-filter:blur(10px);min-height:42px;width:48px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;transition:transform .12s;
  }
  .mute-btn:active{transform:scale(.93);}
  .ki{width:21px;height:21px;fill:currentColor;}

  #wrap{flex:1 1 auto;display:flex;align-items:center;justify-content:center;width:100%;min-height:0;margin-top:8px;z-index:1;}
  #stage{
    position:relative;border-radius:20px;overflow:hidden;
    background:linear-gradient(180deg,#f3f8ff,#e6f1fc);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9), 0 10px 26px rgba(70,60,105,.16);
    border:1px solid var(--glass-border);
  }
  #game{display:block;border-radius:20px;}

  /* 오버레이 (시작 / 게임오버 / 스테이지) */
  #overlay{
    position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;
    background:rgba(245,250,255,.72);backdrop-filter:blur(4px);
    transition:opacity .25s;
  }
  #overlay.hidden{opacity:0;pointer-events:none;}
  .card{
    background:#fff;border:1px solid var(--glass-border);border-radius:24px;
    padding:26px 28px 22px;text-align:center;width:min(300px,82%);
    box-shadow:0 20px 50px rgba(50,40,80,.24), inset 0 1px 0 rgba(255,255,255,.9);
  }
  .card h2{font-family:'Fredoka',sans-serif;font-size:24px;color:var(--ink);margin-bottom:6px;}
  .card p{font-size:14px;color:var(--ink-soft);line-height:1.6;margin-bottom:4px;}
  .card .big{font-family:'Fredoka',sans-serif;font-size:30px;color:#5b8def;font-weight:600;}
  #rec{display:none;font-family:'Fredoka',sans-serif;font-size:13px;color:#7a4d10;font-weight:700;
    background:linear-gradient(135deg,#ffe27a,#ffb45e);border-radius:999px;padding:3px 12px;margin:8px 0 2px;}
  #rec.show{display:inline-flex;align-items:center;gap:5px;}
  #rec .ki{width:14px;height:14px;fill:#7a4d10;}
  .btn{
    margin-top:16px;font-family:'Fredoka',sans-serif;font-size:16px;font-weight:600;
    padding:13px 30px;border:none;border-radius:999px;cursor:pointer;color:#fff;
    background:linear-gradient(135deg,#7c5bef,#1aa6ff);
    box-shadow:0 6px 16px rgba(60,80,220,.34);transition:transform .12s;
  }
  .btn:active{transform:scale(.95);}
  .hint{margin-top:12px;font-size:12px;color:var(--ink-soft);}
  .legend{display:flex;flex-wrap:wrap;gap:8px 12px;justify-content:center;margin:14px 0 2px;font-size:11.5px;color:var(--ink-soft);}
  .legend span{display:flex;align-items:center;gap:5px;}
  .legend i{width:16px;height:10px;border-radius:3px;display:block;}

  #toast{
    position:fixed;left:50%;bottom:calc(26px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:rgba(255,255,255,.94);color:var(--ink);border:1px solid var(--glass-border);backdrop-filter:blur(12px);
    box-shadow:0 6px 20px rgba(70,60,105,.2);padding:10px 18px;border-radius:999px;font-size:13.5px;z-index:60;
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .credit{margin-top:10px;font-size:10px;color:var(--ink-soft);opacity:.7;z-index:2;text-align:center;}
</style>
</head>
<body>
  <!-- 스피커 아이콘 심볼 (vase sprite.svg에서 복사, 인라인) -->

    <symbol id="p-heart" viewBox="0 0 256 256"><path d="M240,102c0,70-103.79,126.66-108.21,129a8,8,0,0,1-7.58,0C119.79,228.66,16,172,16,102A62.07,62.07,0,0,1,78,40c20.65,0,38.73,8.88,50,23.89C139.27,48.88,157.35,40,178,40A62.07,62.07,0,0,1,240,102Z"/></symbol>
    <symbol id="p-trophy" viewBox="0 0 256 256"><path d="M232,64H208V48a8,8,0,0,0-8-8H56a8,8,0,0,0-8,8V64H24A16,16,0,0,0,8,80V96a40,40,0,0,0,40,40h3.65A80.13,80.13,0,0,0,120,191.61V216H96a8,8,0,0,0,0,16h64a8,8,0,0,0,0-16H136V191.58c31.94-3.23,58.44-25.64,68.08-55.58H208a40,40,0,0,0,40-40V80A16,16,0,0,0,232,64ZM48,120A24,24,0,0,1,24,96V80H48v32q0,4,.39,8ZM232,96a24,24,0,0,1-24,24h-.5a81.81,81.81,0,0,0,.5-8.9V80h24Z"/></symbol>
  </svg>

  <div class="topbar">
    <h1>
      <span class="logo"><i style="background:#ff8aa6"></i><i style="background:#8ad1ff"></i><i style="background:#ffd27a"></i></span>
      벽돌 깨기
    </h1>
    <div class="pill">점수 <b id="score">0</b></div>
    <div class="pill"><span id="lives"></span></div>
    <button class="mute-btn" id="mute" aria-label="소리 켜기/끄기">
      <svg class="ki"><use href="#p-speaker-high" id="mute-use"/></svg>
    </button>
  </div>

  <div id="wrap">
    <div id="stage">
      <canvas id="game"></canvas>
      <div id="overlay">
        <div class="card" id="card">
          <!-- 동적으로 채움 -->
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

<script src="game.js"></script>
</body>
</html>
