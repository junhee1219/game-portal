<!DOCTYPE html><html><head><meta charset="utf-8"><style>html,body{margin:0;background:#fff;}</style></head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
const cv=document.getElementById('c'), x=cv.getContext('2d');
function rr(ctx,X,Y,W,H,R){R=Math.min(R,W/2,H/2);ctx.beginPath();ctx.moveTo(X+R,Y);ctx.arcTo(X+W,Y,X+W,Y+H,R);ctx.arcTo(X+W,Y+H,X,Y+H,R);ctx.arcTo(X,Y+H,X,Y,R);ctx.arcTo(X,Y,X+W,Y,R);ctx.closePath();}
// 크림 배경 (명도폭 좁게), 마스커블 안전영역 고려 라운드 사각
const g=x.createLinearGradient(0,0,0,512);
g.addColorStop(0,'#faf5e7'); g.addColorStop(1,'#ece1c6');
rr(x,0,0,512,512,112); x.fillStyle=g; x.fill();
// 포인티탑 육각형
function hexPath(cx,cy,s){
  x.beginPath();
  for(let k=0;k<6;k++){
    const a=Math.PI/180*(60*k-90);
    const px=cx+s*Math.cos(a), py=cy+s*Math.sin(a);
    k?x.lineTo(px,py):x.moveTo(px,py);
  }
  x.closePath();
}
function hex(cx,cy,s,open){
  hexPath(cx,cy,s);
  if(open){ x.fillStyle='#fdf9ed'; x.fill(); }
  else{
    const lg=x.createLinearGradient(0,cy-s,0,cy+s);
    lg.addColorStop(0,'#f0bd55'); lg.addColorStop(1,'#dd9f2c');
    x.fillStyle=lg; x.fill();
  }
  // 크리스프 윗 림 + 하단 음영 (단일 빛 표현)
  x.save(); hexPath(cx,cy,s); x.clip();
  const sh=x.createLinearGradient(0,cy-s,0,cy+s);
  sh.addColorStop(0,'rgba(255,255,255,.40)'); sh.addColorStop(.3,'rgba(255,255,255,0)');
  sh.addColorStop(.85,'rgba(122,80,12,0)'); sh.addColorStop(1,'rgba(122,80,12,.26)');
  x.fillStyle=sh; x.fillRect(cx-s,cy-s,s*2,s*2);
  x.restore();
}
// 벌집 클러스터: 중앙(열린 칸) + 6
const C=256, S=88, W=Math.sqrt(3)*S*1.04, V=1.5*S*1.04;
const ring=[[0,-1],[1,-1],[1,0],[0,1],[-1,1],[-1,0]]; // axial
ring.forEach(([q,r])=>hex(C+W*(q+r/2),C+V*r,S,false));
hex(C,C,S,true);
// 숫자 칸 하나 (지뢰찾기 정체성)
x.fillStyle='#4f8fd0'; x.textAlign='center'; x.textBaseline='middle';
x.font='900 76px "Pretendard Variable",-apple-system,sans-serif';
x.fillText('1', C+W/2, C-V+6);
