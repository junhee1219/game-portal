  <style>
    @font-face{font-family:"Pretendard Variable";font-weight:45 920;font-style:normal;font-display:swap;src:url("/fonts/PretendardVariable.woff2") format("woff2-variations");}
    :root{
      --bg-a:#f6f5e9;--bg-b:#eef2e7;--bg-c:#dfe9e0;--ink:#2e352d;--ink-soft:#75806f;
      --board:#cfdccf;--cell:#e6eee4;--line:rgba(61,82,58,.14);--off:#8a9a94;--off-deep:#687a73;
      --on:#ffd56a;--on-deep:#e4a93a;--on-hot:#fff5b6;--accent:#4d9f74;--accent-deep:#34795a;
      --shadow:rgba(54,74,52,.22);--fs-1:clamp(32px,10vw,44px);--fs-2:16px;--fs-3:13px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--bg-b);}
    body{font-family:"Pretendard Variable",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;background-color:var(--bg-b);background-image:radial-gradient(130% 100% at 50% 0%,var(--bg-a) 0%,var(--bg-b) 56%,var(--bg-c) 100%);color:var(--ink);user-select:none;-webkit-user-select:none;touch-action:manipulation;}
    button{font:inherit;}
    .topbar{display:flex;align-items:center;gap:8px;width:100%;max-width:500px;flex:0 0 auto;z-index:2;}
    .pill{display:flex;align-items:center;gap:6px;white-space:nowrap;border:1px solid var(--line);background:rgba(255,255,255,.68);border-radius:999px;padding:7px 12px;box-shadow:0 2px 0 rgba(70,90,64,.10);color:var(--ink-soft);font-size:var(--fs-3);font-weight:750;}
    .pill b{color:var(--ink);font-size:var(--fs-2);}
    .sp{margin-left:auto;}
    .icon-btn{width:42px;height:42px;border:1px solid var(--line);border-radius:13px;background:linear-gradient(180deg,#fff,#edf3eb);color:#566954;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 rgba(70,90,64,.15);cursor:pointer;transition:transform .1s ease,box-shadow .1s ease;}
    .icon-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(70,90,64,.15);}
    .ki{width:23px;height:23px;fill:currentColor;display:block;}
    #stage{flex:1 1 auto;width:100%;max-width:500px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:0;}
    #board{position:relative;width:min(92vw,430px);aspect-ratio:1;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:7px;padding:9px;border-radius:24px;background:var(--board);box-shadow:inset 0 2px 7px rgba(61,82,58,.20),0 8px 0 #b9c8b8,0 18px 34px var(--shadow);touch-action:manipulation;overflow:hidden;}
    #board.shake{animation:shake .28s ease;}@keyframes shake{0%,100%{transform:translate(0,0);}25%{transform:translate(-3px,1px);}50%{transform:translate(3px,-1px);}75%{transform:translate(-2px,-1px);}}
    .lamp{position:relative;border:none;border-radius:15px;background:linear-gradient(180deg,#f5faf1,var(--cell));box-shadow:inset 0 1px 0 rgba(255,255,255,.72),inset 0 -2px 0 rgba(61,82,58,.08);cursor:pointer;overflow:hidden;color:var(--off);transition:transform .1s ease,filter .16s ease;}
    .lamp:active{transform:scale(.96);}
    .lamp::before{content:"";position:absolute;left:50%;top:45%;width:38%;height:38%;transform:translate(-50%,-50%);border-radius:50% 50% 46% 46%;background:linear-gradient(180deg,#a5b4ae,var(--off));box-shadow:inset 0 2px 0 rgba(255,255,255,.30),0 3px 0 var(--off-deep);transition:background .18s ease,box-shadow .18s ease,transform .18s cubic-bezier(.2,1.4,.35,1);}
    .lamp::after{content:"";position:absolute;left:50%;top:70%;width:30%;height:12%;transform:translateX(-50%);border-radius:6px;background:#64776e;box-shadow:0 2px 0 rgba(46,53,45,.18);transition:background .18s ease;}
    .lamp.on::before{background:radial-gradient(circle at 36% 28%,var(--on-hot),var(--on) 44%,var(--on-deep) 100%);box-shadow:0 0 0 7px rgba(255,213,106,.18),0 0 24px rgba(255,213,106,.58),inset 0 2px 0 rgba(255,255,255,.65),0 3px 0 #c9852c;transform:translate(-50%,-50%) scale(1.05);}
    .lamp.on::after{background:#8b6a30;}
    .lamp.pulse{animation:pulse .28s ease;}@keyframes pulse{0%{filter:brightness(1);}45%{filter:brightness(1.32);transform:scale(1.06);}100%{filter:brightness(1);transform:scale(1);}}
    .spark{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--on-hot);pointer-events:none;z-index:3;box-shadow:0 0 12px var(--on);animation:spark .46s ease forwards;}@keyframes spark{to{transform:translate(var(--dx),var(--dy)) scale(.15);opacity:0;}}
    .ring{position:absolute;border:3px solid rgba(255,213,106,.7);border-radius:50%;pointer-events:none;z-index:2;transform:translate(-50%,-50%) scale(.2);animation:ring .42s ease-out forwards;}@keyframes ring{to{transform:translate(-50%,-50%) scale(1.4);opacity:0;}}
    .float{position:absolute;z-index:4;pointer-events:none;color:#7a5c15;font-weight:900;font-size:13px;text-shadow:0 1px 0 rgba(255,255,255,.7);animation:float .7s ease forwards;}@keyframes float{to{transform:translateY(-30px);opacity:0;}}
    .actionbar{width:min(92vw,430px);display:grid;grid-template-columns:1fr auto;gap:8px;}
    .primary{height:52px;border:none;border-radius:16px;background:var(--accent);color:#fff;font-weight:900;font-size:var(--fs-2);box-shadow:0 4px 0 var(--accent-deep),0 10px 20px rgba(77,159,116,.24);cursor:pointer;transition:transform .1s ease,box-shadow .1s ease;}
    .primary:active{transform:translateY(3px);box-shadow:0 1px 0 var(--accent-deep);}
    .ghost{min-width:86px;height:52px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.68);color:var(--ink);font-weight:850;box-shadow:0 3px 0 rgba(70,90,64,.12);cursor:pointer;}
    #note{min-height:19px;color:var(--ink-soft);font-size:var(--fs-3);font-weight:750;text-align:center;padding:0 12px;}
    #clear{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(32,42,30,.48);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .25s ease;}
    #clear.show{opacity:1;pointer-events:auto;}
    .card{width:min(330px,88vw);border-radius:24px;background:#fff;color:var(--ink);padding:26px 22px 20px;text-align:center;box-shadow:0 24px 60px rgba(20,30,18,.34);transform:translateY(12px);transition:transform .25s ease;}
    #clear.show .card{transform:none;}
    .badge{width:66px;height:66px;border-radius:20px;margin:0 auto 12px;background:linear-gradient(180deg,#fff4ba,#ffd56a);display:flex;align-items:center;justify-content:center;box-shadow:0 5px 0 #d49c35,0 0 28px rgba(255,213,106,.55);}
    .badge svg{width:40px;height:40px;fill:#815f17;}
    .card h2{font-size:24px;font-weight:950;}
    .card .sub{margin-top:6px;color:var(--ink-soft);font-size:14px;line-height:1.45;}
    .stars{display:flex;justify-content:center;gap:7px;margin:16px 0 8px;}
    .stars svg{width:34px;height:34px;fill:#e4e9df;}
    .stars svg.on{fill:#f2b94f;}
    .result{font-size:14px;color:var(--ink-soft);margin-bottom:16px;}
    .result b{color:var(--ink);}
    .card .primary{width:100%;height:50px;}
    .card .secondary{width:100%;height:48px;margin-top:9px;border:none;border-radius:14px;background:#edf3eb;color:var(--ink);font-weight:850;cursor:pointer;}
    .mini{display:flex;justify-content:center;gap:16px;margin-top:15px;}
    .mini a,.mini button{border:none;background:none;color:var(--ink-soft);font-size:13px;font-weight:850;text-decoration:none;cursor:pointer;}
    .credit{flex:0 0 auto;font-size:10px;color:var(--ink-soft);opacity:.55;padding-top:2px;}
  </style>

  <div class="topbar">

    <div id="board" aria-label="전등 퍼즐판"></div>

      <div class="badge"><svg viewBox="0 0 256 256"><use href="#p-lightbulb"/></svg></div>

  <script>
  (function(){
    var N=5, KEY={best:'lampBest',level:'lampLevel',stars:'lampStars',muted:'lampMuted'};
    var board=document.getElementById('board'), clear=document.getElementById('clear');
    var levelEl=document.getElementById('level'), bestEl=document.getElementById('best'), movesEl=document.getElementById('moves'), parEl=document.getElementById('par'), note=document.getElementById('note');
    var cells=[], state=[], startState=[], solution=[], levelIdx=0, best=0, starMap={}, moves=0, muted=false, completed=false;
    function gi(k){try{return parseInt(localStorage.getItem(k)||'0',10)||0;}catch(e){return 0;}}
    function gj(k){try{return JSON.parse(localStorage.getItem(k)||'{}')||{};}catch(e){return {};}}
    function set(k,v){try{localStorage.setItem(k,String(v));}catch(e){}}
    function setJson(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
    best=gi(KEY.best); levelIdx=Math.max(0,gi(KEY.level)); starMap=gj(KEY.stars); try{muted=localStorage.getItem(KEY.muted)==='1';}catch(e){}
    var ac=null;
    function ctx(){if(!ac){try{ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return ac;}
    function tone(f,t,d,type,vol){if(muted)return;var c=ctx();if(!c)return;var o=c.createOscillator(),g=c.createGain();o.type=type||'sine';o.frequency.value=f;o.connect(g);g.connect(c.destination);var x=c.currentTime+(t||0);g.gain.setValueAtTime(.0001,x);g.gain.exponentialRampToValueAtTime(vol||.13,x+.01);g.gain.exponentialRampToValueAtTime(.0001,x+(d||.12));o.start(x);o.stop(x+(d||.12)+.03);}
    function sTap(on){tone(on?520:260,0,.07,'triangle',.10);tone(on?780:190,.045,.06,'sine',.07);}
    function sBad(){tone(130,0,.15,'sawtooth',.10);}
    function sClear(){[523,659,784,1047].forEach(function(f,i){tone(f,i*.08,.14,'triangle',.16);});}
    function sRecord(){[784,988,1319].forEach(function(f,i){tone(f,.42+i*.08,.13,'sine',.14);});}
    function rng(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
    function idx(r,c){return r*N+c;}
    function toggleAt(arr,i){var r=Math.floor(i/N),c=i%N;[[r,c],[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(function(p){if(p[0]>=0&&p[0]<N&&p[1]>=0&&p[1]<N){var k=idx(p[0],p[1]);arr[k]=!arr[k];}});}
    function makeLevel(lv){var r=rng(4100+lv*97),count=Math.min(6+Math.floor(lv/2),13),chosen={},sol=[];while(sol.length<count){var k=Math.floor(r()*25);if(!chosen[k]){chosen[k]=1;sol.push(k);}}var arr=Array(25).fill(true);sol.forEach(function(k){toggleAt(arr,k);});return{state:arr,solution:sol};}
    function build(lv){completed=false;clear.classList.remove('show');moves=0;var made=makeLevel(lv);state=made.state.slice();startState=made.state.slice();solution=made.solution.slice();render();updateHud();note.textContent='천천히 눌러 모든 전등을 켜세요';}
    function render(){board.innerHTML='';cells=[];for(var i=0;i<25;i++){var b=document.createElement('button');b.className='lamp'+(state[i]?' on':'');b.dataset.i=i;b.setAttribute('aria-label','전등');b.addEventListener('click',tapLamp);board.appendChild(b);cells.push(b);}}
    function updateHud(){levelEl.textContent=String(levelIdx+1);bestEl.textContent=String(best);movesEl.textContent=String(moves);parEl.textContent='/'+solution.length;document.getElementById('mute-ic').innerHTML='<use href="'+(muted?'#p-speaker-slash':'#p-speaker-high')+'"/>';}
    function centerOf(i){var br=board.getBoundingClientRect(),cr=cells[i].getBoundingClientRect();return{x:cr.left-br.left+cr.width/2,y:cr.top-br.top+cr.height/2,w:cr.width};}
    function fx(i,on){var p=centerOf(i),ring=document.createElement('i');ring.className='ring';ring.style.left=p.x+'px';ring.style.top=p.y+'px';ring.style.width=p.w+'px';ring.style.height=p.w+'px';board.appendChild(ring);setTimeout(function(){ring.remove();},460);for(var n=0;n<6;n++){var s=document.createElement('i');s.className='spark';s.style.left=(p.x-4)+'px';s.style.top=(p.y-4)+'px';var a=(Math.PI*2/6)*n,d=p.w*(on?.45:.28);s.style.setProperty('--dx',Math.cos(a)*d+'px');s.style.setProperty('--dy',Math.sin(a)*d+'px');board.appendChild(s);setTimeout(function(el){return function(){el.remove();};}(s),500);}var f=document.createElement('b');f.className='float';f.textContent=on?'+빛':'전환';f.style.left=(p.x-14)+'px';f.style.top=(p.y-8)+'px';board.appendChild(f);setTimeout(function(){f.remove();},760);}
    function refreshCell(i){cells[i].className='lamp'+(state[i]?' on':'');cells[i].classList.remove('pulse');void cells[i].offsetWidth;cells[i].classList.add('pulse');}
    function tapLamp(e){if(completed)return;var i=+e.currentTarget.dataset.i,before=state[i];toggleAt(state,i);moves++;updateHud();var r=Math.floor(i/N),c=i%N;[[r,c],[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(function(p){if(p[0]>=0&&p[0]<N&&p[1]>=0&&p[1]<N)refreshCell(idx(p[0],p[1]));});fx(i,!before);sTap(!before);if(allOn())finish();else note.textContent=darkCount()+'개의 전등이 아직 쉬고 있어요';}
    function allOn(){return state.every(Boolean);}
    function darkCount(){return state.filter(function(v){return !v;}).length;}
    function stars(){return moves<=solution.length?3:(moves<=solution.length+3?2:1);}
    function finish(){completed=true;sClear();var cleared=levelIdx+1,old=best,st=stars();best=Math.max(best,cleared);starMap[String(cleared)]=Math.max(starMap[String(cleared)]||0,st);set(KEY.best,best);set(KEY.level,Math.min(levelIdx+1,999));setJson(KEY.stars,starMap);if(best>old)sRecord();document.getElementById('stars').innerHTML=[1,2,3].map(function(n){return '<svg class="'+(n<=st?'on':'')+'" viewBox="0 0 256 256"><use href="#p-star"/></svg>';}).join('');document.getElementById('clear-sub').textContent=best>old?'신기록! 더 밝은 공방까지 열었어요.':'전등이 모두 켜졌습니다.';document.getElementById('clear-moves').textContent=String(moves);document.getElementById('clear-par').textContent=String(solution.length);clear.classList.add('show');updateHud();}
    document.getElementById('check').addEventListener('click',function(){if(allOn())finish();else{board.classList.remove('shake');void board.offsetWidth;board.classList.add('shake');sBad();note.textContent=darkCount()+'개가 어두워요. 시간은 충분합니다.';}});
    document.getElementById('hint').addEventListener('click',function(){if(completed)return;var target=solution.find(function(k){return state[k]===startState[k];});if(target==null)target=solution[0];cells[target].classList.remove('pulse');void cells[target].offsetWidth;cells[target].classList.add('pulse');note.textContent='반짝인 주변을 한번 의심해보세요';});
    document.getElementById('reset').addEventListener('click',function(){build(levelIdx);});
    document.getElementById('mute').addEventListener('click',function(){muted=!muted;set(KEY.muted,muted?'1':'0');updateHud();if(!muted)sTap(true);});
    document.getElementById('next').addEventListener('click',function(){levelIdx++;build(levelIdx);});
    document.getElementById('again').addEventListener('click',function(){build(levelIdx);});
    document.getElementById('support').addEventListener('click',function(){if(window.GamePortal&&GamePortal.openSupport)GamePortal.openSupport();});
    build(levelIdx);
  })();
  </script>
  <script>if('serviceWorker' in navigator&&location.protocol==='https:')navigator.serviceWorker.register('./sw.js');</script>
