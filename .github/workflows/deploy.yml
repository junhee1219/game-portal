name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# 배포 중복 방지 — 연속 push 시 이전 배포가 끝난 뒤 다음 배포 실행
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 서버 restart.sh 실행
        env:
          SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          SSH_HOST: ${{ secrets.ORACLE_HOST }}
          SSH_USER: ${{ secrets.ORACLE_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "cd ~/game-portal && ./restart.sh"
