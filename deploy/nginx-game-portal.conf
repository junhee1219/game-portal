# 도메인 연결 시 사용할 nginx server block 템플릿
# 1. YOUR_DOMAIN을 실제 도메인으로 치환
# 2. sudo cp deploy/nginx-game-portal.conf /etc/nginx/sites-available/game-portal
# 3. sudo ln -s /etc/nginx/sites-available/game-portal /etc/nginx/sites-enabled/
# 4. sudo nginx -t && sudo systemctl reload nginx   (nginx -t 필수!)
# 5. sudo certbot --nginx -d YOUR_DOMAIN            (https 자동 구성)
# 6. game-portal .env의 BASE_URL을 https://YOUR_DOMAIN 으로 교체 후 restart

server {
    server_name YOUR_DOMAIN;
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 80;
}
